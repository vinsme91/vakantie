ktails op Love Lane bij **Backdoor Bodega** of **Mish Mash**.\n\n**Optie B — Café-dag George Town.** Geen wekker. Tegen 9u ontbijt bij **Ome by Spacebar Coffee** vlakbij de Clan Jetties — single origins, prima cakes, ook natural wines (zeldzaam in Penang). Of **Coffee Lane** op Beach Street voor de donkere shophouse-sfeer.\n\nDan: de wijken van de UNESCO-zone die je dinsdag overgeslagen hebt. De **Off-the-beaten-track walk** door zuid George Town — Hean Boo Thean Kuan Yin Temple (drijvend), Eng Chuan Tong Tan Kongsi, Little India. Minder druk, minder mural-mensen.\n\nLunch in Little India of bij **Kheng Pin Cafe** voor lor bak (Uncle Lau staat er al 40+ jaar voor zijn gefrituurde varkensvleesrolletjes). Cash.\n\nMiddagrust. Tweede koffie ergens. Niet rennen.\n\nAvond: **888 Hokkien Mee** of **New Lane Hawker** (als je nog niet was), cocktails op Love Lane.\n\n**Optie C — Penang Chiak Cooking Class.** Voor wie wel zin heeft in een activiteit maar geen jungle: ochtendklasse 8:10u, Chowrasta Market voor ingrediënten, dan 4 Peranakan-gerechten leren maken in een privé-keuken. 3-4 uur, een van de top cooking classes in Zuidoost-Azië. Reserveer vooraf.", "planB": "Regen: optie B (café-dag) wordt automatisch. Of doe een **Batik workshop** in Teluk Bahang (2-3 uur, je gaat met je eigen ontwerp naar huis). Of **Cheong Fatt Tze** als je daar nog niet bent geweest.\n\nGeen energie voor wandelen of cafés? **Hotel-pool** plus **Air Itam Laksa** of **Ah Leng Char Koay Teow** voor lunch — beide bij Air Itam Market (ja, je was er gisteren al, maar dat hoeft de ervaring niet kapot te maken).", "not": "Niet vandaag rennen om de paar dingen die je nog niet hebt gedaan af te tikken — dat is precies waar deze dag tegen verzet. Niet zowel Penang National Park als een tweede heritage walk; kies."}, {"date": "Zaterdag 13 juni", "character": "De vertrekdag", "what": "Korte ochtend in George Town, vlucht naar Langkawi (~1u).", "why": "Vluchten van Penang naar Langkawi gaan dagelijks meerdere keren. Je hebt geen reden om vroeg op te staan tenzij je een vroege vlucht hebt geboekt. Dus: laatste rustige ontbijt, één laatste café, dan rustig naar de luchthaven.", "flow": "Ontbijt op vrije keuze. Als je het nog niet hebt gedaan: **Toh Soon Cafe** voor een laatste kaya toast en kopi (en zaterdag is gewoon open). Of een specialty afsluiter bij **Ome** of **Mugshot**.\n\nCheck-out. Grab naar Penang Airport (~20-30 min, ~30 RM). Op een rustige zaterdag prima 1.5-2 uur voor vlucht aankomen.\n\nVlucht ~1u naar Langkawi.\n\nAankomst Langkawi: zie Langkawi-tab.", "planB": "Vroege vlucht? Sla ontbijt over en doe het op Penang Airport (slechte koffie, maar het kan). Of: koop kaya toast om mee te nemen van Toh Soon de avond ervoor en eet op de luchthaven.", "not": "Niet vandaag nog een heritage walk of activiteit erbij plannen. Reisdagen zijn reisdagen. Penang heeft jullie genoeg gegeven."}]}, "langkawi": {"id": "langkawi", "name": "Langkawi", "dates": "13 — 17 juni", "hotel": "Vila Kelapa", "mapCenter": "Langkawi Malaysia", "intro": "Langkawi is een archipel van 99 eilanden in de Andamanse Zee. De naam: 'Lang' (de bruine arend) en 'Kawi' (lokale roodachtige steen). Bij de hoofdjetty staat een 12m hoog arend-monument. De Mahsuri-mythe gaat over een jonge vrouw die in 1819 valselijk werd geëxecuteerd voor overspel — haar laatste vloek: 'zeven generaties van pech voor Langkawi'. Het eiland kwijnde 200 jaar weg, totdat in de jaren 80 (precies de zevende generatie) Mahathir Mohamad het tot duty-free toeristenbestemming maakte.", "tip": "Langkawi is groot (~30 km doorsnede). Auto huren (RM 80-100/dag) geeft veel vrijheid voor mangrove tour, SkyCab, Tanjung Rhu. Internationaal rijbewijs verplicht. Anders: Grab werkt overal maar soms wat wachten.", "culture": {"title": "Duty-free voordeel", "text": "Alcohol en parfum zijn 30-40% goedkoper dan op het Maleisisch vasteland. Een Tiger-bier in een 7-Eleven kost ~5 RM, een fles Australische wijn ~30-40 RM. Goed moment om in te slaan voor Koh Lipe (daar weer duurder). Doe een avond een 'in-villa' picknick met goedkope drinks bij Vila Kelapa."}, "places": [{"id": "lk-buffalo", "cat": "koffie", "tag": "normaal", "name": "Smiling Buffalo", "area": "Pantai Cenang", "desc": "Open vroeg (8u), all-day brunch, zelfgemaakte worsten en brood. Westers georiënteerd, goede koffie. De plek waar locals en expats heen gaan."}, {"id": "lk-redtomato", "cat": "koffie", "tag": "normaal", "name": "Red Tomato", "area": "Pantai Cenang", "desc": "Zeldzaam in Langkawi: Western breakfasts inclusief gluten-free en vegan opties. Goed voor wanneer je even niet weer een nasi lemak wilt."}, {"id": "lk-yellow", "cat": "koffie", "tag": "hidden", "name": "Yellow Beach Cafe", "area": "Pantai Tengah", "desc": "Beach-front cafe met beanbags op het strand. Kunst, hipster decor, surprisingly goede pizza. Goed voor een lazy lunch of zonsondergang met drinks."}, {"id": "lk-loaf", "cat": "koffie", "tag": "normaal", "name": "The Loaf", "area": "Perdana Quay", "desc": "Bakery + cafe aan de marina van Telaga Harbour. Verse croissants, brood, cafe-stijl ontbijt. Combineer met een wandeling rond de jachten."}, {"id": "lk-pakmalau", "cat": "eten", "tag": "topper", "name": "Nasi Dagang Pak Malau", "area": "Lokaal", "desc": "Een ontbijt-instelling. Nasi dagang is een zuid-Maleisische rijst-met-vis ontbijt. Gewoon binnen, krijg een bordje, eet tussen locals. Vroeg uit (sluit middag)."}, {"id": "lk-kaksue", "cat": "eten", "tag": "topper", "name": "Nasi Lemak Kak Sue", "area": "Cenang", "desc": "Nasi lemak die de meeste Maleiers in Langkawi aanwijzen als hun favoriet. Banaanblad-verpakt, sambal heeft die specifieke zoete-pittige balans."}, {"id": "lk-pia", "cat": "eten", "tag": "hidden", "name": "Pia's The Padi", "area": "Rijstvelden", "desc": "In een typisch Maleis dorpshuis aan een rijstveld. Run door chef Pia en haar man Jimmy. Beef rendang en lamb butter masala worden geroemd. Reserveer."}, {"id": "lk-wonderland", "cat": "eten", "tag": "normaal", "name": "Wonderland Food Store", "area": "Cenang", "desc": "Chinees seafood. Stir-fries, claypot, salted egg prawns. Lokaal druk in de avond."}, {"id": "lk-orkidria", "cat": "eten", "tag": "topper", "name": "Orkid Ria", "area": "Pantai Cenang", "desc": "Familie-institutie (250 plaatsen). Vader was visser, broers gaan nog steeds 's ochtends naar de markt. Live aquarium met groupers, zeebaarzen, kreeften — kies je vis. Drukbevolkt, RM 80-150 pp. Reserveer."}, {"id": "lk-boat", "cat": "eten", "tag": "hidden", "name": "Boat Restaurant", "area": "Pantai Tengah", "desc": "Onopvallende familie-zaak. Eenvoudige Chinese vis-keuken, ingrediënten direct van vissers. Tofu zelfgemaakt, salted egg squid en sweet & sour fish strips zijn klassiekers."}, {"id": "lk-kuahtown", "cat": "eten", "tag": "normaal", "name": "Kuah Town Seafood", "area": "Kuah", "desc": "Familie-runde, Thaise (vrouw) en Hokkien (man) achtergrond, dus mix van Thais, Chinees en Maleis. Wand vol met foto's van Mahathir Mohamad. RM 30-50 pp."}, {"id": "lk-cliff", "cat": "eten", "tag": "splurge", "name": "The Cliff", "area": "Pantai Cenang", "desc": "Op de rots tussen Cenang en Pantai Tengah. Spectaculair sunset-uitzicht over de Andamanse Zee. Fusion (Aziatisch + continentaal). Reserveer rond 18:30u voor zonsondergang. Romantisch, RM 200-300 pp."}, {"id": "lk-kapallayar", "cat": "eten", "tag": "hidden", "name": "Kapal Layar", "area": "West Coast", "desc": "Een vissersboot op het dak. Echte Langkawi-seafood: gestoomde tijgergarnalen met knoflook, golden-spice mussels, fried squid met salted egg. Ga vroeg voor sunset."}, {"id": "lk-fatcupid", "cat": "eten", "tag": "normaal", "name": "FatCUPID", "area": "Pantai Tengah", "desc": "Eigenaardig fusion-tent in een rustige setting. Chef Mehdi mixt Peranakan, Australisch, Italiaans, Chinees. Lieveling van expats."}, {"id": "lk-nam", "cat": "eten", "tag": "splurge", "name": "Nam Restaurant @ Bon Ton", "area": "Cenang", "desc": "Klassiek Maleis houten huis, herstoringsproject. Dineren in stijl, oosters-westerse fusie, tapas en mains. Een van de grootste dessertkaarten van Langkawi."}, {"id": "lk-unkaizan", "cat": "eten", "tag": "normaal", "name": "Unkaizan", "area": "Pantai Tengah", "desc": "Japans, omringd door regenwoud aan de voet van een heuvel. Charcoal-grilled sashimi, sushi, noodles. Voor als je behoefte hebt aan iets niet-Maleis. Reserveer."}, {"id": "lk-tanjungrhu", "cat": "wandeling", "tag": "hidden", "name": "Tanjung Rhu Beach", "area": "Noord", "desc": "Een van de mooiste stranden van Maleisië. Lange wit-zand strip met casuarina-bomen, kalm helder water, weinig mensen. Geen drukke beachclubs of jet-skis. Ga voor een lazy halve dag."}, {"id": "lk-cenangwalk", "cat": "wandeling", "tag": "normaal", "name": "Pantai Cenang strand-loop", "area": "Cenang", "desc": "Het Cenang-strand is bijna 2 km lang. Goede zonsondergangwandeling van het ene eind naar het andere, met een ijscoupe of biertje halverwege. Tijdens zonsondergang zijn jet-skis verboden, dus rustiger."}, {"id": "lk-telaga", "cat": "wandeling", "tag": "normaal", "name": "Telaga Tujuh Waterfalls", "area": "West", "desc": "'Zeven natuurlijke putten' — een trapsgewijze waterval met zeven verbonden poelen. Lokale legende: feeën zwommen hier ooit. Zwemmen onderaan (gratis) of de steile 45-min hike doen naar boven. Apen, neushoornvogels."}, {"id": "lk-skycab", "cat": "activiteit", "tag": "topper", "name": "Langkawi SkyCab + SkyBridge", "area": "Oriental Village", "desc": "Cable car naar Gunung Mat Cincang (708m). Steilste cable car ter wereld; 15 min omhoog. SkyBridge is een 125m gebogen hangbrug aan één pyloon. Reserveer online. Beste tijd: vroeg (open 9:30u, helder) of late namiddag. ~RM 100 pp. Check weer — bij mist zie je niets."}, {"id": "lk-mangrove", "cat": "activiteit", "tag": "topper", "name": "Mangrove Tour (Kilim Karst)", "area": "Noordoost", "desc": "Boottocht door de mangroven aan de noordoostkant. Zeearenden, neushoornvogels, monitor-hagedissen, vleermuis-grot. UNESCO Geopark zone. 4 uur, RM 200-300 pp."}, {"id": "lk-island", "cat": "activiteit", "tag": "normaal", "name": "Island Hopping (3-eilanden)", "area": "Zuidwest", "desc": "Pulau Dayang Bunting (Pregnant Maiden, met groen meer in heuvels), Pulau Beras Basah (zwemstrand), Eagle Watching. 4 uur, RM 60-80 pp. Toeristisch, maar de eilanden zijn werkelijk mooi. Ga vroeg."}, {"id": "lk-spa", "cat": "activiteit", "tag": "normaal", "name": "Spa / massage", "area": "Diverse", "desc": "Luxe spa-ervaringen op Langkawi zijn uitstekend. Ambong Rainforest Retreat (klein, intiem) en Datai Spa (luxueus) zijn de bekendste. 60 min massage RM 150-250."}, {"id": "lk-payar", "cat": "activiteit", "tag": "normaal", "name": "Pulau Payar Marine Park", "area": "Zuid", "desc": "Snorkel-dagtocht (45 min boot vanaf Kuah). Niet de beste snorkel van Thailand, maar goed voor Langkawi-niveau. Skippen als je naar Koh Lipe gaat."}, {"id": "lk-batik", "cat": "activiteit", "tag": "hidden", "name": "Atma Alam Batik Art Village", "area": "Padang Matsirat", "desc": "Workshop waar je je eigen batik (was-gedrukte stof) kunt maken. 2 uur, eenvoudig en plezierig. RM 80-120 pp. Goed bij regen."}, {"id": "lk-nightmarket", "cat": "activiteit", "tag": "hidden", "name": "Pasar Malam (Nachtmarkten)", "area": "Wisselend per dag", "desc": "Verschillende dorpen hebben elke avond hun eigen pasar malam (nachtmarkt). Donderdag: Pantai Cenang. Zaterdag: Padang Matsirat. Dinsdag: Kedawang. Echte lokale food en goedkope spullen, zonder toeristen-prijzen. Ga vanaf 18u. Probeer apam balik (zoete pannenkoek met pinda's), murtabak (Indiase gevulde flatbread), satay."}, {"id": "lk-eaglefeeding", "cat": "activiteit", "tag": "normaal", "name": "Eagle Feeding (binnen Island Hopping)", "area": "Telaga Harbour", "desc": "De arenden waar Langkawi naar vernoemd is. Vaak onderdeel van island hopping tours: de boot stopt op een spot waar de gids stukjes kip in het water gooit en tientallen brahminy kites en zee-arenden duiken naar beneden. Spectaculair voor wie van wildlife houdt."}, {"id": "lk-underwater", "cat": "activiteit", "tag": "normaal", "name": "Underwater World", "area": "Pantai Cenang", "desc": "Aquarium met pinguïns (uit Antarctica!), zee-otters, en haaien-tunnel. Niet wereldschokkend maar prima voor een hete middag of regen. 35 RM pp. 2 uur."}, {"id": "lk-reggae", "cat": "drinks", "tag": "topper", "name": "Reggae Bar", "area": "Cenang", "desc": "Cliché beach reggae bar maar werkt. Live music, zandvloer, biertjes onder de palmen. Ouderwets gezellig."}, {"id": "lk-sugar", "cat": "drinks", "tag": "normaal", "name": "Sugar Beach", "area": "Cenang", "desc": "Trendy openluchtbar/restaurant op het strand. Cocktails, tapas, signature 'Thirsty Mermaid'. Goed voor zonsondergang."}], "days": [{"date": "Zaterdag 13 juni", "character": "Van hawker-stad naar eiland", "what": "Vlucht 1u uit Penang — zie Penang-tab voor ochtend. Aankomst Langkawi rond het middaguur, transfer naar hotel, langzaam beginnen.", "why": "Eerste eiland-dag. Geen ambitie. Penang was vol indrukken; nu schakelen naar tempo waarin niets moet. Het strand staat er morgen ook nog. Inchecken, korte loop, vroeg eten, slapen.", "flow": "Vlucht landt rond 12u. Taxi of Grab naar het hotel (~30 min, afhankelijk van waar je zit — Cenang, Tengah of Kok zijn allemaal ongeveer dat eind van het eiland). Even hangen op de kamer, omkleden, niet meteen het strand op met je laptoptas nog in je hand.\n\nLate lunch ergens dichtbij. Als je in Cenang zit: **Pia's The Padi** is een goede zachte landing — Maleis-Westers, terras, niet te druk overdag. Anders gewoon iets in je hotel als ze een terras hebben. Eerst even oriënteren.\n\nLaat in de middag de eerste strandloop. Niet om iets te zien, gewoon om te voelen waar je bent. Cenang heeft een lange brede strook, prima voor een wandeling.\n\nVoor het avondeten: **Orkid Ria** voor seafood als je trek hebt, of **Nasi Lemak Kak Sue** voor iets simpels en lokaals. Eén drankje bij **Reggae Bar** of **Sugar Beach** voor de zonsondergang als je nog energie hebt — anders gewoon vroeg naar bed.", "planB": "Als de vlucht vertraagd is: skip de strandloop en ga direct uit eten. Bij regen is **Pia's** of een hotel-restaurant prima — Langkawi heeft sowieso af en toe een tropische bui in juni, dat hoort erbij.", "not": "Geen SkyCab vandaag. Geen mangrove tour boeken voor morgen op je telefoon vanuit een terras. Geen 'snel even het hele eiland verkennen met een scooter'. Vandaag is aankomen, eten, slapen. Dat is genoeg."}, {"date": "Zondag 14 juni", "character": "De enige echte activiteitendag", "what": "SkyCab + SkyBridge in de ochtend, daarna pool of strand, avond uit. Eén grote activiteit, verder open.", "why": "Van alle Langkawi-bezienswaardigheden is de SkyCab de enige die echt iets unieks levert dat je nergens anders krijgt op deze reis: een steile kabelbaan over regenwoud naar 700m. Doe het op je eerste volle dag — dan ben je nog uitgerust en is het weer 's ochtends het meest betrouwbaar. Rest van de dag bewust niets stapelen.", "flow": "Vroeg op (8u), ontbijt in het hotel of bij **The Loaf** als je in Cenang zit. Taxi naar Oriental Village in Telaga Harbour, daar vertrekt de **SkyCab + SkyBridge**. Probeer er rond 9:30 te zijn — vóór 11u is de lucht meestal helderder, daarna trekt het soms dicht. Reken op 2-3 uur totaal: kabelbaan op, SkyBridge oversteken, terug. Niet de combo-tickets met 6D-films en dinosaurus-rides erbij; je bent geen 8.\n\nTerug rond het middaguur. Lunch ergens onderweg of bij Oriental Village zelf — niets geweldigs, maar prima. Daarna terug naar hotel.\n\n**Vanaf nu is de dag van jou.** Suggestie: pool, lezen, dutje. Hitte piekt tussen 13u en 16u, dus dat is geen tijd om iets actiefs te doen. Eind van de middag een strandwandeling als je trek hebt in beweging.\n\nAvond: dit is een goede dag voor **The Cliff** — sunset cocktails op de rotsen, daarna eten met uitzicht. Het is duur, maar het is wel hét sunset-spot van Cenang. Reserveer 's ochtends even. Geen zin in splurge? Dan **Boat Restaurant** voor seafood of **FatCUPID** voor iets internationaler.", "planB": "Bewolkte of regenachtige ochtend: SkyCab heeft geen zin in mist (je ziet niks). Verzet naar dinsdag. Vandaag wordt dan een pool-dag met een lange lunch bij **Pia's The Padi** of **Kapal Layar**.", "not": "Geen mangrove tour er ook nog bij vandaag. Geen Telaga Tujuh Waterfalls 'omdat we toch in die hoek zijn' — die hoort op een eigen dag of helemaal niet. Niet vanavond een tweede splurge plannen voor morgen — laat morgen open."}, {"date": "Maandag 15 juni", "character": "Niets doen, expliciet", "what": "Geen schema. Strand, pool, eten, lezen, drinken. Een dag waarin niets is ingepland en dat is het hele punt.", "why": "Je bent hier voor rust. Twee dagen activiteiten op rij en je bent weer terug in stadstempo. Dit is de dag waarop je merkt dat je écht op vakantie bent, en die merk je alleen als je hem expliciet leegmaakt.", "flow": "Wakker worden wanneer je wakker wordt. Ontbijt zonder haast. Als je écht goede koffie wilt: **Smiling Buffalo** of **Red Tomato** — dit zijn de twee echte specialty-spots op het eiland. **Yellow Beach Cafe** is meer een lounge-café direct aan het strand, ook prima.\n\nDaarna: het strand of het zwembad. Boek geen activiteit. Pak je boek. Ga zwemmen wanneer je het te warm krijgt. Bestel iets te drinken. Lunch waar je toevallig bent — als je in Cenang loopt: **Kapal Layar** of een willekeurige plek aan het strand.\n\nMiddag tussen 13u-16u: niet in de zon. Terug naar hotelkamer of een schaduwplek. Lezen. Dutje. Niet je telefoon checken voor restaurant-reviews voor vanavond.\n\nLate middag weer naar buiten. Tweede strandwandeling als je zin hebt. Zonsondergang vanaf je hotelstrand of vanaf **Sugar Beach** met een biertje. Eten bij **Nasi Dagang Pak Malau** voor iets authentieks-Maleis, of bij **Unkaizan** als je trek hebt in Japans (verrassend goed voor een eiland-restaurant).", "planB": "Regenachtige dag: dit is letterlijk de perfecte dag voor regen. Boek geen sluit-activiteit. Lees op je kamer, ga lunchen bij **Pia's** of **FatCUPID** (allebei binnen prima), dutje, klaar. Geen mall.", "not": "Geen activiteit toevoegen 'omdat we anders een dag verspillen'. Een nietsdoen-dag is geen verspilde dag — die zijn juist de reden dat je in Langkawi zit en niet in Bangkok. Geen tweede SkyCab. Geen island hopping vooruit boeken voor morgen — beslis morgenochtend."}, {"date": "Dinsdag 16 juni", "character": "Eén tour, één avondsplurge", "what": "Ochtend mangrove tour óf island hopping (kies één), middag rust, avond op niveau eten.", "why": "Eén actieve dag tussen twee strand-dagen, anders ga je je vervelen. Maar nadrukkelijk één activiteit — niet beide. De Kilim Karst mangrove tour is de interessantere van de twee (kalkstenen formaties, vleermuizen-grotten, eagle feeding); island hopping is meer 'aanleggen voor een foto'. Maar als jullie liever zwemmen op verschillende strandjes: island hopping. Allebei half-dag, dus middag is open.", "flow": "Ontbijt vroeg, pickup voor de tour meestal rond 9u. **Mangrove Tour (Kilim Karst)** is ~4 uur, gaat door geopark — speedboot, mangroves, een grot, lunch onderweg of terug. Of: **Island Hopping** — drie eilanden, snorkelen bij Pulau Beras Basah, zwemmen in Tasik Dayang Bunda (zoetwatermeer met een legende eraan vast), uitkijkpunt op Pulau Singa Besar.\n\nTerug rond 13-14u. Lunch lichts — als je trek hebt: **The Loaf** voor een broodje. Daarna direct hotelkamer of pool. Niet meer naar buiten tot 17u.\n\nLate middag: een spa-massage als je zin hebt (Vincent traint vijf keer per week, je kuiten zijn het waard). Veel hotels hebben hun eigen spa, anders is er rondom Cenang genoeg keus.\n\nAvond: dit is de splurge-dag. **Nam Restaurant** in Bon Ton — fine dining in een gerestaureerd Maleis houten huis, sfeer is bijzonder. Reserveer. Anders **The Cliff** als je dat in dag 2 hebt overgeslagen.", "planB": "Tour gaat niet door wegens weer: pool-dag. Geen drama, je hebt al een SkyCab gedaan en je gaat zo naar Koh Lipe waar het pure strand is. Een gemiste tour is geen probleem.", "not": "Niet zowel mangrove ALS island hopping deze week. Niet vanavond ook nog naar **Pasar Malam** (nachtmarkt) — die is op specifieke dagen en je hebt al een diner geboekt. Niet morgenvroeg nog snel iets willen 'omdat het de laatste dag is' — morgen is een ferry-dag, niet meer."}, {"date": "Woensdag 17 juni", "character": "Ferry naar Koh Lipe", "what": "Vertrekdag. Check-out, taxi naar Telaga Harbour, ferry 90 min naar Koh Lipe. Aankomst rond het middaguur in Thailand.", "why": "Lange reisdag, lichter dan KL→Penang of straks Lipe→Krabi, maar wel met grensovergang. Niets meer plannen.", "flow": "Vroeg op. Check-out, ontbijt in hotel of een snelle stop bij **The Loaf** of **Yellow Beach Cafe** onderweg. Taxi naar Telaga Harbour Park (~30 min vanaf Cenang).\n\nFerry naar Koh Lipe vertrekt meestal rond 9:30u — check je ticket. Inchecken minstens een uur van tevoren want je gaat over de grens: paspoort uit, immigratie-formulier invullen. Reken op 90 min varen, soms 2 uur bij ruw weer. Onderweg is er een korte stop bij Pulau Langkawi-immigratie, niet zelf uitstappen.\n\nAankomst bij Koh Lipe is geen pier maar een **floating pier** — je stapt over op een longtail-boot die je naar Pattaya Beach brengt. Daar betaal je de national park fee (~200 baht). Vanaf Pattaya is het lopen naar Mali Resort op Sunrise Beach (~10 min met je tassen) of een motor-taxi voor weinig.\n\nInchecken bij **Mali Resort Sunrise Beach**. Even bijkomen, niet meteen het strand op. Zie Koh Lipe-tab voor de rest van de dag.", "planB": "Ferry geannuleerd wegens ruw weer (kan in juni, niet vaak): er is meestal een latere ferry of een dag verzet. Hotel waarschijnlijk niet open voor nog een nacht — vraag via je hotel of de ferry-aanbieder om hulp.", "not": "Geen 'snel nog even **Tanjung Rhu** beach' voor de ferry — heb je geen tijd voor. Geen koffer aanhouden tot het laatste moment in hopes of one more swim — je hebt zee in overvloed straks. Geen alcohol op de boot."}]}, "kohlipe": {"id": "kohlipe", "name": "Koh Lipe", "dates": "17 — 22 juni", "hotel": "Mali Resort Sunrise Beach", "mapCenter": "Mali Resort Sunrise Beach Koh Lipe", "intro": "Koh Lipe is een klein eiland (3,5 bij 2,5 km) in het uiterste zuidwesten van Thailand, op de grens met Maleisië. Onderdeel van Tarutao National Marine Park. Bijgenaamd 'de Maldiven van Thailand'. De originele bewoners zijn de Chao Ley, een nomadische Maleis-Indonesische zeevolk-cultuur die generaties van vis leefden. Er wonen er nog enkele honderden, vooral aan Pattaya Beach. Tot de jaren '90 vrijwel onbewoond door buitenstaanders — backpackers ontdekten het eind jaren '90, sindsdien hard ontwikkeld.", "tip": "Mali Resort zit direct aan Sunrise Beach — het beste snorkel-strand van het eiland. Walking Street is 5 min lopen, Pattaya Beach 10 min. Geen scooters op het eiland, alleen lopen, fiets, of motor-taxi (50-100 baht). Mali biedt gratis kayaks en snorkel-spullen — daar wil je gebruik van maken!", "culture": {"title": "Het verschil tussen de drie stranden", "text": "Sunrise Beach (Hat Chao Ley) — jullie thuisstrand: postcard-perfect, beste snorkel-strand van het eiland. North Point is rustigst. Pattaya Beach — actie, eten, hoofdaankomst voor speedboten. 10 min lopen vanaf jullie resort. Sunset Beach — kleine baai, minst ontwikkeld, een paar low-key bars. Voor zonsondergang. 15 min lopen."}, "places": [{"id": "kl-poohs", "cat": "koffie", "tag": "topper", "name": "Pooh's Restaurant", "area": "Walking Street", "desc": "Sinds 2003, een Koh Lipe-institutie. Reuze ontbijten (Engels, vegetarisch, Thai). Hier verzamelen reizigers zich. Ook 's avonds open."}, {"id": "kl-neepapaya", "cat": "koffie", "tag": "hidden", "name": "Nee Papaya", "area": "Walking Street", "desc": "Klein lokaal tentje voor Thaise ontbijten — khao tom (rijstpap), khanom jeen, mango sticky rice. Geen Engels-menu, vingerwijzen werkt."}, {"id": "kl-cafelipe", "cat": "koffie", "tag": "normaal", "name": "Café Lipe", "area": "Pattaya Beach", "desc": "Western breakfast voor wanneer je een fatsoenlijke koffie en een ei wilt. Bagels, smoothie bowls. Toeristisch, consistent."}, {"id": "kl-pancake", "cat": "koffie", "tag": "normaal", "name": "Thai Pancake Lady", "area": "Walking Street", "desc": "Iconisch streetfood-stalletje. Banaan-Nutella roti pancakes voor 60 baht. Ontbijt of late-night-snack. Iedereen kent haar."}, {"id": "kl-elephant", "cat": "eten", "tag": "topper", "name": "Elephant Restaurant", "area": "Walking Street", "desc": "Door diverse Koh Lipe-veteranen genoemd als 'het beste eten op het eiland'. Klein, intiem, tropische tuin-setting. Pittige zuid-Thaise klassiekers (massaman, gaeng som), goede seafood. Reserveer."}, {"id": "kl-ontherocks", "cat": "eten", "tag": "topper", "name": "On The Rocks (Serendipity)", "area": "Sunrise Beach — 3 min lopen", "desc": "Letterlijk op de rotsen aan de zuidkant van Sunrise Beach, naast Serendipity Resort. Mooi uitzicht over zee. Seafood, Thais, ook vegetarisch. Een van de hoogst gewaardeerde restaurants van het eiland. Vlakbij Mali Resort — perfect voor diner met zonsondergang. Reserveer."}, {"id": "kl-tenmoons", "cat": "eten", "tag": "hidden", "name": "Ten Moons Restaurant", "area": "Sunrise Beach — 3 min lopen", "desc": "Aan het zuidelijke einde van Sunrise Beach, bij Ten Moons Lipe Resort. Verrassend goed Spanish-Mediterranean-Thai fusion menu: paella, sushi, lokale vis met mango-saus, of klassieke salades. Goede cocktails op het chill-out terrace. Een stap omhoog qua sfeer. Reserveren handig."}, {"id": "kl-thaiderm", "cat": "eten", "tag": "hidden", "name": "Thai Derm Restaurant", "area": "Sunrise Beach — 8 min lopen", "desc": "Hoge reviews, klein lokaal restaurant met zuid-Thais. Echt Thais (geen toerist-aanpassingen). Som tam, gegrilde vis, curries. Vlakbij Mali Resort."}, {"id": "kl-bombay", "cat": "eten", "tag": "normaal", "name": "Bombay Indian Restaurant", "area": "Walking Street", "desc": "Voor als je iets niet-Thais wilt: solid Indiaas eten, Mughlai-klassiekers, naan, biryani. Prijs/kwaliteit goed."}, {"id": "kl-banana", "cat": "eten", "tag": "normaal", "name": "Banana Tree", "area": "Walking Street", "desc": "Casual Thai, goedkope drinks, gezellige avond-spot. De pad thai is goed."}, {"id": "kl-papayamom", "cat": "eten", "tag": "hidden", "name": "Papaya Mom Restaurant", "area": "Walking Street", "desc": "Vrolijke vrouw die kookt — perfecte som tam (groene papaja salade) en larb (Isaan-stijl gehakt-salade). Geen sfeer, alle aandacht op het eten."}, {"id": "kl-bbq", "cat": "eten", "tag": "topper", "name": "Beachfront BBQ", "area": "Pattaya Beach / Walking Street", "desc": "Meerdere restaurants maken 's avonds BBQ-presentaties: verse vis, garnalen, kreeft, inktvis op ijs. Bundhaya Resort beach BBQ, Daya Restaurant. 500-1500 baht pp afhankelijk van de schaal."}, {"id": "kl-maya", "cat": "drinks", "tag": "topper", "name": "Maya Bar", "area": "Pattaya Beach", "desc": "Een van de meest gehypte plekken. Bamboe en thatched-roof. Late-night EDM, mooie cocktails (250-350 baht). Drukker laat in de avond."}, {"id": "kl-sunsetbar", "cat": "drinks", "tag": "topper", "name": "Sunset Bar", "area": "Sunset Beach", "desc": "Of 'Mountain Resort Sunset Bar' — een rustig plekje aan de zonsondergangkant. Kussens op zand, geen muziek, alleen het geluid van golven. Voor één avond per verblijf is dit ideaal."}, {"id": "kl-reggaebar", "cat": "drinks", "tag": "normaal", "name": "Reggae Bar", "area": "Pattaya Beach", "desc": "Op het oostelijke eind van Pattaya Beach, weg van de speedboten. Late-namiddag biertje, reggae uit de speakers. Chillste plek van het eiland."}, {"id": "kl-livingroom", "cat": "drinks", "tag": "normaal", "name": "The Living Room", "area": "Pattaya Beach", "desc": "Wat upmarket, intieme cocktail-lounge. Goed voor een laatste glas voor het slapen."}, {"id": "kl-sunrise", "cat": "wandeling", "tag": "topper", "name": "Sunrise Beach (jullie strand)", "area": "Oostkust", "desc": "Direct voor Mali Resort. Postcard-perfect: zacht zand, kalme golven, uitzicht op Koh Adang. Beste snorkel-strand: gewoon vanaf het strand het water in en je ziet rifvissen. Het noordelijke uiteinde (North Point) is het rustigst. Loop er eens vroeg om zonsopgang, ervoor wordt hij vernoemd."}, {"id": "kl-sunset", "cat": "wandeling", "tag": "normaal", "name": "Sunset Beach", "area": "Westkust (15 min lopen)", "desc": "Kleine baai, rotsachtiger. Minst ontwikkeld. Echt zonsondergang-uitzicht over Koh Adang. Een paar low-key bars. Voor stilte en zonsondergang met cocktail. Loop dwars over het eiland, kost je 15 min vanaf het resort."}, {"id": "kl-pattaya", "cat": "wandeling", "tag": "normaal", "name": "Pattaya Beach", "area": "Zuidkust (10 min lopen)", "desc": "Hoofdstrand voor speedboten en aankomsten. Aan één kant boot-activiteit, aan het andere eind (zuidkant) afgeschermd zwemvak. Goed om hier 's avonds even rond te lopen — Walking Street begint hier — maar niet jullie zwemstrand."}, {"id": "kl-snorkelboat", "cat": "activiteit", "tag": "topper", "name": "Snorkel boot tour (4 of 7 eilanden)", "area": "Tarutao Marine Park", "desc": "De must-do op Koh Lipe. Longtail-boat naar verschillende dive sites en kleine eilandjes. Inner-island (4 stops) is ~600 baht pp, 7 stops ~800 baht. Vertrek 9:00 of 13:30 (latere = mooier licht). Boek bij elk willekeurig agentschap op Walking Street."}, {"id": "kl-snorkelshore", "cat": "activiteit", "tag": "topper", "name": "Snorkelen vanaf jullie strand", "area": "Sunrise Beach (voor de deur)", "desc": "Mali Resort heeft gratis snorkel-spullen — pak ze en loop het water in vanaf het hotel. Rif begint vanaf 10m uit de kust. Tropische vissen, soms zee-schildpadden. Loop richting North Point voor de beste spots. Pas op zee-egels — niet barvoets in shallow water."}, {"id": "kl-dive", "cat": "activiteit", "tag": "normaal", "name": "Duiken (PADI)", "area": "Sunrise Beach", "desc": "Tarutao Marine Park heeft uitstekend duiken. Adang Sea Divers (Sunrise) is de top-aanrader. Een dag van twee duiken kost ~3000 baht. Wat je ziet: barracuda's, moray eels, soms reef sharks."}, {"id": "kl-adang", "cat": "activiteit", "tag": "hidden", "name": "Hike Koh Adang (Chado Cliff)", "area": "Koh Adang", "desc": "Vanaf Sunrise Beach (voor jullie resort) is het 10 min met longtail-boat (~100 baht) naar Koh Adang, een groter onbewoond eiland. Daar 45-60 min stevig omhoog door jungle naar Chado Cliff — uitzicht over heel Koh Lipe. Bring water. Doe dit ochtend voor hitte (vertrek 7-8u uit resort). Past perfect bij Vincent's tempo."}, {"id": "kl-kayak", "cat": "activiteit", "tag": "hidden", "name": "Kajak naar Koh Usen / Koh Kra", "area": "Sunrise Beach (voor de deur)", "desc": "Mali Resort biedt gratis kayaks aan gasten. Peddel naar de kleine eilandjes voor de kust — half uur peddelen, klein strandje, paar uur snorkelen, terug. Geen tour, geen schedule, eigen tempo. Ideale lazy ochtend-activiteit."}, {"id": "kl-massage", "cat": "activiteit", "tag": "normaal", "name": "Thaise massage op het strand", "area": "Pattaya / Sunrise", "desc": "200-300 baht voor een uur. Massage-tenten op alle drie stranden. Een per persoon per dag is op vakantie volledig acceptabel."}, {"id": "kl-bioluminescent", "cat": "activiteit", "tag": "hidden", "name": "Bioluminescent plankton", "area": "Sunset Beach", "desc": "In sommige avonden lichten plankton op in het water als je beweegt — magisch, blauwgroene flikkers. Niet gegarandeerd. Vraag rond op het eiland; sommige tours brengen je naar de juiste spot."}, {"id": "kl-sunset-cruise", "cat": "activiteit", "tag": "hidden", "name": "Sunset cruise", "area": "Vanaf Pattaya Beach", "desc": "Longtail of catamaran met snacks, drinks en stop bij een snorkel-spot. 2-3 uur, vertrek 16-17u, terug rond zonsondergang. Boek via Walking Street travel agents. ~800-1200 baht pp. Goed voor een romantische avond."}, {"id": "kl-yoga", "cat": "activiteit", "tag": "hidden", "name": "Yoga op het strand", "area": "Sunrise of Sunset Beach", "desc": "Verschillende kleine studio's bieden ochtend-yoga sessies (7-8u) op het strand. Castaway Resort Sunrise heeft regelmatig drop-in classes. ~300-500 baht. Goed begin van de dag."}], "days": [{"date": "Woensdag 17 juni", "character": "Aankomst op het kleinste paradijs", "what": "Ferry uit Langkawi (zie Langkawi-tab voor ochtend). Aankomst rond 12-13u, inchecken bij Mali Resort Sunrise Beach, eerste loop, simpele avond.", "why": "Koh Lipe is klein — je loopt het in een paar uur rond. Eerste dag is voor oriëntatie, niet voor activiteiten. Mali Resort heeft alles aan boord (kayaks, snorkel-spullen, gratis), dus geen haast om iets te boeken.", "flow": "Aankomst rond het middaguur op Pattaya Beach (zie Langkawi-tab). National park fee betalen, motor-taxi of lopen naar **Mali Resort Sunrise Beach** — ongeveer 10 min lopen dwars over het eiland via Walking Street.\n\nInchecken. Onthoud: geen scooters op Koh Lipe. Alles is lopen, of motor-taxi voor 50-100 baht. Eiland is 2km lang en 1km breed, dus dat valt mee.\n\nNa de check-in: niet meteen de zee in. Eerst even hangen, omkleden, water drinken. Late lunch: **Pooh's Restaurant** op Walking Street is een goede zachte landing — westers/Thai, makkelijk en betrouwbaar. Of **Thai Pancake Lady** voor iets simpels en goedkoops.\n\nLate middag: eerste loop op Sunrise Beach (waar je hotel ligt). Dit is meteen het beste snorkel-strand van het eiland — koraal binnen 20m van de kust. Niet vandaag al snorkelen, alleen kijken. Walking Street verkennen — die is alleen 's avonds echt levend.\n\nDiner: **On The Rocks** (3 min van Mali) is een mooie eerste avond — uitzicht over Sunrise Bay, niet te duur, prima eten. Anders **Elephant Restaurant** op Walking Street voor een meer relaxte vibe. Eén drankje bij **Maya Bar** of **The Living Room** als je nog energie hebt.", "planB": "Ferry vertraagd: je komt later aan, skip Walking Street vanavond, eet bij je hotel-restaurant en ga slapen. Morgen ben je weer in.", "not": "Geen snorkel tour boeken voor morgen op je telefoon vanuit het restaurant. Geen 'meteen ook naar Sunset Beach' — je bent moe van de reis. Geen tweede diner-locatie verkennen 'voor later in de week' — improviseer dat ter plekke."}, {"date": "Donderdag 18 juni", "character": "Niets, behalve het eiland zelf", "what": "Eerste echte strand-dag. Geen tour, geen activiteit. Sunrise Beach uitgebreid verkennen, zwemmen, snorkelen vanaf het strand, lunch waar je toevallig bent.", "why": "Je hebt twee tour-dagen verderop deze week, vandaag is voor het ritme vinden. Mali Resort heeft gratis snorkel-spullen — pak ze, loop het water in, kijk wat er zwemt. Geen 5u-wekker, geen pickup-tijden.", "flow": "Slaap uit. Ontbijt bij Mali (zit waarschijnlijk in je tarief) of bij **Nee Papaya** op Walking Street voor iets lokaals. Echte specialty coffee zoals in KL of Penang is hier niet te vinden — accepteer dat en drink wat ze hebben.\n\nOchtend: pak snorkel-spullen van het hotel, loop Sunrise Beach af richting noorden. Het koraal-rif begint dichtbij — je hoeft niet ver te zwemmen. Vroeg op de dag is het water het helderst. Maximum één uur in het water in één keer.\n\nMiddag: lunch op het strand of bij **Papaya Mom** een paar stappen het eiland in. Daarna terug naar het hotel — niet in de zon tussen 13u en 16u. Lezen, dutje, pool als Mali er een heeft.\n\nLate middag: nu pas naar **Sunset Beach** lopen — ~15 min via een pad door het eiland. Vanaf hier is de zonsondergang het mooist. Drink bij **Sunset Bar** of een willekeurige strandtent. Niet je avond hier doorbrengen — terug richting Walking Street voor diner.\n\nDiner: **Ten Moons** (3 min) voor seafood-BBQ op het strand, of **Beachfront BBQ** als je het wil zien. Lekker, eenvoudig, prima geprijsd.", "planB": "Regen: het is regenseizoen-begin in juni, dus het kan. Lees op de kamer, lunch bij Pooh's, kort de zee in tussendoor. Een nat strand-dag is niet hetzelfde als een verloren dag.", "not": "Geen snorkel-tour vandaag — die staat verderop. Geen Koh Adang hike vandaag — die ook. Geen 'we gaan vandaag naar alle drie de stranden' — je hebt zes dagen, spreid het."}, {"date": "Vrijdag 19 juni", "character": "Snorkel-tour dag", "what": "Halve dag of hele dag snorkel boot tour — 4 eilanden of 7 eilanden. Vroeg vertrek, terug late middag. Verder geen activiteiten.", "why": "Dit is de échte reden dat mensen naar Koh Lipe komen — de eilanden om Lipe heen (Koh Rok, Koh Hin Ngam, Koh Yang) zijn beter qua koraal en helderheid dan zelfs Sunrise Beach. Een tour pakt 4 of 7 plekken op één dag. Doe dit halverwege de week, niet aan het begin (je wilt eerst gewend zijn aan zwemmen in zout) of aan het einde (je wilt niet uitgeput zijn voor de Krabi-reis).", "flow": "Vroeg op. Ontbijt licht — je gaat veel zwemmen, en op de boot eet je later toch nog. Tour boeken kan ter plekke (Walking Street heeft tien aanbieders, allemaal ongeveer hetzelfde) of via Mali. **4-eilanden** is ongeveer een halve dag tot vroege middag, **7-eilanden** is hele dag. Doe 4 als jullie liever rustiger willen, 7 als jullie het willen pakken — dat is een lange dag op een boot.\n\nPickup meestal rond 9:30u vanaf Pattaya Beach. Longtail-boot, kleine groep (~10 personen), engelse uitleg. Op elk stop ~45-60 min zwemmen en snorkelen, koraal en kleurige vissen, soms zeeschildpadden. Lunch is meestal op één van de eilanden inbegrepen, eenvoudig Thais.\n\nTerug op Pattaya rond 14u (4-eil.) of 16-17u (7-eil.). Direct naar hotel, douchen, zoutspoelen. Niet meer aan zout vandaag.\n\nAvond: rustig. **Bombay Indian** als je trek hebt in iets anders dan Thais — verrassend goed op een Thais eiland. Of gewoon **Thai Derm** (8 min) voor een betere Thai-Thai ervaring. Eén drankje en vroeg naar bed — je huid is moe.", "planB": "Tour geannuleerd wegens golven (kan in juni gebeuren): probeer alleen Sunrise + Sunset vanaf het strand vandaag. Geen drama. Probeer morgenochtend opnieuw te boeken, of laat het en doe in plaats daarvan **kayaken naar Koh Usen** — gratis bij Mali, prima alternatief.", "not": "Niet daarna ook nog ergens drinken op Walking Street tot middernacht. Niet morgen weer een tour — morgen is rust. Niet de tour-aanbieder kiezen op basis van de goedkoopste prijs — kies op aantal mensen per boot (minder = beter)."}, {"date": "Zaterdag 20 juni", "character": "Rust-dag na de tour", "what": "Geen schema. Geen tour. Strand, lezen, eten, zwemmen wanneer je wilt. Eventueel kort kayaken naar Koh Usen als je zin hebt.", "why": "Een snorkel-tour kost meer energie dan het lijkt — zout, zon, golven, in en uit het water. Vandaag is voor herstel. Tegelijk is dit ook de dag waar Vincent makkelijk weer iets gaat boeken 'omdat we anders een dag verliezen'. Niet doen.", "flow": "Slaap uit. Ontbijt zonder klok. Koffie bij **Café Lipe** als je iets beters wilt dan Mali — het is het meest serieuze koffie-spotje van het eiland, niet groots maar prima.\n\nOchtend: optie 1, niets. Lees, hang in een hangmat als die er is, zwem 20 min, lees verder. Optie 2: pak een **kayak van Mali** en peddel naar **Koh Usen** (klein eilandje voor de kust, ~15 min peddelen). Daar uitstappen, snorkelen, terug. Geen tour-energie, alleen jullie.\n\nLunch op het strand bij een willekeurige tent. Iets met sla en grilled fish. Geen pad thai elke dag.\n\nMiddag: zoals altijd in de zon-piek niet buiten. Schaduw, koud water, dutje.\n\nLate middag: **massage**. Walking Street heeft tientallen massage-shops, allemaal ~300-500 baht voor een uur. Lekker voor Vincent's kuiten na al die training en lopen. Beide laten doen.\n\nAvond: **Banana Tree** voor iets simpels en goed, of terug naar **Elephant Restaurant** als die je beviel. **Maya Bar** met live muziek voor een drankje na.", "planB": "Regen: dit is letterlijk de beste dag voor regen deze week. Lees op de kamer, ga lunchen onder een dak, massage voor allebei, klaar. Geen drama.", "not": "Geen tweede snorkel-tour. Geen duik-cursus 'omdat we hier toch zijn' — als je echt wil duiken doe je dat morgen, niet vandaag spontaan. Geen tochtje naar Sunset Beach én Pattaya Beach én Sunrise Beach 'voor de foto's' — kies één en wees daar."}, {"date": "Zondag 21 juni", "character": "Optionele activiteit of nog een rust-dag", "what": "Laatste hele dag op Koh Lipe. Kies één: Koh Adang hike, intro-duik bij Adang Sea Divers, sunset cruise, of weer niets. Eén ding maximum.", "why": "Morgen is de lange reisdag naar Krabi (~5-6 uur via boot en bus). Vandaag is de laatste echte vrije dag van het strand-deel. Eén afsluitende activiteit of bewust nog een rust-dag — beide zijn goed, maar niet stapelen.", "flow": "Eén van vier opties, kies vooraf:\n\n**A. Koh Adang hike (Chado Cliff)**: longtail-boot 10 min naar Koh Adang (vraag bij Mali of via Walking Street). Hike omhoog naar het uitzichtpunt — 30-45 min stevig klimmen, redelijk steil, past goed bij Vincent's tempo. Bovenaan uitzicht over Koh Lipe vanaf hoog. Terug, ferry retour, lunch. Beste optie voor wie wil bewegen.\n\n**B. Intro-duik bij Adang Sea Divers**: één halve dag, één duik, geen certificaat nodig. Dichterbij dan snorkelen, met instructeur. Mooie eerste duik-ervaring. Niet als je echt klaustrofobie krijgt onder water.\n\n**C. Sunset cruise**: laat in de middag, longtail-boot rond het eiland met kleine groep, eten en drinken aan boord, zonsondergang vanaf het water. Romantisch, weinig moeite.\n\n**D. Bewust nog een nietsdoen-dag**: ook prima. Strand, boek uit, lange lunch bij **Pooh's**.\n\nIn alle gevallen: avond licht. Inpakken voor morgen, vroeg slapen. Eten bij een favoriet van de week — **On The Rocks** of **Ten Moons** verdient een tweede bezoek.\n\nAls je iets bijzonders wilt zien voor de laatste avond: vraag bij Mali of er bij **bioluminescent plankton**-tochten zijn deze week. Beste rond nieuwe maan, dus check de maankalender. Niet altijd, dus geen garantie.", "planB": "Activiteit valt uit weer of vol: B-optie wordt automatisch D. Geen probleem.", "not": "Geen twee opties op één dag. Geen 'we doen Adang in de ochtend en dan ook nog snorkelen 's middags'. Niet vannacht uit gaan tot laat — morgen is een vroege en lange reisdag."}, {"date": "Maandag 22 juni", "character": "Lange reisdag naar Krabi", "what": "Vertrekdag. Speedboat van Pattaya Beach naar Pak Bara (vasteland) of direct doorlopende ferry+bus combi naar Krabi. Reken op 5-6 uur deur tot deur.", "why": "Dit is de zwaarste reisdag van de hele trip. Wees realistisch over de vermoeidheid. Niet vandaag nog een ochtend-snorkel, niet vanavond uit eten op niveau in Ao Nang.", "flow": "Vroeg op. Ontbijt bij Mali, niet uitgebreid — je zit straks lang op een boot en bus. Check-out vóór 10u meestal.\n\nDe meeste combi-tickets vertrekken rond 9:30 of 11u vanaf Pattaya Beach. Speedboat naar Pak Bara (~90 min, vasteland Thailand) — kan ruw zijn, neem een pil tegen zeeziekte als je twijfelt. In Pak Bara overstappen op een minibus of bus naar Krabi (~3 uur). Of: er zijn combi-tickets via Hat Yai of via Trang, allemaal vergelijkbaar in tijd.\n\nLunch is meestal een korte stop onderweg bij een wegrestaurant. Niets opzoekens.\n\nAankomst Ao Nang of Krabi-town in de late middag. Taxi of resort-pickup naar **Ban Sainai Resort**. Inchecken, douchen. Geen ambitie meer vandaag.\n\nLicht eten in het resort — **Sai Nai** is het resort-restaurant, prima voor een eerste avond. Geen alcohol op het terrein (dry resort), dus als je per se een biertje wil ga je naar Ao Nang Beach — maar realistisch, vanavond niet meer.\n\nZie Krabi-tab voor de rest.", "planB": "Speedboat geannuleerd wegens weer: vraag bij Walking Street naar de volgende dag en regel een extra nacht bij Mali. Krabi heeft maar 3 dagen, dus een verloren dag voelt zwaar — maar gedwongen is gedwongen.", "not": "Geen laatste ochtendsnorkel vanaf Sunrise Beach 'omdat we toch nog tijd hebben'. Geen souvenir-shoppen op Walking Street op het laatste moment. Geen 'we eten vanavond bij Krua Phranang' inplannen — dat is voor morgen of overmorgen."}]}, "krabi": {"id": "krabi", "name": "Krabi — Ao Nang", "dates": "22 — 24 juni", "hotel": "Ban Sainai Resort", "mapCenter": "Ao Nang Krabi", "intro": "Krabi is een provincie in zuid-Thailand, beroemd om kolossale kalksteen-rotsformaties (karst). De rotsen zijn 250+ miljoen jaar oud, gevormd toen dit gebied nog koraalrif onder de zee was. Hetzelfde landschap als James Bond Island, Halong Bay, of Guilin. De meeste reizigers gaan direct naar Ao Nang — een toeristisch strandstadje 15 km westelijk van Krabi Town. Railay Beach is een schiereiland alleen per boot bereikbaar. Cultureel: meer islamitische invloed dan andere delen van Thailand (~40% moslim). Pittiger Zuid-Thaise keuken.", "tip": "Met 1.5 volle dag in Krabi heb je twee echte opties. Kies kwaliteit boven kwantiteit. Railay Beach is de absolute must — kan in een halve dag. Ban Sainai is een 'dry resort' (geen alcohol, geen varkensvlees op het terrein). Drink Ao Nang.", "culture": {"title": "Zuid-Thaise gerechten om te zoeken", "text": "Khao mok gai: Thaise versie van biryani, kip met kurkuma-rijst (islamitische invloed). Massaman curry: milde curry met aardappel, ui, pinda's (Persische roots). Gaeng som: heldere, pittig-zure curry met vis. Khao yam pak tai: rijstsalade met groenten, kruiden en bagoong-saus. Hor mok: gestoomde curry-mousse in bananenblad."}, "places": [{"id": "kr-cafe898", "cat": "koffie", "tag": "normaal", "name": "Café 8.98", "area": "Ao Nang", "desc": "Specialty coffee café met serieuze espresso. Westerse en Thaise ontbijten."}, {"id": "kr-lostovenue", "cat": "koffie", "tag": "hidden", "name": "The Lost Ovenue Coffee", "area": "Ao Nang", "desc": "Thaise specialty café, locale roastery, single origins. Goede oase weg van het toeristische Ao Nang centrum."}, {"id": "kr-saiNai", "cat": "eten", "tag": "normaal", "name": "Sai Nai Restaurant", "area": "Ban Sainai Resort", "desc": "Solid Thais en Westers. Goede pad thai, massaman curry. Geen alcohol — drink een verse coconut shake. Ontbijt is inbegrepen."}, {"id": "kr-carnivore", "cat": "eten", "tag": "normaal", "name": "Carnivore Steak & Grill", "area": "Ao Nang", "desc": "Voor als je weer eens een fatsoenlijke biefstuk wilt. Klassieke Australische grill-stijl."}, {"id": "kr-kruaph", "cat": "eten", "tag": "topper", "name": "Krua Phranang", "area": "Ao Nang", "desc": "Authentiek Thais zonder toeristische upgrades. Beroemd om hun massaman curry, gaeng som, en hor mok thalee. Reken op 200-400 baht pp. Reserveren handig in highseason."}, {"id": "kr-laelay", "cat": "eten", "tag": "topper", "name": "Lae Lay Grill", "area": "Heuvel boven Ao Nang", "desc": "Op een heuvel met spectaculair zonsondergangsuitzicht over de baai. Verse seafood, lokale Thaise. Wordt door zowel toeristen als locals geprezen. 300-500 baht pp. Reserveer."}, {"id": "kr-mama", "cat": "eten", "tag": "normaal", "name": "Mama's Chicken", "area": "Ao Nang", "desc": "Casual locale tent met gegrilde kip in zuid-Thaise stijl, plus klassiekers als laab moo, som tam. Goedkoop, lekker."}, {"id": "kr-tonsai", "cat": "eten", "tag": "hidden", "name": "Tonsai Restaurant", "area": "Buiten Ao Nang", "desc": "Iets buiten Ao Nang. Kleine familietent. Authentiek pittig Zuid-Thais. Niet veel sfeer, geweldig eten."}, {"id": "kr-sunset", "cat": "eten", "tag": "normaal", "name": "Sunset Restaurant Railay", "area": "Railay West", "desc": "Voor lunch tijdens je dagtrip. Op het strand, view op kalksteen-cliffs en zonsondergang. Solid Thais en Westers."}, {"id": "kr-railay", "cat": "activiteit", "tag": "topper", "name": "Railay Beach", "area": "Schiereiland", "desc": "Alleen per longtail boat (geen wegen). Vier 'beaches': West Railay, East Railay, Phra Nang Beach (de mooiste — wit zand, kalksteen, principessa-grot), Ton Sai (rotsklimmers). Plan: longtail vanaf Ao Nang (~150 baht pp), 15 min varen, naar Phra Nang lopen, zwemmen, lunch West Railay, terug. 4-5 uur. Vermijd middag-hitte, ga 9-13u."}, {"id": "kr-fourislands", "cat": "activiteit", "tag": "topper", "name": "Four Islands Tour", "area": "Vanaf Ao Nang", "desc": "Klassieker: longtail naar Poda Island, Chicken Island, Tup Island en Phra Nang Cave. Tijdens laagtij verbinden de drie eilanden zich met witte zandbankjes. Boek bij hotel. ~700 baht pp, 4 uur."}, {"id": "kr-tigercave", "cat": "activiteit", "tag": "hidden", "name": "Tiger Cave Temple (Wat Tham Sua)", "area": "30 min Grab", "desc": "1260 stappen recht omhoog naar een tempel op een kalksteen-piek met 360° uitzicht. 30-45 min stevig klimmen. Past perfect bij Vincent's training-tempo. Apen onderweg. Vroeg ochtend (6-7u uit hotel) voor koelte. Geen entree-fee."}, {"id": "kr-emerald", "cat": "activiteit", "tag": "hidden", "name": "Emerald Pool & Hot Springs", "area": "1u Grab", "desc": "Aan de oostkant van Krabi. Emerald Pool is een natuurlijke turquoise pool in de jungle, gevoed door warme bronnen. Hot Springs zijn natuurlijke jacuzzi-pools in de rivier. Halve dag. 30 min wandelen door bos."}, {"id": "kr-kayak", "cat": "activiteit", "tag": "normaal", "name": "Kayak in mangroves", "area": "Diverse", "desc": "Kalksteen-cliffs en mangroves verkennen. Halve-dag tour, ~500 baht pp."}, {"id": "kr-bluepool", "cat": "activiteit", "tag": "hidden", "name": "Blue Pool (Sa Morakot)", "area": "Krabi Hinterland", "desc": "Vaak gecombineerd met Emerald Pool. Een onnatuurlijk turquoise meer omringd door regenwoud. Niet altijd toegankelijk (seizoensgebonden), check vooraf. 1u Grab uit Ao Nang."}, {"id": "kr-cooking", "cat": "activiteit", "tag": "hidden", "name": "Krabi Cooking Class", "area": "Ao Nang", "desc": "Halve dag Thaise cooking class. Diverse opties: Krabi Thai Cookery School heeft goede reviews — marktbezoek en 5 gerechten leren maken (groene curry, pad thai, tom yum). ~1500 baht pp."}, {"id": "kr-elephantsanc", "cat": "activiteit", "tag": "hidden", "name": "Krabi Elephant Sanctuary (ethisch)", "area": "Klong Thom", "desc": "Geen rijden — alleen voeden, baden en observeren. Reken op een ethische sanctuary zoals Krabi Elephant House Sanctuary of Elephant Hills Krabi. Halve dag. ~2500 baht pp. Niet voor wie 'echte wildlife' verwacht maar wel respectvol voor de dieren."}, {"id": "kr-beachbars", "cat": "drinks", "tag": "normaal", "name": "Aonang Beach Bars", "area": "Ao Nang strand", "desc": "Klassieke beachfront-bars met cocktails, biertjes, fire shows in de avond. Gewoon prikken voor een uur."}, {"id": "kr-lastcafe", "cat": "drinks", "tag": "normaal", "name": "Last Café Ao Nang", "area": "Noordrand Ao Nang", "desc": "Op rotsen — uitzicht op de zee. Quiet bar/cafe."}], "days": [{"date": "Maandag 22 juni", "character": "Aankomst Krabi na lange reisdag", "what": "Boot+bus uit Koh Lipe (zie Koh Lipe-tab). Late middag inchecken bij Ban Sainai Resort. Lichte avond op het terrein.", "why": "Geen reden om vandaag nog ergens heen te willen. Je hebt 1.5 echte dag in Krabi en die begint morgen pas.", "flow": "Aankomst late middag bij **Ban Sainai Resort** (zie Koh Lipe-tab voor reis). Inchecken, kamer bekijken — Ban Sainai is een resort tussen de karst-rotsen, sfeer is goed, faciliteiten netjes. Geen alcohol en geen varkensvlees op het terrein (halal), dus weet dat.\n\nNa de check-in: niet meer op pad. Pool als je nog zin hebt, anders gewoon douchen en hangen.\n\nDiner: **Sai Nai** restaurant in het resort. Prima Thai en internationaal, terras tussen het groen. Een glas water of mocktail. Geen avondprogramma — morgen wil je fit zijn voor Railay.\n\nAls je per se de buurt wil zien: het resort is ~10 min met taxi van Ao Nang Beach. Maar realistisch, morgen ook nog.", "planB": "Aankomst later dan verwacht: skip diner buiten, room service of Sai Nai, slapen.", "not": "Vandaag geen Railay, geen Tiger Cave, geen Ao Nang beach bars. Niet vanavond een tour boeken voor morgenvroeg om 7u — je bent gesloopt."}, {"date": "Dinsdag 23 juni", "character": "Railay-dag (en niets anders)", "what": "Halve dag op Railay Beach (de absolute must in Krabi). Longtail-boot heen en terug, lunch op locatie, late middag terug naar resort.", "why": "Krabi heeft veel te bieden — Four Islands, Emerald Pool, Tiger Cave, kayak mangroves — maar met 1.5 echte dag moet je kiezen. **Railay is de must.** Niet omdat het schitterend is in absolute zin, maar omdat de combinatie van karst-rotsen-strand-toegang-alleen-per-boot je nergens anders krijgt. De andere dingen kun je een andere keer.", "flow": "Ontbijt in het resort, niet te uitgebreid. Taxi naar Ao Nang Beach (~10 min). Vanaf het strand vertrekken **longtail-boten naar Railay** zodra er 8 mensen instappen — meestal binnen 10-20 min wachten. Kost ~200 baht p.p. enkele reis. Aankomst Railay West Beach na ~15 min varen.\n\nRailay is geen eiland, het is een schiereiland — afgesneden van het vasteland door rotsen. West Beach is het brede toeristen-strand, Phra Nang Beach is het kleinere achter de rotsen (10 min lopen, mooier), East Beach is geen zwemstrand. Loop naar **Phra Nang Beach** — daar zit ook de bekende 'Princess Cave' (zoek niet op wat erin staat van tevoren als je verrast wil worden — of zoek het wel op, beide werkt).\n\nOchtend op het strand, zwemmen, in de zon. Lunch bij **Sunset Restaurant Railay** of een van de strandtenten — niets bijzonders, prima. Bij voldoende energie: korte rotsverkenning. Klimmen niet vandaag, alleen kijken. \n\nLate middag rond 15-16u terug-boot naar Ao Nang. Niet langer wachten — tegen 17u worden de boten voller en de zee onrustiger.\n\nTerug in Ao Nang: omkleden bij het resort, daarna **diner buiten** want het resort is dry. **Krua Phranang** is dé topper in Ao Nang — kleine plek, drukke avonden, reserveer of kom vroeg. Anders **Lae Lay Grill** voor sunset op de heuvel boven Ao Nang. Eén drankje bij **Last Café** of de **Aonang Beach Bars**.", "planB": "Storm of hoge golven: longtail-boten varen niet. Backup: **Tiger Cave Temple** voor de meer actieve optie (1260 stappen omhoog, past bij Vincent — pure beenkracht-test, beloning is uitzicht). Of resort-dag en proberen je laatste dag een Railay-poging.", "not": "Geen Four Islands Tour erbij vandaag. Geen Emerald Pool 'omdat het toch in dezelfde richting is'. Geen Princess Cave foto-tijd langer dan 5 minuten. Niet vanavond ook nog kayaken vooruit boeken voor morgen."}, {"date": "Woensdag 24 juni", "character": "Krabi vertrek naar Bangkok", "what": "Vertrekdag. Korte ochtend, vlucht naar Bangkok rond het middaguur (1u15). Zie Bangkok-tab voor middag/avond.", "why": "Geen tijd voor een echte activiteit vandaag. Korte ontbijt, naar het vliegveld, vliegen. Klaar.", "flow": "Ontbijt in het resort zonder haast. Check-out meestal vóór 11u maar vraag het. Als je vlucht in de middag is en je hebt nog 2-3 uur tussen check-out en pickup: pool. Niet meer op pad.\n\nAls je écht nog koffie wilt buiten het resort: **Café 8.98** in Ao Nang is je beste optie, of **The Lost Ovenue Coffee** — niet wereldschokkend maar het is wat het is. Niet voor dit alleen reizen — alleen als je toch al weg moet.\n\nTaxi naar Krabi Airport (~30-45 min vanaf Ao Nang). Inchecken voor de vlucht naar Bangkok. Vlucht ~1u15.\n\nZie Bangkok-tab vanaf de aankomst.", "planB": "Vlucht vertraagd: terug naar het resort kan meestal niet meer. Hang op het vliegveld, eet iets, lees. Niet stressen — je bent op vakantie nog steeds.", "not": "Geen Tiger Cave op de vertrekochtend 'omdat we het anders missen'. Geen ochtend-shoppen in Ao Nang. Niet vannacht laat uit — je hebt morgen [pardon: vandaag] een vlucht en de hele Bangkok-week voor je."}]}, "bangkok": {"id": "bangkok", "name": "Bangkok", "dates": "24 — 27 juni", "hotel": "dusitD2 Samyan", "mapCenter": "Sam Yan Bangkok", "intro": "Bangkok werd in 1782 gesticht door koning Rama I als hoofdstad. Thaise naam: 'Krung Thep Maha Nakhon', 'stad van engelen'. Wat Bangkok bijzonder maakt: het werd nooit gekoloniseerd. Daardoor onafgebroken Thaise koninklijke en boeddhistische erfgoedlijn. Tegelijk in 50 jaar van klongs (kanalen) naar 11-miljoen-megapolis met BTS Skytrain en Michelin-restaurants. Maar de oude lagen verdwijnen niet: in een dag een 1700s-Portugese kerk, lunch in Hokkien shophouse, hipster Talat Noi-cafe, en Michelin-diner.", "tip": "Vermijd toeristisch lijstje (Grand Palace, Khao San Road) — focus op markten, foodie deep dive en hippe wijken (Ari, Charoen Krung/Talat Noi, Chinatown). Spits in Bangkok is brutaal: vermijd Grab tussen 16:30-19:30. Neem dan BTS/MRT.", "culture": {"title": "Thaise eet-vocabulaire", "text": "Pad thai: gewokte rijstnoedels met garnalen, ei, pinda — relatief recent (1940s, gepromoot als nationaal gerecht). Tom yum: pittig-zure soep met citroengras, galangal, kaffir-lime. Som tam: groene papaja salade, vissaus, limoen, chili. Pittiger naar het noordoosten (Isaan-stijl). Pad krapow: gewokt vlees met basilicum, knoflook — klassiek lunch over rijst met gebakken ei."}, "places": [{"id": "bk-findfoundfounded", "cat": "koffie", "tag": "hidden", "name": "Findfoundfounded", "area": "Wang Mai (dichtbij hotel)", "desc": "Klein huis op Bantadthong Road, retro details, geen design-theater. Beroemd om hun zelfgebakken sourdough en goede koffie. Doordeweeks rustig, weekend druk."}, {"id": "bk-lacabra", "cat": "koffie", "tag": "topper", "name": "La Cabra Bangkok", "area": "Charoen Krung", "desc": "Deense roastery sinds 2022, in een industriële ruimte naast Mother Roaster en MotherBKK. Minimalistisch, light roasts, single origins van topclass. Een van Bangkok's allerbeste cafés voor serieuze koffie-liefhebbers."}, {"id": "bk-motherroaster", "cat": "koffie", "tag": "normaal", "name": "Mother Roaster Cafe", "area": "Talat Noi", "desc": "In het hart van de Talat Noi mural-zone, Trok San Chao Rong Kueak. Klein, super gezellig. Goede koffie maar de plek is de aantrekkingskracht — om je heen colorful murals."}, {"id": "bk-sydny", "cat": "koffie", "tag": "hidden", "name": "Sydny Bagels", "area": "Charoen Krung 24, Talat Noi", "desc": "Geopend 2024, sourdough bagels in een gerenoveerd oud gebouw. Goed voor breakfast tijdens je Talat Noi-wandeling."}, {"id": "bk-acoffee", "cat": "koffie", "tag": "normaal", "name": "A Coffee Roaster by Li-Bra-Ry", "area": "Warehouse 30", "desc": "In Warehouse 30, een herontwikkelde industriële ruimte. Hipster vibe, goed espresso, naast galerijen en design shops."}, {"id": "bk-nana", "cat": "koffie", "tag": "topper", "name": "NANA Coffee Roasters", "area": "Ari", "desc": "Zalmkleurig bakstenen gebouw op Praditmanoonthum. Eigenaars zijn nationale Thaise barista-kampioenen. Vol, vol, vol — en terecht. Probeer een single origin filter."}, {"id": "bk-porcupine", "cat": "koffie", "tag": "normaal", "name": "Porcupine Café", "area": "Ari", "desc": "Homey hangplek met goede koffie en uitstekende werk-vibe. Klein, gezellig."}, {"id": "bk-glig", "cat": "koffie", "tag": "hidden", "name": "Glig Cafe", "area": "Ari", "desc": "Mooie natuurlijke licht-spot, goede ochtendlicht. Probeer rond 9u voor de beste sfeer. Combineer met NANA en Porcupine voor een Ari café-hop."}, {"id": "bk-ortorkor", "cat": "eten", "tag": "topper", "name": "Or Tor Kor Market", "area": "Naast Chatuchak", "desc": "CNN top fresh markets ter wereld. Niet voor souvenirs maar voor eten en producten. Premium fruit, curry pastes. Eet ter plekke: pad thai gewikkeld in ei, Chiang Mai-worst, satay, gegrilde rivierprawns."}, {"id": "bk-yaowarat", "cat": "eten", "tag": "topper", "name": "Yaowarat (Chinatown) avond", "area": "Chinatown", "desc": "Bangkok's Chinatown na zonsondergang. Hoofdstraat Yaowarat Road wordt loopgebied. T&K Seafood (groene-shirts, beroemd, goedkoop), Nai Ek Roll Noodle (beste kway chap), mango sticky rice. 16-23u. Cash."}, {"id": "bk-thipsamai", "cat": "eten", "tag": "normaal", "name": "Thip Samai Pad Thai", "area": "Phra Nakhon", "desc": "Sinds 1966, vaak 'de originele pad thai' genoemd. Pad thai gewikkeld in een dunne omelet. Klein, druk, ga 17u of na 21u."}, {"id": "bk-kruaapsorn", "cat": "eten", "tag": "topper", "name": "Krua Apsorn", "area": "Phra Nakhon", "desc": "Iconische lokale tent. Hun kao kluk gapi (rijst met garnalenpasta) en jay yao tom yum kung worden vaak genoemd als de beste van de stad. 200-400 baht pp. Geen reserveringen — ga vroeg of laat."}, {"id": "bk-soei", "cat": "eten", "tag": "hidden", "name": "Soei Restaurant", "area": "Phra Nakhon", "desc": "Klein gerund door Aunty Soei (al 40 jaar), authentiek Thais, beroemd om garnalen-cake en pittige curries. Klein, intiem, geen Engels-menu. Geweldige verborgen ervaring."}, {"id": "bk-err", "cat": "eten", "tag": "normaal", "name": "Err Urban Rustic Thai", "area": "Phra Nakhon", "desc": "Modern Thais in een pre-war shophouse vlakbij Wat Pho. Speelse menukaart die Thaise streetfood-klassiekers herinterpretert. Goede cocktails. Reserveer."}, {"id": "bk-8020", "cat": "eten", "tag": "normaal", "name": "80/20", "area": "Chinatown", "desc": "Modern Thai-fusion, één-Michelin-ster. Ingrediënt-gedreven (80% lokaal, 20% import). Tasting menu's, intieme setting. Reserveer."}, {"id": "bk-mother", "cat": "eten", "tag": "splurge", "name": "Mother BKK", "area": "Talat Noi", "desc": "Naast La Cabra Coffee. Modern Thais tasting menu (10 gangen), opulent en elegant. Tapas-stijl met eend, oesters, garnalen, beef tartare. Reserveer 1-2 weken vooruit."}, {"id": "bk-sorn", "cat": "eten", "tag": "splurge", "name": "Sorn", "area": "Sukhumvit", "desc": "Drie Michelin-sterren. Zuid-Thaise tasting menu — totaal andere hoek dan Bangkok-Thais. Pittiger, kokosrijker, regionale ingrediënten uit Phuket. Reserveer 2-3 maanden vooruit. Een van Azië's beste restaurants."}, {"id": "bk-ledu", "cat": "eten", "tag": "splurge", "name": "Le Du", "area": "Silom", "desc": "Eén-Michelin-ster, modern Thais. Chef Ton kookt met seizoens-ingrediënten uit kleine boerderijen. Tasting menu, spannend maar toegankelijk. Reserveer 3-4 weken vooruit."}, {"id": "bk-gaa", "cat": "eten", "tag": "splurge", "name": "Gaa", "area": "Sukhumvit", "desc": "Twee-Michelin-ster, vegetarisch-gedreven (niet exclusief). Indiase chef Garima Arora past Thaise ingrediënten toe. Heel anders dan andere Bangkok-Michelin opties."}, {"id": "bk-nahm", "cat": "eten", "tag": "splurge", "name": "Nahm", "area": "COMO Metropolitan", "desc": "Klassiek Thais door David Thompson. Ooit #1 in Asia 50 Best, nog steeds top. Reserveer 1-2 maanden vooruit."}, {"id": "bk-polo", "cat": "eten", "tag": "normaal", "name": "Polo Fried Chicken", "area": "Lumphini", "desc": "Niet ver van het hotel. Beroemd om gefrituurde kip met knoflook (kai tod hat yai-stijl). Geen sfeer, alle aandacht op de kip."}, {"id": "bk-sabaijai", "cat": "eten", "tag": "normaal", "name": "Sabai Jai Gai Yang", "area": "Ekkamai", "desc": "Authentieke Isaan (noordoost-Thais) — gegrilde kip, papaja-salade, larb. Buiten zit, gerookte sfeer. Lokaal druk."}, {"id": "bk-jayfai", "cat": "eten", "tag": "normaal", "name": "Jay Fai", "area": "Banglamphu", "desc": "Streetfood-stalletje met Michelin-ster, gerund door Auntie Jay Fai (80+, met haar iconische skiing-bril). Beroemd om crab omelette en drunken noodles. Drie uur wachtrij is normaal — reserveer of skip."}, {"id": "bk-walk-talat", "cat": "wandeling", "tag": "topper", "name": "Talat Noi mural & shophouse-loop", "area": "Charoen Krung", "desc": "3-4 uur dwaal-loop door Talat Noi — een van Bangkok's oudste wijken, sinds 2016 een mural-explosie tussen oude auto-onderdelen-winkels en Hokkien-shrines. Niet drukken naar het volgende punt: het is een sfeer-loop. Eindig met koffie bij La Cabra of diner bij Mother BKK.", "distance_km": 2.6, "duration": "1u15 doorlopend, 3-4u met koffie, foto's en shrines", "best_time": "Ochtend 8-10u (zachte licht voor murals) of late middag 16-18u", "avoid": "Niet via Yaowarat Road (hoofdader van Chinatown — druk, geen sfeer). Blijf zuidwaarts in de Charoen Krung-soi's. Niet door Soi Wanit als auto's er net door wringen rond etenstijd.", "rain_plan": "Warehouse 30 is volledig overdekt (galerijen, koffie). Bij stortbui hang daar tot het droogt — dan kom je via Charoen Krung 30 alsnog bij Mother Roaster uit. River City Mall is een minuut weg voor airco en eten.", "coffee_stop": "Sydny Bagels voor ontbijt, Mother Roaster halverwege, La Cabra aan het eind", "waypoints": [{"name": "Hua Lamphong Station", "lat": 13.7378, "lng": 100.517, "note": "Start. Oud-koloniaal station (1916). MRT-uitgang 4. Loop zuid via Charoen Krung."}, {"name": "Warehouse 30", "lat": 13.7311, "lng": 100.5151, "note": "Gerenoveerde industriële hangars met galerijen, A Coffee Roaster, design shops."}, {"name": "Sydny Bagels", "lat": 13.7321, "lng": 100.5145, "note": "Optionele ontbijt-stop. Sourdough bagels in oud pand. Lekker als je vroeg bent."}, {"name": "Trok San Chao Rong Kueak", "lat": 13.734, "lng": 100.5146, "note": "Mural-steeg, hart van Talat Noi. Loop langzaam, kijk omhoog en op de muren."}, {"name": "Mother Roaster Cafe", "lat": 13.7341, "lng": 100.5142, "note": "Koffie-stop tussen de murals. Klein, gezellig, perfecte halverwege-pauze."}, {"name": "Antique Turtle Car", "lat": 13.7335, "lng": 100.5138, "note": "Verroeste Fiat 500 tegen een muur. Iconisch Talat Noi-fotopunt. 5 min stop."}, {"name": "Chow Sue Kong Shrine", "lat": 13.734, "lng": 100.5142, "note": "Hokkien-shrine uit 1804. Oudste in de wijk. Rust, wierook, koele binnenplaats."}, {"name": "So Heng Tai Mansion", "lat": 13.7341, "lng": 100.5132, "note": "200 jaar oud Hokkien-koopmanshuis met binnenplaats. 50 baht (drankje inbegrepen)."}, {"name": "La Cabra Bangkok", "lat": 13.7305, "lng": 100.5159, "note": "Eindpunt. Deense roastery, top-class koffie. Naast Mother BKK (diner-optie)."}], "gmaps_url": "https://www.google.com/maps/dir/13.7378,100.517/13.7311,100.5151/13.7321,100.5145/13.734,100.5146/13.7341,100.5142/13.7335,100.5138/13.734,100.5142/13.7341,100.5132/13.7305,100.5159/data=!4m2!4m1!3e2"}, {"id": "bk-walk-yaowarat", "cat": "wandeling", "tag": "topper", "name": "Yaowarat / Chinatown bij avond", "area": "Chinatown", "desc": "1.5-2 uur eet-loop door Bangkok's Chinatown na zonsondergang. Ga om 18u, eet onderweg bij vier of vijf stalletjes en plekken, vingerwijzen waar nodig. Cash. Geen menu te lezen — kies waar locals staan.", "distance_km": 1.3, "duration": "45 min doorlopend, 2-3u met meerdere eet-stops", "best_time": "Avond vanaf 18u. Stalletjes openen rond zonsondergang, zijn op 's avonds 20-22u op hun hoogtepunt.", "avoid": "Niet de drukste stuk van Yaowarat Road tussen Soi 11 en Soi Texas tijdens spits (19-20u, schouder-aan-schouder). Stap aan elke kant in een soi voor rustigere stalletjes.", "rain_plan": "Veel stalletjes hebben tarps; T&K Seafood en de meeste sit-down spots zijn overdekt. Maar de echte sfeer is droog — bij stortbui ga je naar 80/20 of Tep Bar in plaats van straat-eten.", "food_stop": "T&K Seafood (oysters, garnalen), Nai Ek Roll Noodle (kway chap), Khao Niaow Mamuang Kor Panich (mango sticky rice)", "waypoints": [{"name": "Wat Mangkon MRT (uitgang 1)", "lat": 13.7416, "lng": 100.5099, "note": "Start. MRT Blauwe Lijn. Uitgang 1 zet je direct in Soi Charoen Krung."}, {"name": "Wat Mangkon Kamalawat", "lat": 13.7425, "lng": 100.5094, "note": "Belangrijkste Chinese tempel van Bangkok (1871). Kort kijken in de schemering."}, {"name": "Yaowarat Road (hoofdader)", "lat": 13.741, "lng": 100.5099, "note": "Hier begint de echte streetfood-actie. Loop oostelijk richting Odeon Circle."}, {"name": "T&K Seafood", "lat": 13.7407, "lng": 100.5103, "note": "Groene-shirts hoekstalletje. Garnalen, oesters in scharrelei. Cash, plastic stoel."}, {"name": "Nai Ek Roll Noodle", "lat": 13.7411, "lng": 100.5108, "note": "Beste kway chap (Chinese darmnoedelsoep) van de stad. 24 uur open."}, {"name": "Khao Niaow Mamuang Kor Panich", "lat": 13.7414, "lng": 100.5113, "note": "Mango sticky rice sinds 1932. Dichtbij eind van Yaowarat. Afsluit-snack."}, {"name": "Odeon Circle (Chinatown Gate)", "lat": 13.7392, "lng": 100.5132, "note": "Eindpunt. Grote Chinese poort. Grab of MRT terug via Hua Lamphong."}], "gmaps_url": "https://www.google.com/maps/dir/13.7416,100.5099/13.7425,100.5094/13.741,100.5099/13.7407,100.5103/13.7411,100.5108/13.7414,100.5113/13.7392,100.5132/data=!4m2!4m1!3e2"}, {"id": "bk-walk-ari", "cat": "wandeling", "tag": "normaal", "name": "Ari café-hop", "area": "Ari", "desc": "1.5-2 uur ochtend-café-loop in Bangkok's hipste wijk. Niet voor de attracties (die zijn er niet) — voor de cafés en de zijstraten waar de echte stad zit. Doe het tegen 9u, vóór de hitte.", "distance_km": 1.6, "duration": "45 min doorlopend, 1.5-2.5u met twee koffies en zijstraat-bummel", "best_time": "Ochtend 9-11u. NANA opent 8u, de meeste anderen rond 9u.", "avoid": "Niet via Phaholyothin Road zelf (hoofdverkeer 6 banen). Blijf in de soi's: Inthamara, Aree Soi 1, Aree Soi 2, Phaholyothin Soi 7. Daar zit alles wat de wijk maakt.", "rain_plan": "Alle cafés zijn binnen (NANA en Porcupine hebben grote zit-zones). La Villa mall is om de hoek voor airco-pauze. Bij stortbui hop je tussen cafés in plaats van zijstraten te dwalen.", "coffee_stop": "Drie koffies is genoeg — kies twee uit NANA / Porcupine / Glig", "waypoints": [{"name": "BTS Ari (uitgang 3)", "lat": 13.78, "lng": 100.5453, "note": "Start. Uitgang 3 brengt je direct op Phaholyothin Soi 7."}, {"name": "NANA Coffee Roasters", "lat": 13.7831, "lng": 100.5443, "note": "Zalmkleurig bakstenen gebouw. Nationale barista-kampioenen. Single origin filter."}, {"name": "Porcupine Café", "lat": 13.7806, "lng": 100.5439, "note": "Homey, gezellig. Werk-vibe maar niet stil. Tweede koffie."}, {"name": "Inthamara Soi (zijstraat)", "lat": 13.779, "lng": 100.544, "note": "Loop hier door — kleine ateliers, lokale restaurants, ouderwetse shophouses. Echte Ari."}, {"name": "Glig Cafe", "lat": 13.7787, "lng": 100.543, "note": "Mooie natuurlijke lichten, rustig. Eindpunt of derde koffie (als je durft)."}, {"name": "Salt Ari", "lat": 13.7799, "lng": 100.5437, "note": "Lunch-optie als je rond 11:30u toe bent. Modern brunch-stijl. Of skippen en lokaal noedeltentje."}], "gmaps_url": "https://www.google.com/maps/dir/13.78,100.5453/13.7831,100.5443/13.7806,100.5439/13.779,100.544/13.7787,100.543/13.7799,100.5437/data=!4m2!4m1!3e2"}, {"id": "bk-chatuchak", "cat": "activiteit", "tag": "topper", "name": "Chatuchak Weekend Market", "area": "Mo Chit", "desc": "World's largest weekend market: 15.000 stalletjes, 27 secties. Alles van vintage-kleren tot bonsai-bomen. Open zaterdag en zondag 9-18u. Combineer met Or Tor Kor (eten). Vrijdagavond is wholesale night market 18-24u, betere prijzen, koeler weer — past goed in jullie schema. BTS Mo Chit."}, {"id": "bk-foodtour", "cat": "activiteit", "tag": "normaal", "name": "Bangkok Food Tour", "area": "Diverse", "desc": "Voor je foodie deep dive: 'Bangkok Food Tours by Foodie' (Chinatown), 'A Chef's Tour' (Phra Nakhon, modern), of 'Bike & Bites'. €60-100 pp. Boek voor de eerste avond — daarna weet je waar je terug wilt."}, {"id": "bk-watpho", "cat": "activiteit", "tag": "normaal", "name": "Wat Pho", "area": "Phra Nakhon", "desc": "Reclining Buddha (46m lang, vergulde steen). Indrukwekkender dan het Grand Palace en veel rustiger. Ga 8-9u voor minder mensen. 1-1.5u."}, {"id": "bk-jimthompson", "cat": "activiteit", "tag": "hidden", "name": "Jim Thompson House", "area": "Siam", "desc": "Klein museum in een traditioneel Thais houten huis. Jim Thompson was een Amerikaanse OSS-officier die de Thaise zijde-industrie nieuw leven inblies. Verdween mysterieus in 1967 in Cameron Highlands. 1-1.5u, dichtbij MBK/Siam. 200 baht."}, {"id": "bk-watarun", "cat": "activiteit", "tag": "normaal", "name": "Wat Arun (zonsondergang)", "area": "Thonburi", "desc": "Tempel van de Dageraad, ironisch het mooist bij zonsondergang. Aan de overkant van de rivier vanaf Wat Pho. Khmer-stijl prang bedekt met scherven van keramiek. Beklim de eerste niveau."}, {"id": "bk-lumphini", "cat": "activiteit", "tag": "hidden", "name": "Lumphini Park (vroege ochtend)", "area": "Centrum", "desc": "Bangkok's Central Park, 10 min lopen vanaf het hotel. 5-7u: Tai Chi groepen, joggers, monitor-hagedissen langs paden. Goede ochtendloop voor Vincent: 2-2.5 km rondom park."}, {"id": "bk-klong", "cat": "activiteit", "tag": "topper", "name": "Klong (kanaal) tour Thonburi", "area": "Thonburi", "desc": "Bangkok was de 'Venice of the East' — gebouwd op kanalen. Aan de overkant van Chao Phraya (Thonburi) bestaat dit oude netwerk nog. Longtail boat tour van 1.5-2u langs houten paalwoningen, kleine tempels en lokaal leven. Probeer Co van Kessel of 'Hidden Bangkok' — beide gerespecteerd. ~700-1000 baht pp. Vroege ochtend voor mooiste licht."}, {"id": "bk-watpaknam", "cat": "activiteit", "tag": "hidden", "name": "Wat Paknam (Big Buddha)", "area": "Phasi Charoen", "desc": "Een van Bangkok's recentere virale spots: gigantische zittende Boeddha (69m) en de spectaculaire glazen smaragd-pagode op verdieping 5 van de stupa (sinds 2019). Bereikbaar via MRT Bang Phai of als onderdeel van een klong-tour. Gratis. Beste 9-10u voor licht in de pagode."}, {"id": "bk-massage", "cat": "activiteit", "tag": "normaal", "name": "Thaise massage", "area": "Diverse", "desc": "Goedkoop, goed, overal. Voor traditioneel Thais: Wat Pho Thai Traditional Massage School (gerespecteerd, klassieke training, 480 baht/u). Voor luxe: Health Land (chain, 650 baht/u, schoner dan straat-spas). Voor charmant: Asia Herb Association (kruiden-massage, sfeervolle setting)."}, {"id": "bk-mimis", "cat": "drinks", "tag": "normaal", "name": "Mimi's Rooftop Bar", "area": "dusitD2 Samyan", "desc": "Boven jullie hotel — Miami-thema, opzettelijk kitsch, maar de view en cocktails zijn echt. Goed voor een eerste of laatste avond drink zonder ergens heen te hoeven."}, {"id": "bk-sky", "cat": "drinks", "tag": "topper", "name": "Sky Bar (Lebua)", "area": "Bang Rak", "desc": "Hangover-2-fame. Verdieping 64. Geen reservering nodig (alleen drinks bar), wel dresscode (geen shorts/slippers). Cocktails ~600 baht, het uitzicht over Chao Phraya is jaw-dropping. Ga rond 18:30u voor zonsondergang."}, {"id": "bk-vesper", "cat": "drinks", "tag": "normaal", "name": "Vesper", "area": "Silom", "desc": "Pre-Prohibition cocktails in een elegante setting. Top-50 World's Best Bars meermaals. Stevige prijzen maar serieuze drinks. Reserveer."}, {"id": "bk-tep", "cat": "drinks", "tag": "hidden", "name": "Tep Bar", "area": "Charoen Krung", "desc": "Een Thaise-georiënteerde bar met live Thaise traditionele muziek (loek thung, mor lam). Cocktails op basis van Thaise alcoholen (lao khao, sato). Kleine ruimte, intiem, in een heritage shophouse. Een van Bangkok's meest authentieke avonden."}, {"id": "bk-teens", "cat": "drinks", "tag": "hidden", "name": "Teens of Thailand", "area": "Soi Nana, Chinatown", "desc": "Speakeasy gespecialiseerd in gin. Achter een rode deur. Klein, druk, donker. Hun lijst aan eigen-huis-gins is uniek."}, {"id": "bk-bamboo", "cat": "drinks", "tag": "splurge", "name": "Bamboo Bar (Mandarin Oriental)", "area": "Bang Rak", "desc": "Eén van Azië's oudste cocktail bars, sinds 1953. Live jazz elke avond. Klassiek, formeel, smoking jacket-vibe. Voor een speciaal moment."}, {"id": "bk-octave", "cat": "drinks", "tag": "normaal", "name": "Octave Rooftop", "area": "Marriott Sukhumvit", "desc": "Goedkoper alternatief voor Sky Bar, ook spectaculair uitzicht. Cocktails ~400 baht, minder formeel."}, {"id": "bk-walk-grand-loop", "cat": "wandeling", "tag": "topper", "name": "Old City Loop (lange wandeling)", "area": "Talat Noi → Chinatown → bloemmarkt → Wat Pho", "desc": "Één lange dwaalroute die de oude lagen van Bangkok aan elkaar rijgt: van de murals en Hokkien-shrines van Talat Noi, door de drukte van Chinatown en Sampeng Lane, langs Little India en de bloemmarkt, tot je eindigt bij de liggende Boeddha van Wat Pho. Een sfeer-loop, geen trek-route — stop overal. Vroeg voor zacht licht, of late middag.", "intensity": "stevig", "distance_km": 7.2, "duration": "Wandelen ~2u30 (5 km/u). Met koffie, shrines, eten en Wat Pho: 4-6u.", "best_time": "Ochtend 8-11u (zacht licht, koeler) of late middag vanaf 16u. Wat Pho sluit ~18:30u — timing checken.", "midpoint": "Wat Mangkon (Chinatown)", "avoid": "Niet de drukste Yaowarat Road in de avondspits volgen — duik in de soi's. Sampeng Lane is in het weekend schouder-aan-schouder; doordeweeks rustiger.", "rain_plan": "Eerste helft: schuil in Warehouse 30 (overdekt, koffie). Tweede helft: Sampeng Lane en Phahurat zijn grotendeels overdekt; bij stortbui MRT Sanam Chai naar Wat Pho.", "coffee_stop": "Mother Roaster of La Cabra in Talat Noi (deel 1). Daarna is het streetfood en tempels — geen specialty meer.", "food_stop": "Streetfood in Yaowarat (T&K Seafood, Nai Ek) en mango sticky rice onderweg.", "waypoints_part1": [{"name": "Hua Lamphong Station", "lat": 13.7378, "lng": 100.517, "note": "Start. Oud-koloniaal station (1916). Loop zuid Charoen Krung in, richting Talat Noi."}, {"name": "So Heng Tai Mansion", "lat": 13.7341, "lng": 100.5132, "note": "200 jaar oud Hokkien-koopmanshuis met binnenplaats (50 baht, drankje inbegrepen)."}, {"name": "Antique Turtle Car", "lat": 13.7335, "lng": 100.5138, "note": "Verroeste Fiat tegen een muur — iconisch Talat Noi-fotopunt. Korte stop."}, {"name": "Trok San Chao Rong Kueak (murals)", "lat": 13.734, "lng": 100.5146, "note": "Mural-steeg, hart van Talat Noi. Loop langzaam, kijk omhoog en op de muren."}, {"name": "Mother Roaster Cafe", "lat": 13.7341, "lng": 100.5142, "note": "Koffie tussen de murals. Klein en gezellig."}, {"name": "Chow Sue Kong Shrine", "lat": 13.734, "lng": 100.5142, "note": "Hokkien-shrine uit 1804, oudste in de wijk. Wierook, koele binnenplaats."}, {"name": "Wat Mangkon Kamalawat", "lat": 13.7425, "lng": 100.5094, "note": "Halverwege. Belangrijkste Chinese tempel van Bangkok (1871). Hier kantelt de route van Talat Noi naar Chinatown."}], "waypoints_part2": [{"name": "Wat Mangkon (vertrek deel 2)", "lat": 13.7425, "lng": 100.5094, "note": "Opnieuw vertrekpunt. Duik Yaowarat in."}, {"name": "Yaowarat Road (streetfood)", "lat": 13.741, "lng": 100.5099, "note": "Het hart van Chinatown. Bij avond: T&K Seafood, Nai Ek. Vingerwijzen, proeven, doorlopen."}, {"name": "Sampeng Lane (Soi Wanit 1)", "lat": 13.7417, "lng": 100.5059, "note": "Smalle markt-steeg parallel aan Yaowarat. Groothandel-chaos, doordeweeks doenlijk."}, {"name": "Phahurat (Little India)", "lat": 13.7434, "lng": 100.5016, "note": "Bangkoks Little India — sari's, textiel, Sikh-tempel, geur van masala. Korte sprong vanaf Sampeng."}, {"name": "Pak Khlong Talat (bloemmarkt)", "lat": 13.7405, "lng": 100.4972, "note": "Grootste bloemmarkt van Thailand, 24u open. Jasmijn, orchideeën, marigolds. Foto bij elke hoek."}, {"name": "Wat Pho (liggende Boeddha)", "lat": 13.7412, "lng": 100.4895, "note": "Eindpunt. 46m vergulde liggende Boeddha, rustiger en indrukwekkender dan het Grand Palace."}], "gmaps_url_part1": "https://www.google.com/maps/dir/13.7378,100.517/13.7341,100.5132/13.7335,100.5138/13.734,100.5146/13.7341,100.5142/13.734,100.5142/13.7425,100.5094/data=!4m2!4m1!3e2", "gmaps_url_part2": "https://www.google.com/maps/dir/13.7425,100.5094/13.741,100.5099/13.7417,100.5059/13.7434,100.5016/13.7405,100.4972/13.7412,100.4895/data=!4m2!4m1!3e2"}], "days": [{"date": "Woensdag 24 juni", "character": "De aankomstdag (zie ook Krabi-tab)", "what": "Korte vlucht uit Krabi, Grab naar Sam Yan, inchecken, een paar uur rust, dan een avond in Yaowarat voor je eerste echte Bangkok-foodavond.", "why": "Krabi → Bangkok is maar 1u15 vluchten, en jullie hebben in Krabi geen vroege start nodig. Dat betekent: rond 12-13u landen in Suvarnabhumi, 45 min Grab naar het hotel, ingecheckt rond 14-15u. Een halve middag rust, en dan een avond die meteen laat zien waar Bangkok om gaat. Geen tempels op aankomstdag, geen markten, geen Grand Palace (sowieso geen Grand Palace deze reis). Het beste van Bangkok op aankomst is Chinatown 's avonds — energie, eten, niet te ver van het hotel, en je krijgt direct de stad in zijn meest karakteristieke vorm.", "flow": "Aankomst Suvarnabhumi rond middag. Grab naar **dusitD2 Samyan** (~45 min, ~400 baht). De ringweg in de middag is een gok — kan vlot, kan een uur
