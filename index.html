<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vakantiegids">
<title>Vakantiegids · Maleisië & Thailand 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark only;
    /* Background - now true black for max contrast */
    --bg: #000000;
    --bg-elev: #18171f;
    --bg-card: #1f1d2a;
    --bg-card-hover: #2c2939;
    --border: #3a3650;
    --border-strong: #4d4865;
    /* Text - maximum contrast */
    --text: #ffffff;
    --text-dim: #e8e2f0;
    --text-muted: #b8b0c8;
    /* Accents - brighter for legibility */
    --accent: #ffc77a;
    --accent-soft: rgba(255, 199, 122, 0.16);
    --teal: #88d0d0;
    --teal-soft: rgba(136, 208, 208, 0.16);
    --mauve: #cdb8e8;
    --topper: #ffc466;
    --topper-soft: rgba(255, 196, 102, 0.22);
    --hidden: #9adba8;
    --hidden-soft: rgba(154, 219, 168, 0.20);
    --splurge: #e0aae0;
    --splurge-soft: rgba(224, 170, 224, 0.20);
    --fav: #ffd166;
    --done: #88d0d0;
    --link: #b4d2f4;
    --r: 16px;
    --r-sm: 12px;
    --r-xs: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  /* Force dark color scheme; prevents iOS Safari from auto-inverting */
  html { background: #000; color-scheme: dark; }

  button, input, textarea, select {
    -webkit-appearance: none;
    appearance: none;
    font: inherit;
    color: inherit;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
  }

  body { padding-bottom: 90px; }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10, 10, 15, 0.94);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    padding-top: max(14px, env(safe-area-inset-top));
  }
  .header-inner { max-width: 720px; margin: 0 auto; }
  .header-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
    gap: 12px;
  }
  .header-title-block { min-width: 0; flex: 1; }
  .header-title { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .header-dates { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
  .header-stats {
    display: flex; gap: 6px;
    flex-shrink: 0;
  }
  .stat-pill {
    display: flex; align-items: center; gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
  }
  .stat-pill .icon { font-size: 12px; }
  .stat-pill .count { color: var(--accent); }

  /* SEARCH */
  .search-wrap { position: relative; }
  .search {
    width: 100%;
    background: var(--bg-card) !important;
    border: 1px solid var(--border-strong);
    color: var(--text) !important;
    padding: 12px 38px 12px 40px;
    border-radius: var(--r-sm);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: all 0.15s;
    -webkit-appearance: none;
    appearance: none;
    -webkit-text-fill-color: var(--text);
  }
  .search::placeholder { color: var(--text-muted); opacity: 1; }
  .search::-webkit-input-placeholder { color: var(--text-muted); }
  .search:-moz-placeholder { color: var(--text-muted); opacity: 1; }
  .search::-moz-placeholder { color: var(--text-muted); opacity: 1; }
  .search::-webkit-search-cancel-button,
  .search::-webkit-search-decoration { -webkit-appearance: none; display: none; }
  .search:focus {
    border-color: var(--accent);
    background: var(--bg-elev) !important;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none; font-size: 14px;
  }
  .search-clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: var(--border-strong); color: var(--text); border: none;
    width: 26px; height: 26px; border-radius: 50%;
    display: none; cursor: pointer; font-size: 18px; line-height: 1;
    align-items: center; justify-content: center;
    font-family: inherit;
  }
  .search-clear.active { display: flex; }

  /* TABS */
  .tabs-wrap {
    background: var(--bg);
    position: sticky; top: 0; z-index: 90;
    border-bottom: 1px solid var(--border);
  }
  .tabs {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 12px 16px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    max-width: 720px; margin: 0 auto;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    background: var(--bg-card);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 9px 14px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tab:hover { background: var(--bg-card-hover); color: var(--text); }
  .tab.active {
    background: var(--accent);
    color: #1a1518;
    border-color: var(--accent);
  }
  .tab.fav-tab.active {
    background: var(--fav);
    border-color: var(--fav);
    color: #1a1518;
  }
  .tab .badge {
    display: inline-block;
    background: rgba(0,0,0,0.22); color: inherit;
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
    font-weight: 700;
    min-width: 18px; text-align: center;
  }
  .tab:not(.active) .badge { background: var(--border-strong); color: var(--text-dim); }

  /* CONTENT */
  .content {
    padding: 16px;
    max-width: 720px;
    margin: 0 auto;
  }
  .section { display: none; animation: fadeIn 0.18s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, rgba(184, 165, 216, 0.12), rgba(108, 184, 184, 0.10));
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 22px;
    margin-bottom: 16px;
  }
  .hero-name {
    font-size: 30px; font-weight: 800; letter-spacing: -0.025em;
    margin-bottom: 6px; color: var(--text);
    line-height: 1.15;
  }
  .hero-meta { font-size: 13px; color: var(--accent); margin-bottom: 14px; font-weight: 600; }
  .hero-intro { font-size: 15px; color: var(--text-dim); line-height: 1.65; }

  /* TODAY BANNER */
  .today-banner {
    background: linear-gradient(135deg, var(--accent-soft), var(--teal-soft));
    border: 1px solid var(--accent);
    border-radius: var(--r);
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .today-icon { font-size: 22px; }
  .today-text { flex: 1; font-size: 13.5px; }
  .today-text strong { color: var(--accent); display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .today-text .now { color: var(--text); font-weight: 600; }

  /* TIP */
  .tip {
    border-left: 3px solid var(--teal);
    background: var(--teal-soft);
    padding: 14px 16px;
    border-radius: var(--r-sm);
    margin: 14px 0;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }
  .tip strong { color: var(--teal); display: block; margin-bottom: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }

  /* CULTURE */
  .culture {
    background: var(--bg-card);
    border-radius: var(--r);
    padding: 18px;
    margin: 14px 0;
    border: 1px solid var(--border);
  }
  .culture h4 { color: var(--mauve); font-size: 14.5px; margin-bottom: 8px; font-weight: 700; }
  .culture p { font-size: 14px; color: var(--text-dim); line-height: 1.65; }

  /* MAP OVERVIEW */
  .map-overview {
    margin: 14px 0;
    background: linear-gradient(135deg, var(--accent-soft), var(--teal-soft));
    border: 1px solid var(--border-strong);
    border-radius: var(--r);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s;
  }
  .map-overview:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .map-overview-icon { font-size: 28px; }
  .map-overview-text strong { display: block; font-size: 14.5px; color: var(--text); font-weight: 700; }
  .map-overview-text span { font-size: 13px; color: var(--text-dim); margin-top: 3px; display: block; font-weight: 500; }
  .map-overview-arrow { color: var(--text-muted); font-size: 20px; }

  /* FILTERS */
  .filters {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin: 12px 0;
  }
  .filter {
    background: var(--bg-card);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 12.5px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter:hover { border-color: var(--text-muted); color: var(--text); }
  .filter.active {
    background: var(--accent);
    color: #1a1518;
    border-color: var(--accent);
  }
  .filter-tag-topper.active { background: var(--topper); border-color: var(--topper); color: #1a1518; }
  .filter-tag-hidden.active { background: var(--hidden); border-color: var(--hidden); color: #1a1518; }
  .filter-tag-splurge.active { background: var(--splurge); border-color: var(--splurge); color: #1a1518; }

  /* H2 - section titles */
  .h2 {
    font-size: 19px;
    font-weight: 700;
    color: var(--teal);
    margin: 28px 0 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.015em;
  }

  /* PLACE CARD */
  .place {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 12px;
    transition: all 0.15s;
    position: relative;
  }
  .place.done { opacity: 0.55; }
  .place.fav { border-color: rgba(255, 196, 102, 0.5); background: linear-gradient(180deg, rgba(255, 196, 102, 0.04), var(--bg-card)); }
  .place-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; margin-bottom: 10px;
  }
  .place-title-wrap { flex: 1; min-width: 0; }
  .place-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .place-meta { font-size: 12.5px; color: var(--text-dim); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; font-weight: 500; }
  .place-area { color: var(--accent); font-weight: 600; }
  .place-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .place-tag.topper { background: var(--topper-soft); color: var(--topper); }
  .place-tag.hidden { background: var(--hidden-soft); color: var(--hidden); }
  .place-tag.splurge { background: var(--splurge-soft); color: var(--splurge); }
  .place-cat { color: var(--text-dim); font-weight: 500; }
  .place-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .place-btn {
    background: var(--bg-elev); border: 1px solid var(--border);
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: var(--text-dim);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .place-btn:hover { background: var(--bg-card-hover); color: var(--text); }
  .place-btn.fav.active { background: var(--fav); border-color: var(--fav); color: #1a1518; }
  .place-btn.done.active { background: var(--done); border-color: var(--done); color: white; }
  .place-desc { font-size: 14px; color: var(--text-dim); line-height: 1.62; }

  .place-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--link); text-decoration: none; font-size: 13px;
    font-weight: 600;
    margin-top: 10px; padding: 7px 12px;
    background: rgba(158, 195, 240, 0.1);
    border: 1px solid rgba(158, 195, 240, 0.25);
    border-radius: 8px;
    transition: all 0.15s;
  }
  .place-link:hover { background: rgba(158, 195, 240, 0.18); border-color: rgba(158, 195, 240, 0.45); }

  .place-loc-tag {
    display: inline-block;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-elev);
    padding: 2px 8px;
    border-radius: 6px;
    margin-bottom: 6px;
    font-weight: 600;
  }

  /* SCHEDULE */
  .schedule {
    background: var(--bg-card);
    border-radius: var(--r);
    overflow: hidden;
    border: 1px solid var(--border);
    margin: 14px 0;
  }
  .schedule-row {
    display: grid;
    grid-template-columns: 90px 1fr 50px;
    gap: 10px;
    padding: 13px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
    align-items: center;
  }
  .schedule-row:last-child { border-bottom: none; }
  .schedule-row.head { background: var(--bg-elev); font-weight: 700; color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .schedule-row.current { background: var(--accent-soft); }
  .schedule-row.current .schedule-place { color: var(--accent); }
  .schedule-date { color: var(--accent); font-weight: 600; }
  .schedule-place { color: var(--text); font-weight: 600; }
  .schedule-hotel { color: var(--text-muted); font-size: 12px; margin-top: 2px; font-weight: 500; }
  .schedule-days { text-align: right; color: var(--text-dim); font-weight: 600; }

  /* DAYS / CHECKLIST */
  .day {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .day.today { border-color: var(--accent); }
  .day-head {
    padding: 14px 16px;
    background: var(--bg-elev);
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .day.today .day-head { background: var(--accent-soft); }
  .day-title { font-size: 14.5px; font-weight: 700; color: var(--accent); }
  .day-today-badge {
    display: inline-block; background: var(--accent); color: #1a1518;
    font-size: 10px; padding: 2px 7px; border-radius: 6px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    margin-left: 8px;
  }
  .day-progress { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
  .day-arrow { color: var(--text-muted); transition: transform 0.2s; font-size: 14px; }
  .day.open .day-arrow { transform: rotate(180deg); }
  .day-items { display: none; padding: 10px 16px 14px; }
  .day.open .day-items { display: block; }
  .day-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
    cursor: pointer;
  }
  .day-item:last-child { border-bottom: none; }
  .day-check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 1.5px solid var(--text-muted);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .day-check.done { background: var(--done); border-color: var(--done); }
  .day-check.done::after { content: "✓"; color: white; font-size: 14px; font-weight: 800; }
  .day-text { color: var(--text); flex: 1; line-height: 1.45; font-weight: 500; }
  .day-item.done .day-text { text-decoration: line-through; color: var(--text-muted); }

  /* WALK DETAILS (uitgebreide wandeling-cards) */
  .walk-meta {
    display: flex; flex-wrap: wrap; gap: 6px 10px;
    margin: 10px 0 12px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .walk-meta-item {
    background: var(--accent-soft);
    color: var(--text-dim);
    padding: 4px 9px;
    border-radius: 6px;
    font-weight: 500;
    white-space: nowrap;
  }
  .walk-meta-item strong { color: var(--accent); font-weight: 700; margin-right: 4px; }

  .walk-section {
    margin: 12px 0 0;
    padding: 10px 12px;
    background: rgba(255, 255, 255, 0.025);
    border-left: 2px solid var(--border-strong);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-dim);
  }
  .walk-section-label {
    display: block;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 3px;
  }

  .walk-waypoints {
    margin: 14px 0 6px;
    counter-reset: wp;
    list-style: none;
    padding: 0;
  }
  .walk-waypoint {
    position: relative;
    padding: 10px 0 10px 32px;
    border-bottom: 1px dashed var(--border);
    counter-increment: wp;
  }
  .walk-waypoint:last-child { border-bottom: none; }
  .walk-waypoint::before {
    content: counter(wp);
    position: absolute;
    left: 0; top: 10px;
    width: 22px; height: 22px;
    background: var(--accent);
    color: #1a1518;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 800;
  }
  .walk-waypoint-name {
    font-weight: 600;
    color: var(--text);
    font-size: 13.5px;
    line-height: 1.4;
  }
  .walk-waypoint-note {
    font-style: italic;
    color: var(--text-muted);
    font-size: 12.5px;
    margin-top: 3px;
    line-height: 1.5;
  }

  .walk-maps-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--accent);
    color: #1a1518;
    text-decoration: none;
    padding: 13px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    margin-top: 14px;
    width: 100%;
    box-sizing: border-box;
  }
  .walk-maps-btn:active { opacity: 0.8; }
  .walk-maps-btn + .walk-maps-btn { margin-top: 8px; }

  .walk-intensity-badge {
    background: var(--topper-soft);
    color: var(--topper);
    border: 1px solid var(--topper);
    padding: 4px 9px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 12px;
    white-space: nowrap;
  }
  .walk-midpoint-divider {
    list-style: none;
    text-align: center;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 12px 4px;
    margin: 6px 0;
    border-top: 1px dashed var(--border-strong);
    border-bottom: 1px dashed var(--border-strong);
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .empty-icon { font-size: 38px; margin-bottom: 10px; opacity: 0.5; }

  /* INTRO PAGE */
  .intro-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 18px;
    margin-bottom: 12px;
  }
  .intro-card h3 { color: var(--accent); font-size: 15px; margin-bottom: 10px; font-weight: 700; }
  .intro-card ul { list-style: none; padding: 0; }
  .intro-card li {
    padding: 9px 0;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.6;
    border-bottom: 1px solid var(--border);
  }
  .intro-card li:last-child { border-bottom: none; }
  .intro-card li strong { color: var(--text); }

  .legend-row {
    display: flex; gap: 10px; align-items: center;
    padding: 9px 0;
    font-size: 14px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  .legend-row:last-child { border-bottom: none; }
  .legend-tag {
    font-size: 10px; padding: 3px 9px; border-radius: 8px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    flex-shrink: 0; min-width: 75px; text-align: center;

  /* RESET */
  .reset-bar { margin: 32px 0 16px; text-align: center; }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);

    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--text-dim); }

  /* COUNT */

  .fav-route-card h3 { font-size: 14px; color: var(--fav); margin-bottom: 6px; font-weight: 700; }

    font-size: 13px;
    font-weight: 700;
  }

  .fav-loc-group { margin-bottom: 24px; }

    font-size: 13px;

    padding: 0 4px;
  }
  .fav-loc-title .count { color: var(--text-muted); margin-left: 8px; font-weight: 500; }

  /* FLOATING ACTION BUTTON */
  .fab {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom));
    right: 16px;
    background: var(--accent);
    color: #1a1518;
    border: none;
    border-radius: 50%;
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;

    font-family: inherit;
    z-index: 50;
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
  }
  .fab.visible { opacity: 1; pointer-events: auto; }
  .fab:hover { transform: scale(1.05); }
  .fab:active { transform: scale(0.95); }

  /* RESPONSIVE */
  @media (min-width: 720px) {
    .hero-name { font-size: 34px; }
    body { font-size: 16px; }
  }

  .day.rich .day-head { padding: 14px 16px; }
  .day-character {
    font-size: 12.5px; color: var(--text-muted); margin-top: 3px;

  .day.rich.today .day-character { color: var(--accent); }
  .day-body { display: none; padding: 4px 16px 18px; }
  .day.rich.open .day-body { display: block; }
  .day-section {

  .day-section:first-child { border-top: none; padding-top: 6px; }
  .day-section-label {
    font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--accent); margin-bottom: 6px;

  .day-section.planb .day-section-label { color: #fbbf24; }
  .day-section.notdo .day-section-label { color: #f87171; }
  .day-section.flow .day-section-label { color: var(--accent); }
  .day-section p {
    color: var(--text); font-size: 14px; line-height: 1.6;
    margin: 0 0 10px;
  }
  .day-section p:last-child { margin-bottom: 0; }
  .day-place {
    color: var(--accent); font-weight: 700;
  }

</style>

<script>const TRIP_DATA = {"meta": {"title": "Maleisië & Thailand 2026", "dates": "5 — 27 juni 2026", "locations": ["intro", "kl", "penang", "langkawi", "kohlipe", "krabi", "bangkok"]}, "schedule": [{"date": "5 jun (vr)", "place": "Vliegtuig", "hotel": "—", "days": "—"}, {"date": "6-9 jun", "place": "Kuala Lumpur", "hotel": "KLoé Hotel", "days": "3"}, {"date": "9-13 jun", "place": "Penang (George Town)", "hotel": "Manhattan 2BR", "days": "4"}, {"date": "13-17 jun", "place": "Langkawi", "hotel": "Vila Kelapa", "days": "3.5"}, {"date": "17-22 jun", "place": "Koh Lipe", "hotel": "Mali Resort Sunrise Beach", "days": "4.5"}, {"date": "22-24 jun", "place": "Krabi / Aonang Hill", "hotel": "Ban Sainai Resort", "days": "1.5"}, {"date": "24-27 jun", "place": "Bangkok", "hotel": "dusitD2 Samyan", "days": "2.5"}, {"date": "27 jun (za)", "place": "Naar huis", "hotel": "—", "days": "—"}], "locations": {"kl": {"id": "kl", "name": "Kuala Lumpur", "dates": "6 — 9 juni", "hotel": "KLoé Hotel, Bukit Bintang", "mapCenter": "Kuala Lumpur Bukit Bintang", "intro": "KL betekent letterlijk 'modderige samenvloeiing'. Tot 1857 was hier niets — toen kwamen 87 Chinese tin-mijnwerkers, en het kamp groeide uit tot een handelspost. Wat KL nu maakt is dat Maleiers, Chinezen en Indiërs onafhankelijk van elkaar bouwden. Een chaotische, soms lelijke, vaak verrassende stad. Geen Singapore-orde, geen Bangkok-romantiek, maar een echte levende stad.", "tip": "Vermijd Grab tussen 17:00–19:00 — alles staat dan vast. Neem dan MRT of monorail. Bukit Bintang–KLCC kun je via een overdekte airconditioned skybridge van 1,2 km lopen.", "culture": {"title": "Wat is een kopitiam?", "text": "Een kopitiam (van 'kopi' = koffie en 'tiam' = winkel in Hokkien) is meer dan een café — het is het Chinees-Maleisische ontbijthart. Hier ontmoeten generaties elkaar boven een kop kopi, gemaakt van robusta-bonen geroosterd met margarine en suiker. Het lexicon: 'kopi' = met melk en suiker. 'Kopi-o' = zwart met suiker. 'Kopi-c' = met evaporated milk. 'Kopi-kosong' = zwart, geen suiker. 'Kopi peng' = ijskoffie."}, "places": [{"id": "kl-vcr", "cat": "koffie", "tag": "topper", "name": "VCR", "area": "Bukit Bintang", "desc": "Pioneer van KL specialty coffee, sinds 2013. Zwart heritage-pand op Jalan Galloway met courtyard. Eigen roastery, wisselende seasonal beans (vaak fruity Ethiopisch of bright Latin-Amerikaans). Hun flat white is consistent op niveau. 5 min lopen vanaf KLoé."}, {"id": "kl-feeka", "cat": "koffie", "tag": "normaal", "name": "Feeka Coffee Roasters", "area": "Bukit Bintang", "desc": "Naam komt van het Zweedse 'fika'. Rustige plek, gemaakt om een uur te blijven hangen met een boek. Probeer de chocchip ricotta pancakes. 8 min lopen."}, {"id": "kl-pucks", "cat": "koffie", "tag": "hidden", "name": "Pucks Coffee", "area": "Chinatown", "desc": "Geopend feb 2024, multi-roaster concept. Oud shophouse in een steeg met murals. Open tot middernacht — uniek in KL. Plan als pitstop tijdens Chinatown-wandeling."}, {"id": "kl-stellar", "cat": "koffie", "tag": "normaal", "name": "Stellar (REXKL)", "area": "Chinatown", "desc": "In REXKL, een oude bioscoop die nu cultuurhub is. Signature drinks zoals 'black coconut'. Gebruik als pitstop op weg naar BookXcess (gigantische boekenwinkel op de derde verdieping)."}, {"id": "kl-hokow", "cat": "koffie", "tag": "topper", "name": "Ho Kow Hainan Kopitiam", "area": "Chinatown", "desc": "Traditioneel Maleisisch koffiehuis sinds 1956. Bestel kopi-o, kaya toast en zachtgekookte eieren. Een keer doen voor het cultuurcontrast."}, {"id": "kl-jalanalor", "cat": "eten", "tag": "topper", "name": "Jalan Alor", "area": "Bukit Bintang", "desc": "Beroemde foodstreet, 5 min van het hotel. 's Avonds ~50 stalletjes met plastic stoeltjes. Zekerheden: Wong Ah Wah chicken wings, gegrilde stingray sambal, satay, char koay teow. Bestel klein, eet veel verschillende dingen. Doe dit minstens één avond."}, {"id": "kl-pikwah", "cat": "eten", "tag": "normaal", "name": "Restoran Pik Wah", "area": "Jalan Alor", "desc": "Zit-restaurant op Jalan Alor zelf, een stap rustiger dan straatstalletjes. Wokvis met soja, salted egg prawns, kangkung belacan."}, {"id": "kl-yutkee", "cat": "eten", "tag": "hidden", "name": "Restoran Yut Kee", "area": "KL Centre", "desc": "Hainanese kopitiam sinds 1928. Beroemd om hainanese chicken chop, roti babi, marmelade kaya. Geen sfeer, wel echt KL. Sluit 16u — perfect voor lunch."}, {"id": "kl-bijan", "cat": "eten", "tag": "normaal", "name": "Bijan", "area": "Bukit Bintang", "desc": "Verfijnde Maleisische keuken. Probeer rendang daging en ikan bakar (gegrilde vis in bananenblad). Reserveren handig in het weekend. ~150 RM pp."}, {"id": "kl-limapulo", "cat": "eten", "tag": "normaal", "name": "Limapulo: Baba Can Cook", "area": "KL Centre", "desc": "Authentieke Peranakan-keuken. Probeer ayam buah keluak (kip met de zwarte keluak-noot, kenmerkende Peranakan-smaak). Familie-runde, gezellig."}, {"id": "kl-winhengseng", "cat": "eten", "tag": "hidden", "name": "Restoran Win Heng Seng", "area": "Chinatown", "desc": "Ochtend/lunch tent met de beste Char Siew Wantan Mee in KL volgens locals. Klein, geen Engels, kassa-cash."}, {"id": "kl-madamkwan", "cat": "eten", "tag": "normaal", "name": "Madam Kwan's", "area": "Pavilion KL", "desc": "Mall-restaurant maar serieus, sinds 1999. Hun nasi lemak en char koay teow zijn de hoogtepunten. Handig voor lunch met airco tussen 12-15u."}, {"id": "kl-dewakan", "cat": "eten", "tag": "splurge", "name": "DEWAKAN", "area": "Petronas Towers, KLCC", "desc": "Twee Michelin-sterren. Modern Maleisische tasting menu's met inheemse ingrediënten: pucuk paku (jungle ferns), buah kulim. Op verdieping 49 van de Petronas Towers. ~750 RM pp. Reserveer 3-4 weken vooruit."}, {"id": "kl-dc", "cat": "eten", "tag": "splurge", "name": "DC Restaurant", "area": "TTDI", "desc": "Modern Frans met Aziatische techniek door chef Darren Chin. Rustigere setting dan DEWAKAN, in een woonwijk (25 min Grab). Tasting 500-700 RM pp."}, {"id": "kl-nadodi", "cat": "eten", "tag": "splurge", "name": "Nadodi", "area": "Four Seasons KLCC", "desc": "Modern Zuid-Indiase tasting menu, chef Venkatesh haalt invloeden uit Tamil Nadu, Sri Lanka, Kerala. Goed alternatief als DEWAKAN volzit."}, {"id": "kl-walk-chinatown", "cat": "wandeling", "tag": "topper", "name": "Heritage Chinatown loop", "area": "Chinatown", "desc": "2-3 uur slenteren door het oude hart van KL. Begin vroeg (8-10u) voor schaduw en rust — daarna trekt het vol en wordt het broeierig. De ziel van het oude KL: tempel, mural-steeg, koloniale resten, en koffie onderweg.", "distance_km": 2.4, "duration": "1u zonder stops, 2-3u met koffie, tempels en murals", "best_time": "Ochtend 8-11u (vóór hitte) of late namiddag 16-18u", "avoid": "Niet via Jalan Tun Tan Cheng Lock direct — dat is de drukke verkeers-doorgang. Blijf in de parallel-steegjes (Petaling, Sultan, Cheng Lock soi's) waar de mural's en shophouses zitten.", "rain_plan": "Central Market is overdekt en heeft koffie + winkels — schuil daar tot de bui voorbij is, dan kom je nog steeds bij Merdeka Square uit. Of de skybridge naar Pavilion Mall.", "coffee_stop": "Pucks Coffee (in steeg op de route) of Ho Kow Hainan Kopitiam voor traditioneel", "waypoints": [{"name": "Petaling Street Market (ingang)", "lat": 3.1438, "lng": 101.6975, "note": "Start. Rood-groene poort. Niet kopen, alleen voelen. 5 min en doorlopen."}, {"name": "Sri Mahamariamman Temple", "lat": 3.1438, "lng": 101.6962, "note": "Oudste hindoetempel in KL (1873). Schoenen uit, kort kijken, niet rennen."}, {"name": "Guan Di Temple", "lat": 3.1444, "lng": 101.6963, "note": "Kleine Taoïstische tempel naast hindoetempel — religieus contrast in 50m."}, {"name": "Kwai Chai Hong", "lat": 3.145, "lng": 101.6976, "note": "Steegje met murals over oud Chinatown-leven. Mooist met ochtendlicht."}, {"name": "Pucks Coffee", "lat": 3.1454, "lng": 101.6968, "note": "Koffie-stop in een mural-steeg. Multi-roaster, open tot middernacht."}, {"name": "Central Market", "lat": 3.1457, "lng": 101.6952, "note": "Art-deco markt uit 1888. Overdekt, airco, kunst en ambacht. Schuilplek bij regen."}, {"name": "Merdeka Square (Dataran Merdeka)", "lat": 3.1487, "lng": 101.6934, "note": "Het koloniale hart. Sultan Abdul Samad-gebouw aan de overkant. Eindpunt."}], "gmaps_url": "https://www.google.com/maps/dir/3.1438,101.6975/3.1438,101.6962/3.1444,101.6963/3.145,101.6976/3.1454,101.6968/3.1457,101.6952/3.1487,101.6934/data=!4m2!4m1!3e2"}, {"id": "kl-walk-merdeka", "cat": "wandeling", "tag": "normaal", "name": "Merdeka Square + River of Life", "area": "Centrum", "desc": "Het koloniale hart. Sultan Abdul Samad-gebouw (1897, Indo-Saraceens) staat tegenover het grasveld waar Maleisië in 1957 onafhankelijk werd. River of Life is het verlichte project rond de samenvloeiing van Klang en Gombak. 's Avonds blauw verlicht."}, {"id": "kl-walk-kampungbaru", "cat": "wandeling", "tag": "hidden", "name": "Kampung Baru", "area": "Centrum", "desc": "Oudste Maleise wijk van KL (1899). Houten huizen op palen, midden tussen wolkenkrabbers. Het contrast met KLCC dat 200m verder staat is bizar. Ga rond 16-18u. Eet nasi lemak bij een straatstalletje. Zaterdagavond: Pasar Malam."}, {"id": "kl-walk-buknanas", "cat": "wandeling", "tag": "normaal", "name": "Bukit Nanas Forest Reserve", "area": "KL Tower", "desc": "Oudste beschermde regenwoud van Maleisië (1906), midden in de stad. Echte jungle-paadjes (45 min). Apen kijken je aan vanuit de takken. Ga vroeg (8-9u) voor schaduw."}, {"id": "kl-walk-bukitbintang-kampungbaru", "cat": "wandeling", "tag": "topper", "name": "Bukit Bintang naar Kampung Baru (sunset)", "area": "Bukit Bintang → KLCC → Kampung Baru", "desc": "Avond-loop van Bukit Bintang via KLCC naar Kampung Baru. Dwarsdoorsnede van het moderne en het oude KL in één wandeling — start in de mall-zone, eindig in een houten dorp tussen wolkenkrabbers. Doe deze rond 16-18u zodat je Kampung Baru bij avondlicht binnenkomt.", "distance_km": 3.2, "duration": "1u15 zonder stops, 2-3u met Petronas-foto-stop en eten in Kampung Baru", "best_time": "Late middag 16-18u. Vertrek bij KLoé, eet nasi lemak bij straatstalletje in Kampung Baru rond 18-19u.", "avoid": "Niet via Jalan Sultan Ismail — verkeers-as. Gebruik de overdekte skybridge van Pavilion naar KLCC (airco, geen hitte). Van KLCC naar Kampung Baru: via de Saloma Link voetgangersbrug, niet via Jalan Ampang.", "rain_plan": "Skybridge Bukit Bintang → KLCC is volledig overdekt (1.2 km airco). Bij stortbui in KLCC blijf je in Suria-mall of Aquaria. Kampung Baru-deel skip je dan en eet je in Pavilion of bij Madam Kwan's.", "waypoints": [{"name": "KLoé Hotel (start)", "lat": 3.1467, "lng": 101.7102, "note": "Start. Loop richting Pavilion Mall via Jalan Bukit Bintang."}, {"name": "Pavilion KL", "lat": 3.1492, "lng": 101.7133, "note": "Toegang tot de overdekte skybridge naar KLCC. Bovenverdieping volgen."}, {"name": "Saloma Link Bridge (Kampung Baru-ingang)", "lat": 3.161, "lng": 101.7141, "note": "Voetgangersbrug over Klang-rivier. Beste foto-spot van Petronas vanaf de brug zelf."}, {"name": "Petronas Twin Towers (vanaf KLCC Park)", "lat": 3.1578, "lng": 101.7117, "note": "Korte stop aan de Petronas-voet als je nog niet binnen bent geweest. Anders direct doorlopen."}, {"name": "Masjid Jamek Kampung Baru", "lat": 3.1656, "lng": 101.705, "note": "Hart van het Maleise dorp. Mughal-stijl moskee tussen wolkenkrabbers."}, {"name": "Nasi Lemak Wanjo Kg Baru", "lat": 3.1685, "lng": 101.705, "note": "Dé nasi lemak van Kampung Baru. Banaanblad, sambal, alleen cash. Pas vóór sluit (~21u)."}, {"name": "Chow Kit Market", "lat": 3.167, "lng": 101.6997, "note": "Eindpunt. Lokale dag-/nachtmarkt, na 18u steeds drukker. Grab terug naar hotel."}], "gmaps_url": "https://www.google.com/maps/dir/3.1467,101.7102/3.1492,101.7133/3.161,101.7141/3.1578,101.7117/3.1656,101.705/3.1685,101.705/3.167,101.6997/data=!4m2!4m1!3e2", "coffee_stop": "VCR voor vertrek (Bukit Bintang) of een kopi bij straatstalletje in Kampung Baru"}, {"id": "kl-petronas", "cat": "activiteit", "tag": "topper", "name": "Petronas Twin Towers Skybridge", "area": "KLCC", "desc": "De klassieker, en de moeite waard. Skybridge (verdieping 41) en observation deck (verdieping 86). Reserveer online 3-7 dagen vooruit. Beste tijd: 17:30 voor dag-naar-nacht. ~98 RM pp."}, {"id": "kl-batu", "cat": "activiteit", "tag": "topper", "name": "Batu Caves", "area": "13 km buiten centrum", "desc": "Hindoetempel in een 400 mln jaar oude limestone grot, met de iconische 272-trapsregenboogtrap en 43m gouden Murugan-beeld. Apen — pas op je tas. Ga vroeg (open 6u, ga 7:30u) voor hitte en menigte. Gratis. ~25 RM Grab."}, {"id": "kl-iam", "cat": "activiteit", "tag": "hidden", "name": "Islamic Arts Museum", "area": "Lake Gardens", "desc": "Een van de beste musea van Zuidoost-Azië, en zwaar onderbezocht. Sterke collectie Korans, textiel, schaalmodellen van moskees wereldwijd. 2-3 uur. Goed alternatief voor hete middag of regen."}, {"id": "kl-theanhou", "cat": "activiteit", "tag": "hidden", "name": "Thean Hou Tempel", "area": "Robson Hill", "desc": "Een van de grootste Chinese tempels van Zuidoost-Azië (1987), gewijd aan Mazu (godin van de zee). Zes verdiepingen, honderden rode lantaarns. Minder bekend dan Batu Caves, juist daarom rustig."}, {"id": "kl-lakegardens", "cat": "activiteit", "tag": "normaal", "name": "Lake Gardens", "area": "Centrum", "desc": "91 hectare botanische tuin met orchideeëntuin (800 soorten), hibiscustuin en het Bird Park (grootste vrije-vlucht park ter wereld). Goede ochtendwandeling."}, {"id": "kl-kltower", "cat": "activiteit", "tag": "normaal", "name": "KL Tower Sky Box", "area": "Bukit Nanas", "desc": "Vaak overgeslagen ten gunste van Petronas, maar ironisch genoeg hoger uitzicht (de tower zelf is lager dan Petronas, maar staat op een heuvel). De Sky Box is een glazen kubus die uit de toren steekt — glazen vloer, voeten zwevend boven KL. Combineer met de aangrenzende Bukit Nanas regenwoud-wandeling."}, {"id": "kl-selangor", "cat": "activiteit", "tag": "hidden", "name": "Royal Selangor Visitor Centre", "area": "Setapak Jaya", "desc": "Pewter (tin-legering) is Maleisië's klassieke ambacht. Royal Selangor (1885) is de grootste tin-fabrikant ter wereld. Gratis fabriekstour, je ziet smelten, gieten en handmatig hameren. Ook 'School of Hard Knocks' workshop (90 RM) waar je je eigen tinnen schaaltje hamert. Goed bij regen of als cultureel uitstapje. 15 min Grab vanaf KLoé."}, {"id": "kl-cooking", "cat": "activiteit", "tag": "hidden", "name": "Lazat Cooking Class", "area": "Diverse", "desc": "Een halve dag Maleisisch koken in een dorpshuis buiten KL. Markt-bezoek, dan 4-5 gerechten leren maken (curry, sambal, rendang). Een van de best-gereviewde cooking classes van het land. ~250 RM pp, inclusief lunch en transport. Goed voor een rustige dag."}, {"id": "kl-changkat", "cat": "drinks", "tag": "normaal", "name": "Changkat Bukit Bintang", "area": "Bukit Bintang", "desc": "Bar/restaurant straat, 7 min lopen van KLoé. Pre-war shophouses omgebouwd tot bars en restaurants. Een blokje doorlopen geeft 15 opties. Kom 18-21u voor rustigere sfeer."}, {"id": "kl-coley", "cat": "drinks", "tag": "normaal", "name": "Coley", "area": "Changkat", "desc": "Cocktailbar vernoemd naar Dick Bradsell's hond. Klassieke mixology zonder pretentie. Top voor een rustiger avond."}, {"id": "kl-ps150", "cat": "drinks", "tag": "topper", "name": "PS150", "area": "Chinatown", "desc": "Speakeasy achter een nep-speelgoedwinkel-ingang op Petaling Street. Aziatisch geïnspireerde cocktails (longan, pandan, lychee). Een van de bekendere bars van Zuidoost-Azië. Reserveer."}, {"id": "kl-heli", "cat": "drinks", "tag": "normaal", "name": "Heli Lounge Bar", "area": "Menara KH", "desc": "Actieve helikopter-helipad (verd. 34) die 's avonds bar wordt. Het uitzicht 340° over KL is uniek. Helipad open na 18:45 als helikopters weg zijn. Reserveer via WhatsApp/Instagram."}, {"id": "kl-threeXco", "cat": "drinks", "tag": "hidden", "name": "Three X Co", "area": "Bukit Bintang", "desc": "Voor een rustigere wijn-avond. Natural wines, kleine borden, geen luide muziek. Goed voor een diner-na-borrel."}, {"id": "kl-walk-grand-loop", "cat": "wandeling", "tag": "topper", "name": "Grand KL Loop (lange wandeling)", "area": "Lake Gardens → Chinatown → Merdeka → KLCC", "desc": "Één stevige wandeling die heel KL aan elkaar rijgt: groene Lake Gardens, het oude koloniale hart, Chinatown, Merdeka Square en eindigt onder de Petronas Towers. Voor wie liever één lange route loopt dan twee korte. Begin vroeg (7u) — het eerste deel door de tuinen is schaduwrijk, daarna krijg je het oude KL vóór de hitte toeslaat.", "intensity": "stevig", "distance_km": 8.0, "duration": "Wandelen ~3u15 (5 km/u). Met koffie, tempels en KLCC: 5-6u.", "best_time": "Start 7u. Probeer vóór 13u bij KLCC te zijn — daarna is de open stad te heet.", "midpoint": "Pucks Coffee (Chinatown)", "avoid": "Niet langs Jalan Kinabalu/Jalan Tun Perak als hoofdverkeer — blijf in de tuinpaden en de Chinatown-steegjes. Het stuk van Masjid Jamek naar KLCC loop je langs de River of Life (Klang-rivier), niet langs Jalan Ampang.", "rain_plan": "Tot Chinatown: schuil in Central Market (overdekt, koffie). Vanaf Merdeka bij stortbui: pak de LRT bij Masjid Jamek richting KLCC en sla het rivierdeel over.", "coffee_stop": "Pucks Coffee of Ho Kow Hainan Kopitiam halverwege (Chinatown). Eventueel een tweede bij KLCC.", "waypoints_part1": [{"name": "Perdana Botanical Gardens", "lat": 3.1397, "lng": 101.6806, "note": "Start in de tuinen — schaduw en stilte vóór de hitte. Loop richting de oostkant, naar de moskee."}, {"name": "Masjid Negara (Nationale Moskee)", "lat": 3.14194, "lng": 101.69167, "note": "Paraplu-vormige koepel uit 1965. Buiten kijken volstaat; gepaste kleding nodig om binnen te komen."}, {"name": "Oud KL Railway Station", "lat": 3.13944, "lng": 101.69333, "note": "Indo-Saraceens spookstation (1910), zelfde architect als Masjid Jamek. Mooie galerijen."}, {"name": "Central Market", "lat": 3.1457, "lng": 101.6952, "note": "Art-deco markt uit 1888. Overdekt, airco — koffie- of schuilpunt richting Chinatown."}, {"name": "Sri Mahamariamman Temple", "lat": 3.1438, "lng": 101.6962, "note": "Oudste hindoetempel van KL (1873). Schoenen uit, kort kijken."}, {"name": "Petaling Street Market", "lat": 3.1438, "lng": 101.6975, "note": "Rood-groene poort, het hart van Chinatown. Voelen, niet kopen."}, {"name": "Kwai Chai Hong", "lat": 3.145, "lng": 101.6976, "note": "Mural-steeg over oud Chinatown-leven. Mooist met ochtendlicht."}, {"name": "Pucks Coffee", "lat": 3.1454, "lng": 101.6968, "note": "Halverwege-koffie in een mural-steeg. Multi-roaster. Even zitten vóór deel 2."}], "waypoints_part2": [{"name": "Pucks Coffee (vertrek deel 2)", "lat": 3.1454, "lng": 101.6968, "note": "Opnieuw vertrekpunt. Loop noordwaarts naar het koloniale plein."}, {"name": "Merdeka Square (Dataran Merdeka)", "lat": 3.1487, "lng": 101.6934, "note": "Het koloniale hart, Sultan Abdul Samad-gebouw aan de overkant. Hier werd Maleisië in 1957 onafhankelijk."}, {"name": "Masjid Jamek", "lat": 3.14884, "lng": 101.69572, "note": "Mughal-stijl moskee (1909) op de samenvloeiing van Klang en Gombak — letterlijk 'modderige samenvloeiing', waar KL naar heet."}, {"name": "River of Life / Saloma Link", "lat": 3.161, "lng": 101.7141, "note": "Volg de verlichte rivierpromenade noordoostwaarts. De Saloma-voetgangersbrug geeft het beste Petronas-zicht."}, {"name": "Petronas Twin Towers (KLCC)", "lat": 3.1578, "lng": 101.7117, "note": "Eindpunt. Lunch in Suria KLCC of een flat white. Beloning na 8 km."}], "gmaps_url_part1": "https://www.google.com/maps/dir/3.1397,101.6806/3.14194,101.69167/3.13944,101.69333/3.1457,101.6952/3.1438,101.6962/3.1438,101.6975/3.145,101.6976/3.1454,101.6968/data=!4m2!4m1!3e2", "gmaps_url_part2": "https://www.google.com/maps/dir/3.1454,101.6968/3.1487,101.6934/3.14884,101.69572/3.161,101.7141/3.1578,101.7117/data=!4m2!4m1!3e2"}], "days": [{"date": "Zaterdag 6 juni", "character": "De aankomstdag", "what": "Jullie landen na ~12 uur vliegen, ergens in de ochtend. Geen ambities. Inchecken, een eerste rondje, eten, slapen.", "why": "Je bent niet kapot, maar wel uit balans. KL is bovendien een stad die het beste smaakt als je 'm langzaam binnenkomt — niet als je vanuit het vliegtuig direct naar Petronas rent. De jetlag uit Nederland is 6 uur vooruit; dat betekent dat je rond 21u lokale tijd voelt alsof het 15u is. Vroeg slapen is een illusie. Doe niet alsof.", "flow": "Inchecken bij **KLoé Hotel**. Als de kamer nog niet klaar is, stop je tassen en eet je een laat ontbijt — **VCR** zit op 5 min lopen en is ongeveer het beste eerste contact met KL dat je kunt hebben (courtyard, koerier-cool, eindelijk weer fatsoenlijke flat white).\n\nMiddag: een paar uur op je kamer of bij de pool. Ja, ook al voelt het zonde. Vertrouw me. Zet een wekker op 17u of je slaapt 14 uur en bent dagen van slag.\n\nLate middag, als de hitte breekt: een korte loop door **Bukit Bintang** — geen plan, gewoon kijken. Door Jalan Bukit Bintang lopen, naar Pavilion Mall (voor de airco-pauze), en dan naar **Jalan Alor** voor diner. Doe het simpel: ga ergens met een lange rij zitten, bestel satay, char koay teow, en een ijskoud Tiger-biertje. Niet de avond om naar DEWAKAN te jagen — je proeft het niet eens.\n\nTerug naar het hotel tegen 21u. Slapen.", "planB": "Regen of doodmoe? **VCR** voor laat ontbijt, dan hotel-pool, dan **Madam Kwan's** in Pavilion (5 min lopen, airco, fatsoenlijke nasi lemak) voor diner. Geen Jalan Alor vanavond — dat doe je morgen.", "not": "Niet Batu Caves vandaag. Niet Petronas vandaag. Geen DEWAKAN — die zit volgeboekt en je hebt 'm niet verdiend op dag één."}, {"date": "Zondag 7 juni", "character": "De Chinatown-dag", "what": "Eén volle dag in het oude hart van KL. Geen rennen tussen punten — je dwaalt, eet, drinkt koffie, en eindigt met een uitzicht.", "why": "Jullie eerste echte dag na de jetlag. Te ambitieus en je bent half drie kapot. Chinatown is compact, alles op loopafstand, en biedt natuurlijke pauzes (koffie, eten, schaduwrijke tempels). Bovendien: KL maakt het meest indruk als je eerst de oude lagen ziet voor je de Petronas-glans krijgt.", "flow": "Begin laat. Slaap uit. Tegen 10 uur naar **Ho Kow Hainan Kopitiam** voor kopi, kaya toast en soft-boiled eggs. Niet omdat het schitterend is, maar omdat het het meest 'echt' Maleisische ontbijt is dat er bestaat. Zit even rond.\n\nDaarna lopend door Petaling Street — niet om iets te kopen (alles is namaak), maar voor het ritme. Stop bij Sri Mahamariamman Temple, doe je schoenen uit, kijk vijf minuten. Door naar Kwai Chai Hong voor de murals — overdag rustig, in de avond mooier verlicht maar drukker. Dit is de **Chinatown loop** uit de wandel-sectie — als je hem helemaal doet kom je ook bij Khoo Kongsi en Merdeka Square uit, maar je hoeft hem niet af te maken.\n\nTegen 12 uur ben je toe aan koffie. **Pucks** of **Stellar (REXKL)** — Stellar zit in een oude bioscoop met een gigantische boekenwinkel erboven. Plan: koffie, dwalen door BookXcess (gratis), zien wat er gebeurt.\n\nLunch: **Restoran Win Heng Seng** voor de char siew wantan mee. Cash. Geen Engels. Heel goed.\n\nMiddagdip. Terug naar het hotel, pool 14-16u. Echt doen. De hitte na 13u is geen grap.\n\nLate namiddag: **Petronas Twin Towers Skybridge**, gereserveerd voor 17:30. Je ziet dag overgaan in nacht, beide werelden van KL in één blik.\n\nDiner KLCC of terug Bukit Bintang — **Jalan Alor** of **Bijan**, hangt af van energieniveau. Bijan is verfijnder, Jalan Alor is straat. Beide goed.", "planB": "Regen: verschuif Petronas naar morgen. Doe het **Islamic Arts Museum** (1 uur Grab heen-en-weer, maar droog en koel; rustig museum, goede collectie). Of: vlucht de **Royal Selangor Visitor Centre** workshop in — een halve dag pewter-hameren is precies het soort onverwachte plezier dat je niet vergeet.", "not": "Sla **Central Market** over als je geen zin meer hebt. De heritage walk is geen verplichte route. Geen Batu Caves in de namiddag — daar bedien je jezelf morgenochtend mee."}, {"date": "Maandag 8 juni", "character": "De highlight-dag", "what": "Eén grote, vroege activiteit (Batu Caves), een culturele namiddag (Kampung Baru of Islamic Arts Museum), en 's avonds — als je een splurge wilt in deze reis — DEWAKAN.", "why": "Batu Caves moet vroeg, vóór 8 uur, anders smelt je tijdens de 272 treden en zijn er bovendien 800 mensen met selfie-sticks. Dus deze dag begint vroeg en eindigt vroeg (siesta) zodat je 's avonds nog scherp bent voor iets goeds. Een Michelin-diner op je laatste KL-avond is een mooie afsluiter; je sliep niet voor niets vanmiddag.", "flow": "**Batu Caves** vroeg. Vertrek 7:30u, Grab naar Batu Caves (~25 RM, 30 min). Je bent er voor de eerste echte hitte. Beklim de regenboogtrap, kijk vijf minuten omhoog naar het 43m gouden Murugan-beeld, ga de grot in. Apen houden je tas in de gaten — laat eten niet zichtbaar.\n\nTegen 10u terug. Ontbijt onderweg of bij het hotel.\n\nMiddagprogramma is een keuze. Optie A: **Islamic Arts Museum** (1 uur Grab heen-en-weer, koel binnen, 2-3 uur door de collectie — Korans, textiel, schaalmodellen van moskees wereldwijd). Het is zwaar onderbezocht en een van de beste musea van Zuidoost-Azië. Optie B: **Kampung Baru** rond 16-17u — oudste Maleise wijk midden tussen wolkenkrabbers, eet nasi lemak bij een straatstalletje. Het contrast met KLCC dat 200m verderop staat is bizar. Mijn keus: Kampung Baru als het niet regent. Het is een geheugen dat blijft hangen.\n\nKom je terug 17-18u: pool, rust, douche.\n\n19:30u: **DEWAKAN**. Tasting menu op verdieping 49 van de Petronas Towers. Modern Maleisisch met inheemse ingrediënten (pucuk paku, buah kulim — namen die je nooit gehoord hebt en nooit zal vergeten). Reserveer 3-4 weken vooruit. Reken op ~750 RM pp. Voor één avond verschuift dit je begrip van wat Maleisië kan zijn.\n\nNa diner: één drink bij **PS150** (speakeasy in Chinatown, achter een speelgoedwinkel) of **Heli Lounge Bar** (helikopter-helipad-bar met 340° uitzicht). Of gewoon naar het hotel — je hebt vandaag genoeg meegemaakt.", "planB": "Geen DEWAKAN-reservering gelukt: **Nadodi** (modern Zuid-Indiaas, ook tasting, ook splurge — alternatief op niveau) of **DC Restaurant** (Frans-Aziatisch, rustigere setting in een woonwijk). Geen splurge-zin? **Limapulo: Baba Can Cook** voor authentiek Peranakan in familie-setting.\n\nRegen 's ochtends? Skip Batu Caves vandaag (de trap wordt glad en gevaarlijk). Doe Islamic Arts Museum + **Thean Hou Tempel** in plaats daarvan — beide droog en koel.", "not": "Niet KL Tower vandaag — je hebt morgen vroeg een lange busrit naar Penang en deze avond is voor diner. Niet alles in één dag proberen te krijgen."}]}, "penang": {"id": "penang", "name": "Penang — George Town", "dates": "9 — 13 juni", "hotel": "Manhattan 2BR Appartement", "mapCenter": "George Town Penang Malaysia", "intro": "Penang is een eiland van 295 km² voor de westkust van Maleisië. In 1786 stichtte Britse handelaar Captain Francis Light hier de eerste Britse vestiging in Zuidoost-Azië. Wat van George Town werd, was een melting pot zonder gelijke: Britten, Chinese clans (Hokkien, Cantonees, Hakka, Teochew), Indiase moslims, plus kleine Armeense en Joodse gemeenschappen. In 2008 werd het historische centrum UNESCO Werelderfgoed. Nu: 19e-eeuwse shophouses in pasteltinten, de beste streetfood van Zuidoost-Azië, traagheid in plaats van Bangkok-tempo.", "tip": "George Town's UNESCO-zone is plat, compact en 95% lopen. Voor verder weg (Penang Hill, Kek Lok Si): Grab. Trishaws (fietstaxi's) op Armenian Street: 40-80 RM/uur, leuk als het te heet wordt om te lopen.", "culture": {"title": "Hawker etiquette in Penang", "text": "Tafels delen is normaal — vraag 'kan ik?' en ga zitten. Een tissue-pakje op tafel = die tafel is gereserveerd. Bij hawker centers: drinks bij één stalletje (= eigenaar van de tafel), eten bij andere. Niet alleen eten kopen zonder drinken — dat veroorzaakt ruzie. Cash. Bijna overal alleen cash. Volg de queue: dat is het signaal voor goed eten."}, "places": [{"id": "pg-ome", "cat": "koffie", "tag": "hidden", "name": "Ome by Spacebar Coffee", "area": "Industrial", "desc": "Specialty café vlakbij de Clan Jetties, in een industriële ruimte. Single origins uit Azië en Australië, prima cakes. Bonus: ze verkopen ook natural wines (zeldzaam in Penang)."}, {"id": "pg-mugshot", "cat": "koffie", "tag": "normaal", "name": "The Mugshot Cafe", "area": "Chulia Street", "desc": "Sinds 2013 een Penang-klassieker. Beroemd om hun bagels (zelfgemaakt), homemade yogurts en goede flat whites. Lange smalle ruimte in een heritage shophouse."}, {"id": "pg-coffeelane", "cat": "koffie", "tag": "normaal", "name": "Coffee Lane", "area": "Beach Street", "desc": "Drie roastprofielen, eigen blends en single origins. Prachtig oud Chinees winkelpand met donkerhout en gedimd licht. Rustige sfeer, goed voor lezen."}, {"id": "pg-tohsoon", "cat": "koffie", "tag": "topper", "name": "Toh Soon Cafe", "area": "Campbell Street", "desc": "Niet specialty maar pure Penang-traditie. Onder een tarp in een steegje. Bestel kaya toast over houtskool, zacht-gekookte eieren, sterke kopi. Open vanaf 7u, drukst rond 8-9u. Dicht op woensdag."}, {"id": "pg-oriental", "cat": "koffie", "tag": "normaal", "name": "Oriental Coffee", "area": "Lebuh Campbell", "desc": "Modernere vrolijke heritage-koffie. Specialty kopi met kaya toast en handige snack-souvenirs voor mee terug naar huis. Aircontuna, comfortabel."}, {"id": "pg-siamroad", "cat": "eten", "tag": "topper", "name": "Siam Road Charcoal Char Koay Teow", "area": "Jalan Siam", "desc": "Iconisch, Michelin Bib Gourmand. Door 'Uncle Tan' (79+, nu vooral zoon) over houtskool. Lange wachtrij. Open di-za 12-18u, dicht zo-ma."}, {"id": "pg-ahleng", "cat": "eten", "tag": "topper", "name": "Ah Leng Char Koay Teow", "area": "Jalan Dato Keramat", "desc": "Vraag om duck egg upgrade (RM 0,50 extra, het verschil is reëel). Bib Gourmand. Open do-di 9:30-15:30."}, {"id": "pg-airitam", "cat": "eten", "tag": "topper", "name": "Air Itam Laksa", "area": "Air Itam Market", "desc": "Bij Air Itam Market, vlakbij Kek Lok Si. Open sinds 1955. Anthony Bourdain noemde dit 'mogelijk de beste Assam Laksa ter wereld'. Combineer met Kek Lok Si. Open 11-17u in weekenden."}, {"id": "pg-penangroad", "cat": "eten", "tag": "normaal", "name": "Penang Road Famous Laksa", "area": "Lebuh Keng Kwee", "desc": "Sinds 1970, toegankelijke Assam Laksa-versie. Open 9-17:30u, dicht op woensdag."}, {"id": "pg-888", "cat": "eten", "tag": "topper", "name": "888 Hokkien Mee", "area": "Lebuh Presgrave", "desc": "Beroemd voor Penang Hokkien Mee — dieporanje garnalenbouillon, urenlang getrokken. Avondzaak. Klein en onbeschrijflijk lekker."}, {"id": "pg-cendol", "cat": "eten", "tag": "topper", "name": "Penang Road Famous Teochew Chendul", "area": "Lebuh Keng Kwee", "desc": "Sinds 1936. Altijd een rij. RM 2,90, de moeite waard. Combineer met laksa op dezelfde straat."}, {"id": "pg-khengpin", "cat": "eten", "tag": "hidden", "name": "Kheng Pin Cafe (Lor Bak)", "area": "Jalan Penang", "desc": "Uncle Lau staat er al 40+ jaar voor zijn lor bak (gefrituurde varkensvleesrolletjes in tofu-vel). Open di-zo 7-15u."}, {"id": "pg-syao", "cat": "eten", "tag": "hidden", "name": "Sister Yao's Char Koay Kak", "area": "Macalister Lane", "desc": "Familiebedrijf sinds 1963, Bib Gourmand. Char Koay Kak is gewokte radijscake. Open 7-13u."}, {"id": "pg-newlane", "cat": "eten", "tag": "topper", "name": "New Lane Hawker Centre", "area": "Lorong Baru", "desc": "Avond hawker zone met veel klassiekers in één plek: char koay teow, lok lok, satay, ikan bakar. 5-23u, drukst 19-22u."}, {"id": "pg-cecil", "cat": "eten", "tag": "hidden", "name": "Cecil Street Market Food Court", "area": "Lebuh Cecil", "desc": "Authentieker, minder toeristisch. Beroemde duck meat koay teow t'ng (klare bouillon-noedelsoep)."}, {"id": "pg-chulia", "cat": "eten", "tag": "normaal", "name": "Chulia Street Night Hawker", "area": "Chulia Street", "desc": "Drukke straatzone na zonsondergang. Char koay teow, wantan mee, satay, dim sum. Levendig."}, {"id": "pg-kebaya", "cat": "eten", "tag": "splurge", "name": "Kebaya Dining Room", "area": "Seven Terraces Hotel", "desc": "Modern Peranakan in een prachtig boutique hotel met heritage huizen. Tasting menu's met Nyonya-klassiekers in geüpgradede vorm. Een van de mooiste sferen van George Town. Reserveer."}, {"id": "pg-jawi", "cat": "eten", "tag": "hidden", "name": "Jawi House Cafe Gallery", "area": "Armenian Street", "desc": "Authentieke 'Jawi Peranakan'-keuken (Indiase moslim + Maleise fusie, een aparte sub-cultuur). Mooi heritage-pand, kunst, intiem."}, {"id": "pg-teksen", "cat": "eten", "tag": "normaal", "name": "Tek Sen Restaurant", "area": "Lebuh Carnarvon", "desc": "Cantonees sinds 1965, een van de meest beroemde restaurants van Penang. Probeer hun double-roasted pork (claypot belly). Geen reserveringen — ga 17:30-18u of na 20:30u. Dicht di-wo."}, {"id": "pg-chinahouse", "cat": "eten", "tag": "normaal", "name": "ChinaHouse", "area": "Beach Street", "desc": "Hippe cafe-restaurant-galerij over drie heritage huizen heen, binnenplaats, kunstgalerie, muziek. Sfeer is het verkoopargument."}, {"id": "pg-walk-heritage", "cat": "wandeling", "tag": "topper", "name": "UNESCO heritage shophouse-loop", "area": "UNESCO zone", "desc": "3-4 uur door het hart van George Town: koloniale forten, Peranakan-villas, mural-steegjes, clan-tempels en de Clan Jetties. Doe deze ochtend (vroeg) — middags is het broeierig en zijn de tour-bussen er. Stop bij elke tempel in de schaduw, drink limonade, dwaal.", "distance_km": 2.7, "duration": "1u15 doorlopend, 3-4u met tempels en stops", "best_time": "Ochtend 8-11u. Eerder dan 8u zijn de tempels nog stil gesloten; ná 11u is de hitte te erg.", "avoid": "Niet via Jalan Penang (hoofdverkeer) — gebruik de parallel-straten Lebuh Pantai en Lebuh Pasar. Niet door de drukke Armenian Street midden in de selfie-piek (10-12u); kom vroeger of via de zuidkant in.", "rain_plan": "Khoo Kongsi en Kapitan Keling Mosque zijn beide overdekt. Bij stortbui: vroeg naar Pinang Peranakan Mansion (binnen) of een café in een shophouse. Cheong Fatt Tze (Blue Mansion) is een mooie regen-backup.", "coffee_stop": "Toh Soon Cafe voor vertrek (niet woensdag) of The Mugshot Cafe halverwege", "waypoints": [{"name": "Penang Town Hall", "lat": 5.4202, "lng": 100.3422, "note": "Start. Wit koloniaal gebouw (1880) aan de Padang. Kort kijken."}, {"name": "Fort Cornwallis", "lat": 5.4209, "lng": 100.3445, "note": "Oudste Britse fort in Maleisië (1786). 15-20 min, kanonnen, uitzicht op zee."}, {"name": "Pinang Peranakan Mansion", "lat": 5.418, "lng": 100.34, "note": "Knal-groen Peranakan-herenhuis. Exterieur is genoeg als je geen entree wil betalen."}, {"name": "Lebuh Armenian (Armenian Street murals)", "lat": 5.4156, "lng": 100.3387, "note": "Mural-zone. 'Children on a Bicycle' van Zacharevic. Druk maar onmisbaar."}, {"name": "Khoo Kongsi", "lat": 5.4146, "lng": 100.3389, "note": "Sierlijke clan-tempel (15 RM). Wel doen — een van de mooiste in Zuidoost-Azië."}, {"name": "Kapitan Keling Mosque", "lat": 5.4173, "lng": 100.3361, "note": "Indo-moslim moskee (1801). Witte koepels. Buiten kijken volstaat."}, {"name": "Goddess of Mercy Temple", "lat": 5.4197, "lng": 100.3389, "note": "Oudste Chinese tempel van Penang (1728). Levendig met locals."}, {"name": "Chew Jetty", "lat": 5.414, "lng": 100.3425, "note": "Eindpunt. Houten huizen op palen boven het water. Loop tot de uiterste punt."}], "gmaps_url": "https://www.google.com/maps/dir/5.4202,100.3422/5.4209,100.3445/5.418,100.34/5.4156,100.3387/5.4146,100.3389/5.4173,100.3361/5.4197,100.3389/5.414,100.3425/data=!4m2!4m1!3e2"}, {"id": "pg-walk-offbeat", "cat": "wandeling", "tag": "hidden", "name": "Little India + Clan Jetties bij avond", "area": "Zuid George Town", "desc": "2-2.5 uur, late middag. Voor als je de UNESCO-zone al hebt gehad en de rustigere kant van George Town wilt zien. Begin in Little India, dwaal door minder bezochte shophouse-straten, eindig bij een van de stillere Clan Jetties tijdens zonsondergang.", "distance_km": 2.1, "duration": "1u doorlopend, 2-2.5u met chai-stop en Clan Jetty-rondloop", "best_time": "Late middag 16:30-18:30u. Eindig op de Clan Jetty rond zonsondergang (~19u juni).", "avoid": "Niet via Beach Street (Lebuh Pantai) in de spits 17-18u — auto's overal. Blijf in Lebuh King en Lebuh Queen, de oude Indiase shophouse-straten.", "rain_plan": "Little India heeft tientallen overdekte sari- en chai-winkels. Schuil daar; eet bij Restoran Kapitan voor degelijke biryani.", "food_stop": "Restoran Kapitan voor biryani of nasi kandar, of Sri Ananda Bahwan voor zuid-Indiase dosa's", "waypoints": [{"name": "Hean Boo Thean Kuan Yin Temple", "lat": 5.414, "lng": 100.3414, "note": "Start. Drijvende tempel boven het water bij Weld Quay. Stil, niet toeristisch."}, {"name": "Eng Chuan Tong Tan Kongsi", "lat": 5.4156, "lng": 100.3401, "note": "Een van de minder bekende clan-tempels. Donker, sereen, geen entree."}, {"name": "Little India (Lebuh Queen)", "lat": 5.4172, "lng": 100.3382, "note": "Begin van Little India. Sari-winkels, goud, geur van masala en jasmijn."}, {"name": "Sri Mahamariamman Temple Penang", "lat": 5.4173, "lng": 100.338, "note": "Kleurige zuid-Indiase tempel midden in Little India. Schoenen uit."}, {"name": "Lebuh King (King Street)", "lat": 5.4178, "lng": 100.3375, "note": "Oude Chinese-Indiase mix-straat. Hier wonen mensen — niet alle deuren in."}, {"name": "Restoran Kapitan", "lat": 5.418, "lng": 100.3358, "note": "Eet-stop. Sinds 1959, dé nasi kandar/biryani van George Town. Vol = goed teken."}, {"name": "Tan Jetty (rustiger dan Chew)", "lat": 5.413, "lng": 100.343, "note": "Eindpunt. Een van de stillere clan jetties. Houten huizen, zonsondergang over Penang Strait."}], "gmaps_url": "https://www.google.com/maps/dir/5.414,100.3414/5.4156,100.3401/5.4172,100.3382/5.4173,100.338/5.4178,100.3375/5.418,100.3358/5.413,100.343/data=!4m2!4m1!3e2"}, {"id": "pg-penanghill", "cat": "activiteit", "tag": "topper", "name": "Penang Hill", "area": "Air Itam", "desc": "Op 833m, ooit het Britse 'Hill Station'. Steile funicular vanaf Air Itam, 5 min omhoog. Boven: koeler, panorama over heel het eiland, koloniale bungalows. The Habitat (rainforest canopy walk, ~60 RM) is een aanrader. 3-4 uur. Ga vroeg (vanaf 6:30u)."}, {"id": "pg-keklokSi", "cat": "activiteit", "tag": "topper", "name": "Kek Lok Si Tempel", "area": "Air Itam", "desc": "Grootste Buddhistische tempel-complex van Zuidoost-Azië, gebouwd vanaf 1891. 7-verdiepings pagode (combineert Chinese, Thaise en Burmese stijlen) en een 30m bronzen Kuan Yin op de top. Combineer met Air Itam Laksa."}, {"id": "pg-bluemansion", "cat": "activiteit", "tag": "normaal", "name": "Cheong Fatt Tze (Blue Mansion)", "area": "Lebuh Leith", "desc": "Indigo-blauw Chinees herenhuis (1880s). Alleen via guided tour (11u, 14u, 15:30u, 17 RM). 45 min verhalen over Cheong Fatt Tze, feng shui en de rol in 'Crazy Rich Asians'. Exterieur is sowieso fotowaardig."}, {"id": "pg-natpark", "cat": "activiteit", "tag": "hidden", "name": "Penang National Park", "area": "Teluk Bahang", "desc": "Aan de noordwestkant van het eiland. Wandelroutes door regenwoud naar lege stranden — Turtle Beach (zee schildpadden) of Monkey Beach. 30 min Grab. 2-3 uur wandelen. Past bij Vincent's tempo."}, {"id": "pg-spice", "cat": "activiteit", "tag": "normaal", "name": "Tropical Spice Garden", "area": "Teluk Bahang", "desc": "Rustige botanische tuin met kruiden, 8 hectare. Kookcursussen ook beschikbaar. 30 min van George Town."}, {"id": "pg-foodtour", "cat": "activiteit", "tag": "normaal", "name": "Penang Food Tour", "area": "Diverse", "desc": "Lokale gids brengt je naar 6-8 hawker stalletjes die je zelf nooit zou vinden. Probeer 'Foodipedia' of 'Penang Heritage & Food Trail'. €40-50 pp."}, {"id": "pg-cooking", "cat": "activiteit", "tag": "topper", "name": "Penang Chiak Cooking Class", "area": "Chowrasta Market", "desc": "Een van de hoogst gewaardeerde cooking classes in Zuidoost-Azië. Familie Simon, Mr Mok en Ms Amy nemen je mee naar Chowrasta Market voor ingrediënten, dan 4 Peranakan-gerechten leren maken in hun eigen keuken. 3-4 uur, ~€80-100 pp. Ochtendklasse 8:10u. Een echte hoogtepunt-ervaring."}, {"id": "pg-streetart", "cat": "activiteit", "tag": "normaal", "name": "Street Art Hunt", "area": "UNESCO zone", "desc": "George Town heeft tientallen murals door Ernest Zacharevic en lokale kunstenaars sinds 2012. Loop met een papieren kaart (gratis bij Penang Tourism) of Google 'George Town street art map'. De ijzer-draadkunst van Tang Mun Kian (humoristische historische taferelen) is uitgebreider dan de murals. 1.5-2 uur."}, {"id": "pg-batikcraft", "cat": "activiteit", "tag": "hidden", "name": "Batik workshop", "area": "Penang Batik Factory", "desc": "Maak je eigen batik (was-gedrukte stof). 2-3 uur, je gaat naar huis met je eigen ontwerp. Verschillende studio's beschikbaar — Penang Batik Factory en Craft Batik in Teluk Bahang zijn de bekendste. 80-150 RM pp."}, {"id": "pg-backdoor", "cat": "drinks", "tag": "hidden", "name": "Backdoor Bodega", "area": "Love Lane", "desc": "Speakeasy, kleine cocktailbar, intieme sfeer. Achter een onopvallende deur, vraag bij de buren naar de ingang."}, {"id": "pg-magazine63", "cat": "drinks", "tag": "normaal", "name": "Magazine 63", "area": "Lebuh Magazine", "desc": "Whisky bar in een heritage shophouse. Goed voor een rustige avond na een drukke dag."}, {"id": "pg-mishmash", "cat": "drinks", "tag": "normaal", "name": "Mish Mash", "area": "Muntri Street", "desc": "Cocktail-focused, klein, hipster, met een serieus drink-programma. Goede happy hour."}, {"id": "pg-antarabangsa", "cat": "drinks", "tag": "hidden", "name": "Antarabangsa Enterprise", "area": "Chulia Street", "desc": "Niet hipster, juist het tegenovergestelde: een ouderwets winkeltje waar je goedkoop bier op een plastic stoeltje aan straat drinkt. Echt Penang. RM 7-10 voor een Tiger."}, {"id": "pg-walk-grand-loop", "cat": "wandeling", "tag": "topper", "name": "Grand George Town Loop (lange wandeling)", "area": "Esplanade → heritage → Hin Bus → Clan Jetties", "desc": "De grote George Town-wandeling: van het koloniale waterfront door de complete UNESCO-heritagezone, dan westwaarts naar de moderne arts-cluster rond Hin Bus Depot en Komtar, via de Macallum-murals terug naar de Clan Jetties aan zee. George Town is hét loop-paradijs van de reis — hier mag echt 7-8 km. Ochtend of late middag; mijd de middaghitte.", "intensity": "stevig", "distance_km": 7.5, "duration": "Wandelen ~2u45 (5 km/u). Met tempels, arts en koffie: 4-5u.", "best_time": "Ochtend 8-12u (tempels open, koeler) of late middag 16-19u, eindig bij de Jetties rond zonsondergang.", "midpoint": "Hin Bus Depot", "avoid": "Niet via Jalan Penang en Komtar Walk in de spits — blijf in de heritage-steegjes (Lebuh Pantai, Lebuh Pasar, Armenian). Het stuk Komtar → Macallum loopt door gewone stad; dat hoort erbij, kop op tot de waterfront.", "rain_plan": "Khoo Kongsi en Kapitan Keling zijn overdekt. Hin Bus Depot heeft overdekte galerijen en koffie — schuil daar; de tweede helft naar de Jetties wacht wel.", "coffee_stop": "Toh Soon of The Mugshot vóór vertrek; Hin Bus Depot (galerij-café) halverwege.", "waypoints_part1": [{"name": "Esplanade (Padang Kota Lama)", "lat": 5.4222, "lng": 100.3419, "note": "Start aan het waterfront waar Francis Light in 1786 landde. Zeebries, koloniale City Hall."}, {"name": "Fort Cornwallis", "lat": 5.4209, "lng": 100.3445, "note": "Oudste Britse fort van Maleisië (1786). Kanonnen, uitzicht op zee. Even rondkijken."}, {"name": "Penang Town Hall", "lat": 5.4202, "lng": 100.3422, "note": "Wit koloniaal gebouw (1880) aan de Padang. Externe blik volstaat."}, {"name": "Goddess of Mercy Temple", "lat": 5.4197, "lng": 100.3389, "note": "Oudste Chinese tempel van Penang (1728). Levendig met locals en wierook."}, {"name": "Kapitan Keling Mosque", "lat": 5.4173, "lng": 100.3361, "note": "Indo-moslim moskee (1801), witte koepels. Buitenkant volstaat."}, {"name": "Lebuh Armenian (murals)", "lat": 5.4156, "lng": 100.3387, "note": "Mural-zone met Zacharevic's 'Children on a Bicycle'. Vroeg = minder selfies."}, {"name": "Khoo Kongsi", "lat": 5.4146, "lng": 100.3389, "note": "Sierlijke clan-tempel (15 RM) — een van de mooiste van Zuidoost-Azië. Wel doen."}, {"name": "Hin Bus Depot", "lat": 5.412049, "lng": 100.328124, "note": "Halverwege. Oude busremise (1947), nu arts-hub met galerijen en café. Even neerstrijken vóór deel 2."}], "waypoints_part2": [{"name": "Hin Bus Depot (vertrek deel 2)", "lat": 5.412049, "lng": 100.328124, "note": "Opnieuw vertrekpunt. Loop richting de Komtar-toren."}, {"name": "Komtar", "lat": 5.4145, "lng": 100.3292, "note": "Penangs hoogste toren (1985), het moderne baken. Korte doorsteek door de stad."}, {"name": "Macallum Street Ghaut (murals)", "lat": 5.406324, "lng": 100.332664, "note": "Grootschalige street-art tussen de woonblokken op gewonnen land. Minder toeristisch, rauwer."}, {"name": "Tan Jetty", "lat": 5.413, "lng": 100.343, "note": "Een van de rustigere Clan Jetties. Houten huizen op palen boven het water."}, {"name": "Chew Jetty", "lat": 5.414, "lng": 100.3425, "note": "Eindpunt. Grootste en mooiste clan jetty — loop tot de uiterste punt, zonsondergang over de Penang Strait."}], "gmaps_url_part1": "https://www.google.com/maps/dir/5.4222,100.3419/5.4209,100.3445/5.4202,100.3422/5.4197,100.3389/5.4173,100.3361/5.4156,100.3387/5.4146,100.3389/5.412049,100.328124/data=!4m2!4m1!3e2", "gmaps_url_part2": "https://www.google.com/maps/dir/5.412049,100.328124/5.4145,100.3292/5.406324,100.332664/5.413,100.343/5.414,100.3425/data=!4m2!4m1!3e2"}], "days": [{"date": "Dinsdag 9 juni", "character": "De aankomstdag", "what": "Bus uit KL (4-5u), inchecken bij Manhattan, een korte loop door de heritage-zone en simpel eten dichtbij. Niets ambitieus — Penang heeft er nog vier dagen voor.", "why": "Een busrit van 4-5 uur is geen pretje, ook al heb je niet gevlogen. Je komt aan, je bent klef, je hebt zin in een douche, geen zin in een walking tour. Bovendien: George Town's UNESCO-zone werkt het best als je er rustig in glijdt. Je hebt morgen een hele dag om de klassiekers te doen.", "flow": "Vertrek vroeg uit KL (KKKL of Aeroline busmaatschappij — boek vooruit, kost ~50 RM). Aankomst Penang Sentral rond 13-14u, dan ~20 min Grab naar Manhattan op George Town. Tip: Manhattan ligt iets noordelijk van het UNESCO-hart, maar alles op loopafstand of korte Grab.\n\nInchecken, douchen, een uur platliggen.\n\nLate middag, als de hitte breekt: een korte loop. Niet de heritage walk — die spaar je voor morgen. Loop gewoon richting Chulia Street en Love Lane. Dit zijn de straten waar 's avonds van alles gebeurt; zien wat er is, zonder agenda. Bij **The Mugshot Cafe** een verse smoothie of bagel als snack als je daar zin in hebt.\n\nDiner op **Chulia Street Night Hawker** of een van de zit-restaurants op Kimberley Street — char koay teow, wantan mee, satay. Allemaal goed, allemaal goedkoop, allemaal 5 min van het hotel. Cash. Tafels delen is normaal.\n\nTerug, vroeg slapen. Morgen is een grotere dag.", "planB": "Bus vertraagd of doodmoe aangekomen? Hotel-pool of dakterras, dan dichtstbijzijnde hawker (Kimberley Street is letterlijk om de hoek). Geen ambitie nodig.", "not": "Niet vandaag al naar Toh Soon — dat is een ochtend-ervaring. Geen Penang Hill, geen Kek Lok Si, geen heritage walk. Vandaag is logistiek, niet inhoud."}, {"date": "Woensdag 10 juni", "character": "De heritage-dag", "what": "Vroeg ontbijt bij een Penang-instelling, dan de klassieke heritage walk door de UNESCO-zone, lunch bij een streetfood-legende, middagrust, en 's avonds hawker.", "why": "Dit is de dag waarop Penang Penang wordt. George Town's UNESCO-zone is plat en compact — alles binnen 2 km², alles op loopafstand. Eén goed-getimede dag (vroeg beginnen, middag schuilen, late namiddag weer naar buiten) en je hebt de helft van wat Penang biedt gezien. Belangrijk: woensdag betekent dat **Toh Soon Cafe** dicht is — dus die schuif je naar donderdag of vrijdag. Vandaag begin je bij **Oriental Coffee** of **Mugshot**.", "flow": "Ontbijt vanaf 8u bij **Oriental Coffee** op Lebuh Campbell — specialty kopi, kaya toast, airco. Of, als je liever bagels en flat white wilt, **The Mugshot Cafe** op Chulia Street.\n\nDan de **Klassieke heritage walk**. Begin bij Penang Town Hall, door naar Fort Cornwallis (1786, oudste Britse fort in Maleisië, 15 min), dan Pinang Peranakan Mansion (sla de tour over als geen zin, exterieur alleen is mooi), Armenian Street voor de murals (waaronder Zacharevic's 'Children on a Bicycle'), Khoo Kongsi (15 RM, sierlijke clan-tempel — wel doen), Kapitan Keling Mosque, Goddess of Mercy Temple. Eindig bij Chew Jetty — een van de Clan Jetties, houten huizen op palen boven het water.\n\n3-4 uur in totaal. Niet doorlopen. Stop bij elke stoof-tempel, ga zitten in de schaduw, drink een limonade. Het is niet een trek-route maar een dwaalroute.\n\nLunch: **Siam Road Charcoal Char Koay Teow** — Michelin Bib Gourmand, vandaag is woensdag dus open (di-za 12-18u). Een korte Grab vanaf de UNESCO-zone. Wachtrij is normaal. Vraag om duck egg upgrade. Plastic stoeltjes, geen sfeer, perfect.\n\nDessert op de terugweg: **Penang Road Famous Teochew Chendul** op Lebuh Keng Kwee. Sinds 1936. RM 2,90, altijd een rij.\n\nMiddagrust 14:30-16:30u. Hotel, douche, even niets.\n\nAvond: **New Lane Hawker Centre** vanaf 18u. Een avond hawker-zone met alle klassiekers in één plek — char koay teow (andere koks dan Siam Road, ook goed), lok lok, satay, ikan bakar. Drukst 19-22u. Eet bij meerdere stalletjes, drink Tiger.\n\nNa dineren: één drink bij **Backdoor Bodega** op Love Lane (speakeasy, vraag bij de buren naar de ingang) of een ouderwetse Tiger op een plastic stoel bij **Antarabangsa Enterprise** — het tegenovergestelde van Backdoor, en authentieker Penang.", "planB": "Regen tijdens de walk: schuif door naar **Cheong Fatt Tze (Blue Mansion)** — guided tour om 11u, 14u of 15:30u, droog en koel, 45 min verhalen over feng shui en Crazy Rich Asians. Daarna lunch bij **Tek Sen** als het al donderdag is (dicht di-wo, dus check) of **Kebaya Dining Room** als je een splurge wilt verzetten. Anders **Penang Road Famous Laksa** is een fatsoenlijk droogweer-alternatief voor Siam Road CKT.\n\nGeen energie voor New Lane 's avonds? **Chulia Street Night Hawker** is letterlijk om de hoek van het hotel. Ook prima.", "not": "Niet ook nog Penang Hill of Kek Lok Si proberen vandaag. Dat is morgen. Niet door de heritage walk rushen om alles te zien — als je 5 van de 8 stops hebt gedaan ben je geslaagd. Geen Cheong Fatt Tze als je niet van guided tours houdt; het exterieur volstaat."}, {"date": "Donderdag 11 juni", "character": "De Penang Hill + Air Itam-dag", "what": "Vroeg met de funicular omhoog naar Penang Hill, koele lucht en panorama, terug omlaag voor de wereldberoemde laksa, dan Kek Lok Si tempel. Middag rust, avond een fatsoenlijk diner.", "why": "Air Itam (waar Penang Hill, Kek Lok Si en de laksa-tent letterlijk binnen 1 km van elkaar liggen) is georganiseerd alsof Penang het voor je heeft uitgedacht. Drie van de absolute hoogtepunten in één halve dag. Vroeg gaan is essentieel: de funicular wordt na 10u stampvol, de hitte na 12u op Kek Lok Si is brutaal. Met een lekker ontbijt voorop maak je hier een geweldige dag van.", "flow": "Ontbijt vanaf 7:30u bij **Toh Soon Cafe** in de steeg op Campbell Street — vandaag is donderdag dus weer open. Kaya toast over houtskool, soft-boiled eggs, sterke kopi. Onder een tarp, plastic stoel, niet specialty maar zuiver Penang. Drukst 8-9u, dus liefst vóór.\n\nGrab naar Air Itam (20 min, ~15 RM). Funicular omhoog rond 9u (open 6:30u, 30 RM retour). 5 min snel naar boven. Boven: 833m, een paar graden koeler, panorama over het hele eiland.\n\n**Penang Hill**: loop naar **The Habitat** (rainforest canopy walk, ~60 RM, 1.5 uur). Hangbruggen tussen boomkruinen, neushoornvogels, makaken. Een van de beter-gevormde canopy walks in Zuidoost-Azië. Wie geen zin heeft in nog een entreeprijs: gewoon over de top wandelen, langs de koloniale bungalows.\n\nFunicular omlaag rond 11:30u. Lopen of korte Grab naar **Air Itam Laksa** bij Air Itam Market. Open vanaf 11u. Anthony Bourdain noemde dit ooit mogelijk de beste Assam Laksa ter wereld. Een dieprode tamarinde-vissoep met dikke rijstnoedels, ananas, mint, gehakte ui. Eet één kom. Wil je twee — eet er twee. RM 6 per kom.\n\nDan loop je 5 minuten naar **Kek Lok Si Tempel** — grootste Buddhistische tempel-complex van Zuidoost-Azië, sinds 1891. De 7-verdiepings pagode is fotogenick (Chinese + Thaise + Burmese stijl gemixt), de 30m bronzen Kuan Yin op de top is indrukwekkend. Neem de schuine lift naar boven (vermijd 200 trappen in de middaghitte). 1.5-2 uur.\n\nTerug naar George Town rond 14:30u. Middagrust 15-17u. Verplicht. De hitte plus de ochtend is genoeg.\n\nAvond, twee opties: **Tek Sen Restaurant** (Cantonees sinds 1965, hun double-roasted pork-claypot belly is legendarisch — ga 17:30u of na 20:30u want geen reserveringen, donderdag is open) of **Kebaya Dining Room** (modern Peranakan tasting in het Seven Terraces boutique hotel, een van de mooiste sferen van George Town, reserveer). Kebaya als je een rustige verfijnde avond wilt; Tek Sen als je in voor de chaos en de beste claypot van je leven.\n\nLast drink: **Magazine 63** voor whisky in een rustige shophouse, of **Mish Mash** voor cocktails.", "planB": "Mist of regen boven? Penang Hill werkt dan niet — je ziet niets. Skip naar morgen of helemaal. Dan: Toh Soon ontbijt → Air Itam Laksa direct (open 11u) → Kek Lok Si → terug. Of: gebruik de dag voor de **Penang Chiak Cooking Class** als die ochtendklas (8:10u) toevallig past — Chowrasta Market bezoek en 4 Peranakan-gerechten maken in een privé-keuken.\n\nTek Sen dicht (di-wo)? Vandaag is donderdag dus geen probleem — maar als plan-B ooit nodig: **Jawi House Cafe Gallery** voor de bijzondere Jawi Peranakan-keuken, of **ChinaHouse** voor sfeer over drie heritage huizen.", "not": "Niet Penang Hill plus Kek Lok Si plus heritage walk plus avond uit in één dag — kies. Niet de 272 stappen omhoog bij Kek Lok Si lopen in de middaghitte (er is een lift, gebruik die). Geen Cheong Fatt Tze ook nog erbij."}, {"date": "Vrijdag 12 juni", "character": "De rust- of natuurdag", "what": "Eén keuze: óf Penang National Park voor jungle en lege stranden, óf een echte rustdag in cafés. Geen verplichtingen.", "why": "Na twee stevige dagen heb je een open dag nodig — en die was ook precies wat jullie reisfilosofie vraagt (lekker rondlopen, koffietjes, niet te veel). Maar er is één activiteit die voor Vincent waarschijnlijk meer past dan een café-dag in alleen George Town: **Penang National Park**. Lege stranden, 2-3 uur door regenwoud, dat past bij jouw training-tempo. De andere optie is even legitiem: gewoon dwalen in George Town, een specialty café na het andere, lunch, middagdutje, avondcocktail. Beide goede dagen.", "flow": "**Optie A — Penang National Park.** Grab naar Teluk Bahang (30 min, ~30 RM). Aan de noordwestpunt van het eiland. Twee routes:\n\nNaar Turtle Beach: ~1.5 uur stevige wandeling door regenwoud, leeg strand, soms zeeschildpadden in het zwembassin (ranger-station vertelt je of er iets te zien is). Of korter naar Monkey Beach: ~45 min, ook strand, ook apen (geen voer mee).\n\nVroeg gaan (8:30-9u uit hotel). Water mee. Lunch op Monkey Beach is mogelijk (eenvoudige seafood-shacks) of terug en eten in Tanjung Bungah of George Town. Op een vrijdag is het park nog rustig.\n\nTerug naar het hotel rond 14-15u. Middag pool, douche, niets doen.\n\nAvond: **888 Hokkien Mee** — vrijdagavond is een ideale avond hiervoor. Een avondzaak, beroemd om Penang Hokkien Mee met die diep-oranje garnalenbouillon die uren is getrokken. Klein, druk, perfect.\n\nAfsluiter: coc
