stilstaan. Geen probleem, je hebt geen schema.\n\nInchecken. Sam Yan is een ondergewaardeerde wijk: minder toeristisch dan Sukhumvit, MRT direct, dichtbij Chinatown én Silom. Het hotel ligt goed.\n\nKorte rust 15-17u. Pool als die er is. Verfrissen.\n\nLate middag, optioneel: korte loop richting Chulalongkorn-campus (5 min lopen) en de Samyan Mitrtown mall (overdekt, airco, koffie, gewoon Bangkok-iaal voorbereidend). Geen verplichting.\n\nRond 18u: MRT vanaf Sam Yan naar Wat Mangkon (3 stops, 20 baht). Je komt midden in **Yaowarat (Chinatown) avond** uit. Loop Yaowarat Road, de hoofdader, oplopend naar het oosten. T&K Seafood (groen-shirts, beroemd, goedkoop — bestel oysters in scharrelei, gegrilde garnalen, knoflook). Nai Ek Roll Noodle voor kway chap. Khao Niaow Mamuang Kor Panich voor mango sticky rice (sinds 1932, vaak genoemd als de beste van Bangkok).\n\nGeen rush. Geen 'must-do' lijstje. Vingerwijzen, proeven, doorlopen. Cash. 200-300 baht voor twee mensen per stalletje.\n\nRond 21u terug naar Sam Yan via MRT. Of langer blijven.\n\nAvonddrink: **Mimi's Rooftop Bar** boven het hotel — Miami-thema, opzettelijk kitsch, maar de view en de cocktails zijn echt. Geen ergens-heen, gewoon de lift naar boven. Of als je nog energie hebt: **Sky Bar (Lebua)** op verdieping 64 (vermijd shorts/slippers, cocktails ~600 baht, uitzicht is jaw-dropping).", "planB": "Vlucht vertraagd of zware Krabi-ochtend (Tiger Cave Temple kan je toch breken)? Gewoon hotel-pool en MRT-stop verderop voor lokaal eten — Sam Yan is een lokale eet-buurt, je hoeft Yaowarat niet vandaag. Of bestel via Grab Food en kijk de jetlag-aanval over de Bangkok-skyline vanaf Mimi's. Yaowarat morgen of overmorgen kan ook.", "not": "Niet Grand Palace, niet Wat Pho, niet Khao San Road. Niet morgen al een 4-Michelin-marathon proberen — als Le Du/80/20/Sorn op het lijstje staat, hou daar morgen voor (donderdag). Geen Chatuchak overdag (alleen weekend dag of vrijdagavond, dat is morgen)."}, {"date": "Donderdag 25 juni", "character": "De wijken-dag (Ari + Talat Noi + splurge)", "what": "Ochtendloop in Lumphini Park, dan Ari voor een café-hop met de beste koffie van de stad, lunch lokaal in Ari, na de hitte naar Talat Noi voor murals en design-galerijen, en 's avonds één van de splurge-diners. Veel wandelen — maar gefragmenteerd, met pauzes.", "why": "Dit is de dag die Vincent moet hebben. Geen tempels of paleizen — wel twee van de drie hippe wijken (Ari + Talat Noi/Charoen Krung) plus een Michelin-diner. De vorm: vroege ochtend voor de hitte, café-hop ochtend, lunch lokaal, middag overgang, middag-pauze, late middag tweede wijk, vroege avond rust voor het diner. Bangkok-tempo op een Bangkok-manier.", "flow": "Vroeg op (6:30u), korte loop richting **Lumphini Park (vroege ochtend)** — 10 min lopen vanaf het hotel. Tussen 5-7u: Tai Chi groepen, joggers, monitor-hagedissen langs de paden. 2-2.5 km rondom het park is een fijne ochtendloop. Terug rond 8u.\n\nOntbijt **Findfoundfounded** (12 min lopen of korte Grab, ~5 min in ochtendstilte): zelfgebakken sourdough, goede koffie, klein huis op Bantadthong Road, retro details, geen design-theater. Doordeweeks 's ochtends rustig.\n\nRond 10u: BTS vanaf Sam Yan (overstap nodig — Sam Yan zit op de MRT Blauwe Lijn, BTS Ari is op de Sukhumvit Lijn. Bij Siam-Asok-route via Saladaeng overstap, of Grab — ~25 min, ~150 baht). \n\n**Ari café-hop**: **NANA Coffee Roasters** (zalmkleurig bakstenen gebouw, nationale Thaise barista-kampioenen — single origin filter), **Porcupine Café** (homey, gezellig), **Glig Cafe** (mooie natuurlijke lichten). Niet alledrie, kies twee. Loop tussendoor langs zijstraten Inthamara en Phaholyothin Soi 7 — Ari is geen 'must-do attracties' wijk, het is een 'rondkijken' wijk.\n\nLunch in Ari: noedeltentje langs straat (zoek naar plastic stoelen en lokalen), of Salt. Geen specifieke aanbeveling — kijk waar mensen zitten, ga zitten.\n\nMiddagdip 13-15u. Terug naar hotel met BTS+MRT of Grab. Pool of bed.\n\nLate middag (~16u): MRT naar Hua Lamphong (één stop vanaf Sam Yan). Begin **Talat Noi walk**.\n\nDe route: Hua Lamphong Station → Warehouse 30 (gerenoveerde industriële ruimte, design shops, **A Coffee Roaster by Li-Bra-Ry** voor een tweede espresso) → Trok San Chao Rong Kueak (mural-zone, hart van Talat Noi) → **Mother Roaster Cafe** (klein, super gezellig, kleurige murals om je heen) → Antique Turtle Car (Volkswagen-roest-relic, must-Instagram) → Holy Rosary Church (1787, oudste Portugese kerk in Bangkok) → Chow Sue Kong Shrine → So Heng Thai Mansion (verlaten Chinees herenhuis, je mag rondkijken) → **La Cabra Bangkok** voor een laatste filter koffie (Deense roastery, een van Bangkok's allerbeste cafés voor serieuze koffie-liefhebbers).\n\n3-4 uur in totaal. Het is een dwaalroute, geen trekroute. Stop overal.\n\nTegen 19u terug naar hotel om je om te kleden voor diner.\n\n20u: één van de splurge-diners. Mijn aanbevelingen, in volgorde:\n\n1. **Le Du** (Silom — niet ver van hotel, Grab 10 min) — een-Michelin-ster, chef Ton kookt met kleine-boerderij-ingrediënten, spannend maar toegankelijk. Voor wie 'modern Thais' wil maar niet de zwaarste hand. Reserveer 3-4 weken vooruit.\n2. **80/20** (Chinatown) — modern Thai-fusion, een-Michelin-ster, ingrediënt-gedreven (80% lokaal, 20% import), intieme setting. Iets adventueerder dan Le Du.\n3. **Mother BKK** (Talat Noi — naast La Cabra waar je net was!) — 10 gangen, opulent en elegant, tapas-stijl. Reserveer 1-2 weken vooruit. Mooie combinatie als je in Talat Noi al was.\n\nNa diner: één laatste drink. **Tep Bar** (Charoen Krung, dichtbij Talat Noi) voor live Thaise muziek en cocktails op basis van Thaise alcoholen. Of, als je in Sukhumvit-richting bent na Le Du: **Vesper** voor pre-Prohibition cocktails.", "planB": "Regen 's ochtends: skip Lumphini-loop, ontbijt direct bij **Findfoundfounded** of doe het hotel-ontbijt. Ari-café-hop kan deels overdekt (NANA en Porcupine hebben binnen) maar Talat Noi mural-wandeling werkt niet in stortbui — wissel die met **Jim Thompson House** (klein museum, traditioneel Thais houten huis, 1-1.5u, dichtbij Siam BTS).\n\nGeen splurge-reservering gelukt: **Soei Restaurant** (Phra Nakhon — Aunty Soei al 40 jaar, klein, intiem, beroemd om garnalen-cake, geen Engels-menu) of **Err Urban Rustic Thai** (modern Thais in pre-war shophouse, vlakbij Wat Pho, speelse menukaart, makkelijker te krijgen).", "not": "Niet beide wijken in één blok proberen te proppen — Ari ochtend, Talat Noi late middag, met serieuze middagrust ertussen. Niet tijdens spits (16:30-19:30) een Grab door de stad nemen — vandaar dat de late middag-wandeling in Talat Noi loopt en je via MRT komt. Niet ook nog Wat Pho of Wat Arun erbij vandaag."}, {"date": "Vrijdag 26 juni", "character": "De markt-dag (Or Tor Kor + Chatuchak Friday wholesale)", "what": "Or Tor Kor in de ochtend voor eten van wereldklasse, lichte middag, eventueel Jim Thompson House of Wat Pho voor cultuur, dan Chatuchak Friday wholesale night vanaf 19u, late dinner bij Krua Apsorn en drinks bij Tep Bar.", "why": "Dit is de markt-dag. Op vrijdag is er een geluk: Chatuchak (anders alleen zaterdag/zondag overdag) opent een wholesale night market van 18-24u — koeler weer, betere prijzen, minder toeristen. Or Tor Kor (CNN top fresh markets ter wereld) ligt direct naast Chatuchak, dus je kunt ze op één lijn programmeren, met middagrust ertussen. Foodie-fans krijgen vandaag wat ze willen.", "flow": "Ontbijt rustig (hotel, of vroeg bij **Findfoundfounded** als je het wilt herhalen).\n\n9:30u: BTS Sam Yan → Siam → Mo Chit (~30 min, ~80 baht). Of Grab in de ochtend (vóór spits OK, ~30 min).\n\n**Or Tor Kor Market** vanaf 10u. CNN top fresh markets — niet voor souvenirs, voor eten en producten. Wat te doen: rondlopen en kijken, en dan ter plekke eten. Aanbevolen stalletjes binnen:\n\n- Pad thai gewikkeld in dunne omelet (sectie food court, achterin links)\n- Chiang Mai sai oua-worst (gegrilde noord-Thaise worst met citroengras)\n- Satay-stalletjes (kies waar locals staan)\n- Gegrilde rivierprawns met chili-saus\n- Vers fruit-sectie: monthong durian (als je durft), mangosteen, dragonfruit\n\nReken op 2-3 uur. 300-500 baht per persoon voor een uitgebreide proef-tour. Cash.\n\nLunch is dus al onderweg gedaan.\n\nMiddag 13-16u: terug naar hotel, of een lichtere middag-activiteit:\n\n- **Jim Thompson House** (BTS Siam, dichtbij): klein museum, traditioneel Thais houten huis, 1-1.5u, 200 baht. Het verhaal van Jim Thompson (Amerikaanse OSS-officier die de Thaise zijde-industrie nieuw leven inblies en mysterieus verdween in 1967) is fascinerend.\n- Of hotelpool. Mei-juni-warmte plus Bangkok-airco-overschakelen vraagt om rust. Niet schamen.\n\nRond 18:30u: opnieuw BTS naar Mo Chit. **Chatuchak Weekend Market** wholesale night vanaf 19u-24u. Vrijdagavond is anders dan weekend-dag: koeler, prijzen scherper, vooral wholesale-handelaars en serieuze kopers, minder selfies. Niet zo gigantisch op vrijdagavond als zaterdag-zondag (zo'n derde van de stalletjes is open), maar dat maakt het werkbaar in plaats van overweldigend. 27 secties — kledingsecties, plant-secties, vintage en bonsai-secties. Vincent: vintage-kleren, lokale Thaise designers, koffie-equipment uit kleine roasters.\n\nDoe 2-2.5 uur. Geen lijstje — gewoon dwalen.\n\nTegen 21:30u: terug naar Phra Nakhon (~20 min Grab, na spits dus relatief vlot). **Krua Apsorn** voor late dinner — iconische lokale tent. Hun kao kluk gapi (rijst met garnalenpasta) en tom yum kung worden vaak genoemd als de beste van de stad. Geen reserveringen. 200-400 baht pp.\n\nNa dinner: drinks bij **Tep Bar** (Charoen Krung) — live Thaise traditionele muziek (loek thung, mor lam) op basis van Thaise alcoholen (lao khao, sato). Een van de meest authentieke avonden in Bangkok. Of, als je liever stil-en-elegant: **Bamboo Bar (Mandarin Oriental)** — sinds 1953, een van Azië's oudste cocktail bars, live jazz elke avond, smoking-jacket-vibe. Stevige prijzen, maar speciaal.", "planB": "Geen energie voor Chatuchak ook nog: skip 'em. Or Tor Kor op zichzelf is een geslaagde marktdag. Vervang Chatuchak door **Wat Pho** late namiddag (16-17u, na de drukte, nog open tot 18:30u — Reclining Buddha is indrukwekkender dan het Grand Palace en veel rustiger op die tijd). Dan dinner Krua Apsorn op normaal uur (19-20u).\n\nKrua Apsorn lange rij (kan een uur worden)? **Polo Fried Chicken** (Lumphini, dichtbij hotel) of **Thip Samai Pad Thai** (Phra Nakhon, sinds 1966, pad thai gewikkeld in dunne omelet).\n\nRegen 's avonds: Chatuchak Friday is grotendeels overdekt maar de paden tussen secties zijn nat — skip, doe een **Klong (kanaal) tour Thonburi** vroege ochtend morgen in plaats van Or Tor Kor + Chatuchak. Of dineren binnen bij **80/20** in Chinatown.", "not": "Niet Or Tor Kor en Chatuchak achter elkaar in één blok ('s middags) — middagrust verplicht. Niet vandaag ook nog Talat Noi (was donderdag al). Niet meer dan twee Michelin-diners in deze hele Bangkok-fase — er is meer in Bangkok dan tasting menu's."}, {"date": "Zaterdag 27 juni", "character": "De vertrekdag", "what": "Rustige ochtend, koffie bij Findfoundfounded, late check-out, naar Suvarnabhumi voor de avondvlucht naar huis (~12u vlucht).", "why": "De laatste dag van een lange reis. Geen ambities meer — Bangkok heeft jullie genoeg gegeven. Ontbijt, één laatste goede koffie, koffer pakken, taxi naar de luchthaven. Het hoeft niet meer.", "flow": "Ontbijt op vrije keuze — laatste hotel-ontbijt of laatste tour naar **Findfoundfounded** (12 min lopen, sourdough en goede koffie afsluiter).\n\nLate check-out aanvragen indien mogelijk (dusitD2 doet doorgaans tot 14u tegen betaling of als upgrade).\n\nKoffer pakken, douche, klaar staan.\n\nNaar Suvarnabhumi: 45 min Grab in normaal verkeer, langer in spits. Op zaterdag late middag is verkeer onvoorspelbaar — calculeer minimaal 1.5-2u tot inchecktijd. Als je vlucht 23-24u vertrekt, vertrek dan 18-19u uit hotel.\n\nOnderweg: laatste laatste eten in een airport mall (Suvarnabhumi heeft fatsoenlijke lokale opties) of een echte laatste lunch ergens onderweg.\n\nVlucht naar Amsterdam — ~12u.", "planB": "Vlucht 's middags? Skip late check-out, vertrek na ontbijt en lunch op de luchthaven. Vroege vlucht? Hotel-ontbijt of zelfs Findfoundfounded skippen, direct naar Suvarnabhumi.\n\nLaatste 'ik wil nog íets doen'-energie? Een laatste **Thaise massage** in een Health Land (~650 baht/u, schoon) is een betere afsluiter dan een tempel. Of een laatste koffie bij **Mother Roaster Cafe** in Talat Noi.", "not": "Niet vandaag nog Wat Pho of Wat Arun proberen — vluchten naar Europa zijn lang en je begint moe. Geen Chatuchak nog (weekend-versie open, maar je was er gisteren). Geen Grand Palace deze hele reis, niet vandaag, niet nooit (dit was de afspraak)."}]}}};</script>
<script>
'use strict';

// ===== STATE =====
const state = {
  active: 'intro',
  search: '',
  filterCat: 'all',
  filterTag: 'all',
  fav: new Set(JSON.parse(localStorage.getItem('vk-fav') || '[]')),
  done: new Set(JSON.parse(localStorage.getItem('vk-done') || '[]')),
  doneItems: new Set(JSON.parse(localStorage.getItem('vk-doneitems') || '[]')),
  openDays: new Set(),
};

const save = () => {
  localStorage.setItem('vk-fav', JSON.stringify([...state.fav]));
  localStorage.setItem('vk-done', JSON.stringify([...state.done]));
  localStorage.setItem('vk-doneitems', JSON.stringify([...state.doneItems]));
};

const updateStats = () => {
  document.getElementById('stat-fav').textContent = state.fav.size;
  document.getElementById('stat-done').textContent = state.done.size;
};

// ===== DATE LOGIC =====
// Trip schedule with date ranges
const TRIP_DAYS = [
  { from: '2026-06-05', to: '2026-06-06', loc: null, label: 'Vlucht heen' },
  { from: '2026-06-06', to: '2026-06-09', loc: 'kl' },
  { from: '2026-06-09', to: '2026-06-13', loc: 'penang' },
  { from: '2026-06-13', to: '2026-06-17', loc: 'langkawi' },
  { from: '2026-06-17', to: '2026-06-22', loc: 'kohlipe' },
  { from: '2026-06-22', to: '2026-06-24', loc: 'krabi' },
  { from: '2026-06-24', to: '2026-06-27', loc: 'bangkok' },
  { from: '2026-06-27', to: '2026-06-28', loc: null, label: 'Vlucht terug' },
];

const getCurrentTripState = () => {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  for (const d of TRIP_DAYS) {
    const from = new Date(d.from); from.setHours(0,0,0,0);
    const to = new Date(d.to); to.setHours(0,0,0,0);
    if (today >= from && today < to) {
      const diff = Math.floor((today - from) / 86400000);
      return { ...d, dayIdx: diff, today };
    }
  }
  // Before trip?
  const start = new Date(TRIP_DAYS[0].from); start.setHours(0,0,0,0);
  if (today < start) {
    const days = Math.ceil((start - today) / 86400000);
    return { before: true, daysUntil: days, today };
  }
  // After trip
  return { after: true, today };
};

const tripState = getCurrentTripState();

// ===== SHORT TAB LABELS =====
const TAB_LABELS = {
  intro: { full: 'Overzicht', short: 'Overzicht', emoji: '🏠' },
  kl: { full: 'KL', short: 'KL', emoji: '🇲🇾' },
  penang: { full: 'Penang', short: 'Penang', emoji: '🇲🇾' },
  langkawi: { full: 'Langkawi', short: 'Langkawi', emoji: '🇲🇾' },
  kohlipe: { full: 'Koh Lipe', short: 'Koh Lipe', emoji: '🇹🇭' },
  krabi: { full: 'Krabi', short: 'Krabi', emoji: '🇹🇭' },
  bangkok: { full: 'Bangkok', short: 'Bangkok', emoji: '🇹🇭' },
  fav: { full: 'Favorieten', short: '★', emoji: '★' },
};

// ===== HELPERS =====
const mapSearch = q => `https://www.google.com/maps/search/${encodeURIComponent(q)}`;
const mapRoute = (waypoints) => `https://www.google.com/maps/dir/${waypoints.map(encodeURIComponent).join('/')}/data=!4m2!4m1!3e2`;

const catLabel = {
  koffie: '☕ Koffie',
  eten: '🍜 Eten',
  wandeling: '🚶 Wandeling',
  activiteit: '⭐ Activiteit',
  drinks: '🍸 Drinks',
};
const tagLabel = { topper: 'Topper', hidden: 'Hidden gem', splurge: 'Splurge' };

const escapeHtml = (s) => String(s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;').replace(/'/g, '&#039;');

// ===== TABS =====
const tabsContainer = document.getElementById('tabs');

const buildTabs = () => {
  const items = [
    { id: 'intro' },
    ...Object.values(TRIP_DATA.locations).map(loc => ({ id: loc.id })),
    { id: 'fav', isFav: true },
  ];
  tabsContainer.innerHTML = items.map(t => {
    const lbl = TAB_LABELS[t.id];
    const isCurrent = tripState.loc === t.id;
    const todayMark = isCurrent ? ' <span class="badge">📍</span>' : '';
    let extra = '';
    if (t.id === 'fav' && state.fav.size > 0) {
      extra = ` <span class="badge">${state.fav.size}</span>`;
    }
    return `<button class="tab ${state.active === t.id ? 'active' : ''} ${t.isFav ? 'fav-tab' : ''}" data-tab="${t.id}">${lbl.emoji ? lbl.emoji + ' ' : ''}${lbl.short || lbl.full}${todayMark}${extra}</button>`;
  }).join('');
  tabsContainer.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
};

const switchTab = (id) => {
  state.active = id;
  state.openDays.clear();
  // Auto-open today's day if switching to current location
  if (tripState.loc === id && typeof tripState.dayIdx === 'number') {
    state.openDays.add(tripState.dayIdx);
  }
  buildTabs();
  render();
  // Scroll tab into view
  const activeTab = tabsContainer.querySelector('.tab.active');
  if (activeTab) {
    setTimeout(() => activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }), 50);
  }
  window.scrollTo({ top: 0, behavior: 'instant' });
};

// ===== FILTER =====
const filterPlaces = (places) => {
  const search = state.search.toLowerCase().trim();
  return places.filter(p => {
    if (state.filterCat !== 'all' && p.cat !== state.filterCat) return false;
    if (state.filterTag !== 'all' && p.tag !== state.filterTag) return false;
    if (search) {
      const haystack = `${p.name} ${p.area} ${p.desc} ${catLabel[p.cat] || ''}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
};

// Search across all locations
const searchAll = () => {
  const search = state.search.toLowerCase().trim();
  if (!search) return [];
  const results = [];
  for (const loc of Object.values(TRIP_DATA.locations)) {
    for (const p of loc.places) {
      const haystack = `${p.name} ${p.area} ${p.desc}`.toLowerCase();
      if (haystack.includes(search)) {
        results.push({ ...p, locId: loc.id, locName: loc.name });
      }
    }
  }
  return results;
};

// ===== RENDER =====
const content = document.getElementById('content');

const renderPlaceCard = (p, withLoc) => {
  const fav = state.fav.has(p.id);
  const done = state.done.has(p.id);
  const tagHtml = p.tag !== 'normaal' ? `<span class="place-tag ${p.tag}">${tagLabel[p.tag]}</span>` : '';

  // Wandelingen met gestructureerde waypoints krijgen het volledige walk-detail blok.
  // Ondersteunt enkele routes (p.waypoints) én lange routes in twee delen
  // (p.waypoints_part1 + p.waypoints_part2), met een midpoint-stop als knip-punt.
  let walkBlock = '';
  const hasParts = !!(p.waypoints_part1 && p.waypoints_part2);
  const allWp = hasParts ? [...p.waypoints_part1, ...p.waypoints_part2] : p.waypoints;
  if (allWp && allWp.length > 0) {
    const midName = p.midpoint || 'koffiestop';

    const meta = [];
    if (p.intensity === 'stevig') meta.push(`<span class="walk-intensity-badge">💪 Stevig</span>`);
    if (p.distance_km) meta.push(`<span class="walk-meta-item"><strong>📏</strong>${p.distance_km} km</span>`);
    if (p.duration) meta.push(`<span class="walk-meta-item"><strong>⏱️</strong>${escapeHtml(p.duration)}</span>`);
    if (p.best_time) meta.push(`<span class="walk-meta-item"><strong>🕐</strong>${escapeHtml(p.best_time)}</span>`);

    const wpLi = (wp) => `
      <li class="walk-waypoint">
        <div class="walk-waypoint-name">${escapeHtml(wp.name)}</div>
        ${wp.note ? `<div class="walk-waypoint-note">${escapeHtml(wp.note)}</div>` : ''}
      </li>`;
    // Eén doorlopende genummerde lijst; bij twee delen een visuele scheiding op het midpoint.
    let waypointsHtml = '';
    allWp.forEach((wp, i) => {
      if (hasParts && i === p.waypoints_part1.length) {
        waypointsHtml += `<li class="walk-midpoint-divider">— Halverwege: ${escapeHtml(midName)} —</li>`;
      }
      waypointsHtml += wpLi(wp);
    });

    const sections = [];
    if (p.avoid) sections.push(`<div class="walk-section"><span class="walk-section-label">Vermijd</span>${escapeHtml(p.avoid)}</div>`);
    if (p.rain_plan) sections.push(`<div class="walk-section"><span class="walk-section-label">Bij regen</span>${escapeHtml(p.rain_plan)}</div>`);
    if (p.coffee_stop) sections.push(`<div class="walk-section"><span class="walk-section-label">Koffie onderweg</span>${escapeHtml(p.coffee_stop)}</div>`);
    if (p.food_stop) sections.push(`<div class="walk-section"><span class="walk-section-label">Eet onderweg</span>${escapeHtml(p.food_stop)}</div>`);

    // Twee delen = twee Maps-knoppen (iOS max ~10 punten per route); anders één knop.
    let mapsBtns;
    if (hasParts) {
      mapsBtns = `
      <a href="${p.gmaps_url_part1}" target="_blank" class="walk-maps-btn">🗺️ Deel 1: Start → ${escapeHtml(midName)} (${p.waypoints_part1.length} punten)</a>
      <a href="${p.gmaps_url_part2}" target="_blank" class="walk-maps-btn">🗺️ Deel 2: ${escapeHtml(midName)} → Eind (${p.waypoints_part2.length} punten)</a>`;
    } else {
      mapsBtns = `<a href="${p.gmaps_url}" target="_blank" class="walk-maps-btn">🗺️ Open ${allWp.length} waypoints in Google Maps</a>`;
    }

    walkBlock = `
      ${meta.length ? `<div class="walk-meta">${meta.join('')}</div>` : ''}
      ${sections.join('')}
      <ol class="walk-waypoints">${waypointsHtml}</ol>
      ${mapsBtns}
    `;
  }

  // Legacy: oude string-route fallback (geen wandelingen in deze versie meer, maar voor zekerheid)
  const routeBtn = (!allWp && p.route) ? `<a href="${mapRoute(p.route)}" target="_blank" class="place-link">🗺️ Route met ${p.route.length} stops</a>` : '';
  // Normale (niet-wandeling) plek: directe Maps-zoekknop
  const mapBtn = (!allWp && !p.route) ? `<a href="${mapSearch(p.name + ' ' + p.area)}" target="_blank" class="place-link">📍 Open op Maps</a>` : '';
  const locTag = withLoc ? `<div class="place-loc-tag">${escapeHtml(withLoc)}</div>` : '';
  return `
    <div class="place ${done ? 'done' : ''} ${fav ? 'fav' : ''}" data-id="${p.id}">
      ${locTag}
      <div class="place-head">
        <div class="place-title-wrap">
          <div class="place-title">${escapeHtml(p.name)}</div>
          <div class="place-meta">
            <span class="place-cat">${catLabel[p.cat]}</span>
            <span style="color: var(--text-muted);">·</span>
            <span class="place-area">${escapeHtml(p.area)}</span>
            ${tagHtml}
          </div>
        </div>
        <div class="place-actions">
          <button class="place-btn fav ${fav ? 'active' : ''}" data-action="fav" data-id="${p.id}" aria-label="Favoriet">★</button>
          <button class="place-btn done ${done ? 'active' : ''}" data-action="done" data-id="${p.id}" aria-label="Gedaan">✓</button>
        </div>
      </div>
      <div class="place-desc">${escapeHtml(p.desc)}</div>
      ${walkBlock}${routeBtn}${mapBtn}
    </div>
  `;
};

const renderFilters = (places) => {
  const cats = [...new Set(places.map(p => p.cat))];
  const filtered = filterPlaces(places);
  return `
    <div class="filters">
      <button class="filter ${state.filterCat === 'all' ? 'active' : ''}" data-filter-cat="all">Alles</button>
      ${cats.map(c => `<button class="filter ${state.filterCat === c ? 'active' : ''}" data-filter-cat="${c}">${catLabel[c]}</button>`).join('')}

    <div class="filters">
      <button class="filter filter-tag-topper ${state.filterTag === 'topper' ? 'active' : ''}" data-filter-tag="topper">⭐ Toppers</button>
      <button class="filter filter-tag-hidden ${state.filterTag === 'hidden' ? 'active' : ''}" data-filter-tag="hidden">💎 Hidden</button>

};

// ===== FAVORITES =====
const renderFavorites = () => {
  if (state.fav.size === 0) {
    return `
      <div class="hero">
        <div class="hero-name">Favorieten</div>
        <div class="hero-meta">Jouw shortlist</div>
        <div class="hero-intro">Tik op het ster-icoon (★) bij een plek om hem hier te bewaren. Handig om snel je 'kan-niet-missen'-lijstje te raadplegen.</div>
      </div>
      <div class="fav-empty">
        <div class="fav-empty-icon">★</div>
        <p>Nog geen favorieten.<br>Tik op ★ bij een plek om hem hier te zetten.</p>
      </div>
    `;
  }

  // Group favorites by location
  const byLoc = {};
  for (const loc of Object.values(TRIP_DATA.locations)) {
    const favs = loc.places.filter(p => state.fav.has(p.id));
    if (favs.length > 0) byLoc[loc.id] = { loc, favs };
  }

  // Build "all favorites" Maps route
  const allWaypoints = [];
  for (const { loc, favs } of Object.values(byLoc)) {
    for (const p of favs) {
      if (!p.route) allWaypoints.push(`${p.name} ${p.area}`);
    }
  }

  const groupsHtml = Object.values(byLoc).map(({ loc, favs }) => {
    // Per-location route link with all favorites
    const locWaypoints = favs.filter(p => !p.route).map(p => `${p.name} ${p.area}`);
    const routeBtn = locWaypoints.length >= 2
      ? `<a href="${mapRoute(locWaypoints)}" target="_blank" class="place-link" style="margin-bottom: 12px;">🗺️ Open ${locWaypoints.length} favorieten op Maps</a>`
      : '';
    return `
      <div class="fav-loc-group">
        <h3 class="fav-loc-title">${escapeHtml(loc.name)} <span class="count">${favs.length} ${favs.length === 1 ? 'plek' : 'plekken'}</span></h3>
        ${routeBtn}
        ${favs.map(p => renderPlaceCard(p)).join('')}
      </div>
    `;
  }).join('');

  return `
    <div class="hero">
      <div class="hero-name">Favorieten</div>
      <div class="hero-meta">${state.fav.size} ${state.fav.size === 1 ? 'plek' : 'plekken'} op je shortlist</div>
      <div class="hero-intro">Per locatie gegroepeerd. Tik op de Maps-knop voor een route langs al je favorieten in die plaats.</div>
    </div>
    ${groupsHtml}
  `;
};

// ===== LOCATION =====
const renderLocation = (loc) => {
  const isHere = tripState.loc === loc.id;
  const filtered = filterPlaces(loc.places);
  const groupOrder = ['koffie', 'eten', 'wandeling', 'activiteit', 'drinks'];
  const groupNames = { koffie: 'Koffie & ontbijt', eten: 'Lunch & dinner', wandeling: 'Wandelingen & dwalen', activiteit: 'Activiteiten', drinks: 'Avond & drinks' };
  const groups = {};
  filtered.forEach(p => { (groups[p.cat] = groups[p.cat] || []).push(p); });

  let placesHtml = '';
  for (const cat of groupOrder) {
    if (!groups[cat]) continue;
    placesHtml += `<h2 class="h2">${groupNames[cat]}</h2>`;
    placesHtml += groups[cat].map(p => renderPlaceCard(p)).join('');
  }
  if (filtered.length === 0) {
    placesHtml = `<div class="empty"><div class="empty-icon">🔍</div>Geen plekken voldoen aan de filters.</div>`;
  }

  // Days
  const renderRichDay = (d, i, isOpen, isToday) => {
    // Render markdown-style **bold** in flow tekst
    const renderText = (text) => escapeHtml(text)
      .replace(/\*\*([^*]+)\*\*/g, '<strong class="day-place">$1</strong>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    return `
      <div class="day rich ${isOpen ? 'open' : ''} ${isToday ? 'today' : ''}" data-day-idx="${i}">
        <div class="day-head" data-day-toggle="${i}">
          <div>
            <div class="day-title">${escapeHtml(d.date)}${isToday ? '<span class="day-today-badge">VANDAAG</span>' : ''}</div>
            <div class="day-character">${escapeHtml(d.character)}</div>
          </div>
          <div class="day-arrow">▾</div>
        </div>
        <div class="day-body">
          <div class="day-section">
            <div class="day-section-label">Wat is dit?</div>
            <p>${renderText(d.what)}</p>
          </div>
          <div class="day-section">
            <div class="day-section-label">Waarom deze dag zo?</div>
            <p>${renderText(d.why)}</p>
          </div>
          <div class="day-section flow">
            <div class="day-section-label">Suggestie voor de flow</div>
            <p>${renderText(d.flow)}</p>
          </div>
          ${d.planB ? `
            <div class="day-section planb">
              <div class="day-section-label">Plan B</div>
              <p>${renderText(d.planB)}</p>
            </div>
          ` : ''}
          ${d.not ? `
            <div class="day-section notdo">
              <div class="day-section-label">Wat je vooral NIET hoeft</div>
              <p>${renderText(d.not)}</p>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  };
  const renderSimpleDay = (d, i, isOpen, isToday) => {
    const total = d.items.length;
    const completed = d.items.filter((_, idx) => state.doneItems.has(`${loc.id}-d${i}-${idx}`)).length;
    return `
      <div class="day ${isOpen ? 'open' : ''} ${isToday ? 'today' : ''}" data-day-idx="${i}">
        <div class="day-head" data-day-toggle="${i}">
          <div>
            <div class="day-title">${escapeHtml(d.day)}${isToday ? '<span class="day-today-badge">VANDAAG</span>' : ''}</div>
            <div class="day-progress">${completed}/${total} afgevinkt</div>
          </div>
          <div class="day-arrow">▾</div>
        </div>
        <div class="day-items">
          ${d.items.map((item, idx) => {
            const key = `${loc.id}-d${i}-${idx}`;
            const done = state.doneItems.has(key);
            return `
              <div class="day-item ${done ? 'done' : ''}" data-day-item="${key}">
                <div class="day-check ${done ? 'done' : ''}"></div>
                <div class="day-text">${escapeHtml(item)}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  };
  const daysHtml = loc.days.map((d, i) => {
    const isOpen = state.openDays.has(i);
    const isToday = isHere && tripState.dayIdx === i;
    const isRich = d.character !== undefined;
    return isRich ? renderRichDay(d, i, isOpen, isToday) : renderSimpleDay(d, i, isOpen, isToday);
  }).join('');

  return `
    <div class="hero">
      <div class="hero-name">${escapeHtml(loc.name)}</div>
      <div class="hero-meta">${escapeHtml(loc.dates)} · ${escapeHtml(loc.hotel)}</div>
      <div class="hero-intro">${escapeHtml(loc.intro)}</div>
    </div>
    <a href="${mapSearch(loc.mapCenter)}" target="_blank" class="map-overview">
      <div class="map-overview-icon">🗺️</div>
      <div class="map-overview-text">
        <strong>Open ${escapeHtml(loc.name)} op Maps</strong>
        <span>Bekijk de buurt op de kaart</span>
      </div>
      <div class="map-overview-arrow">→</div>
    </a>
    <div class="tip">
      <strong>Praktisch</strong>
      ${escapeHtml(loc.tip)}
    </div>
    ${loc.culture ? `
      <div class="culture">
        <h4>${escapeHtml(loc.culture.title)}</h4>
        <p>${escapeHtml(loc.culture.text)}</p>
      </div>
    ` : ''}
    <h2 class="h2">Plekken</h2>
    ${renderFilters(loc.places)}
    ${placesHtml}
    <h2 class="h2">Per dag</h2>
    <p class="count-info">Tik op een dag om uit te klappen. Vink items af tijdens je trip.</p>
    ${daysHtml}
  `;
};

// ===== SEARCH RESULTS =====
const renderSearchResults = () => {
  const results = searchAll();
  if (results.length === 0) {
    return `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        Geen resultaten voor "${escapeHtml(state.search)}"
      </div>
    `;
  }
  // Group by location
  const byLoc = {};
  for (const r of results) {
    if (!byLoc[r.locId]) byLoc[r.locId] = { name: r.locName, places: [] };
    byLoc[r.locId].places.push(r);
  }
  const groupsHtml = Object.values(byLoc).map(g => `
    <div class="fav-loc-group">
      <h3 class="fav-loc-title">${escapeHtml(g.name)} <span class="count">${g.places.length} ${g.places.length === 1 ? 'resultaat' : 'resultaten'}</span></h3>
      ${g.places.map(p => renderPlaceCard(p)).join('')}
    </div>
  `).join('');
  return `
    <div class="hero">
      <div class="hero-name">Zoekresultaten</div>
      <div class="hero-meta">${results.length} ${results.length === 1 ? 'plek' : 'plekken'} voor "${escapeHtml(state.search)}"</div>
    </div>
    ${groupsHtml}
  `;
};

const render = () => {
  // Search overrules tab when active
  if (state.search.trim()) {
    content.innerHTML = `<section class="section active">${renderSearchResults()}</section>`;
    attachLocationHandlers();
    updateStats();
    return;
  }

  if (state.active === 'intro') {
    content.innerHTML = `<section class="section active">${renderIntro()}</section>`;
    document.getElementById('reset-btn')?.addEventListener('click', () => {
      if (confirm('Weet je zeker dat je alle favorieten en vinkjes wilt wissen?')) {
        state.fav.clear();
        state.done.clear();
        state.doneItems.clear();
        save();
        updateStats();
        buildTabs();
        render();
      }
    });
    document.querySelectorAll('[data-go-to]').forEach(el => {
      el.style.cursor = 'pointer';
      el.addEventListener('click', () => switchTab(el.dataset.goTo));
    });
    attachPlaceHandlers();
  } else if (state.active === 'fav') {
    content.innerHTML = `<section class="section active">${renderFavorites()}</section>`;
    attachPlaceHandlers();
  } else {
    const loc = TRIP_DATA.locations[state.active];
    content.innerHTML = `<section class="section active">${renderLocation(loc)}</section>`;
    attachLocationHandlers();
  }
  updateStats();
  updateFab();
};

const attachPlaceHandlers = () => {
  content.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const set = action === 'fav' ? state.fav : state.done;
      if (set.has(id)) set.delete(id); else set.add(id);
      save();
      updateStats();
      buildTabs(); // update fav badge
      // If on favorites tab and just unfavorited, re-render
      if (state.active === 'fav' && action === 'fav') {
        render();
        return;
      }
      btn.classList.toggle('active');
      const card = btn.closest('.place');
      if (action === 'done') card.classList.toggle('done');
      if (action === 'fav') card.classList.toggle('fav');
    });
  });
};

const attachLocationHandlers = () => {
  // Filters
  content.querySelectorAll('[data-filter-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.filterCat = btn.dataset.filterCat;
      render();
    });
  });
  content.querySelectorAll('[data-filter-tag]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.filterTag = state.filterTag === btn.dataset.filterTag ? 'all' : btn.dataset.filterTag;
      render();
    });
  });

  attachPlaceHandlers();

  // Day toggles
  content.querySelectorAll('[data-day-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.dayToggle);
      if (state.openDays.has(idx)) state.openDays.delete(idx); else state.openDays.add(idx);
      el.closest('.day').classList.toggle('open');
    });
  });

  // Day item checkboxes
  content.querySelectorAll('[data-day-item]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = el.dataset.dayItem;
      if (state.doneItems.has(key)) state.doneItems.delete(key); else state.doneItems.add(key);
      save();
      el.classList.toggle('done');
      el.querySelector('.day-check').classList.toggle('done');
      const day = el.closest('.day');
      const dayIdx = parseInt(day.dataset.dayIdx);
      const loc = TRIP_DATA.locations[state.active];
      const total = loc.days[dayIdx].items.length;
      const completed = loc.days[dayIdx].items.filter((_, i) => state.doneItems.has(`${loc.id}-d${dayIdx}-${i}`)).length;
      day.querySelector('.day-progress').textContent = `${completed}/${total} afgevinkt`;
    });
  });
};

// ===== SEARCH HANDLERS =====
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('search-clear');
let searchDebounce;
searchInput.addEventListener('input', () => {
  searchClear.classList.toggle('active', searchInput.value.length > 0);
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    state.search = searchInput.value;
    render();
  }, 200);
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  state.search = '';
  searchClear.classList.remove('active');
  render();
});

// ===== FAB =====
const fab = document.getElementById('fab');
const updateFab = () => {
  // Show "go to today" FAB when not on current location and trip is active
  const isOnCurrentLoc = tripState.loc && state.active === tripState.loc;
  const showFab = tripState.loc && !isOnCurrentLoc && !state.search;
  fab.classList.toggle('visible', showFab);
};
fab.addEventListener('click', () => {
  if (tripState.loc) switchTab(tripState.loc);
});

// ===== INIT =====
// Auto-open today's location if currently on trip
if (tripState.loc) {
  state.active = tripState.loc;
  if (typeof tripState.dayIdx === 'number') {
    state.openDays.add(tripState.dayIdx);
  }
}

buildTabs();
render();
</script>

</body>
</html>
